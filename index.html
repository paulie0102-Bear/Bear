    <script>
        const cdns = [
            'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js',
            'https://cdn.jsdelivr.net/npm/chart.js',
            'https://unpkg.com/chart.js@3.9.1/dist/chart.min.js'
        ];
        let chartLoaded = false;
        async function loadChartJS() {
            for (let url of cdns) {
                try {
                    await new Promise((resolve, reject) => {
                        const script = document.createElement('script');
                        script.src = url;
                        script.onload = () => { chartLoaded = true; resolve(); };
                        script.onerror = reject;
                        document.head.appendChild(script);
                    });
                    console.log("Chart.js loaded from: " + url);
                    return;
                } catch (e) { console.warn("Failed to load: " + url); }
            }
        }
        loadChartJS();
    </script>

        :root {

        }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #1a1a1a; margin: 0; color: var(--text); overflow: hidden; }

        .battle-stage { height: 260px; position: relative; background: linear-gradient(#87ceeb 60%, #9cd39c 60%); border-bottom: 4px solid #333; overflow: hidden; }
        .buddy-box { position: absolute; bottom: 20px; left: 30px; width: 100px; z-index: 5; }
        .enemy-box { position: absolute; top: 30px; right: 30px; width: 100px; text-align: center; }
        #ballOverlay { position: absolute; width: 40px; display: none; z-index: 100; pointer-events: none; }
        .hp-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; border: 1px solid #000; margin-bottom: 5px; }
        #hpFill { height: 100%; background: #2ecc71; width: 100%; transition: 0.3s; }
        .dex-container { display: flex; height: calc(100vh - 110px); background: #eee; margin: 5px; border-radius: 12px; overflow: hidden; }
        .dex-sidebar { width: 35%; overflow-y: auto; background: #ddd; border-right: 2px solid #ccc; }
        .dex-main { width: 65%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; background: white; }
        .dex-item { padding: 15px 5px; border-bottom: 1px solid #bbb; font-size: 12px; cursor: pointer; text-align: center; }
        .dex-item.active { background: var(--p); color: white; }
        .mega-fx { filter: drop-shadow(0 0 15px var(--mega)); animation: glow 1.5s infinite; }
        @keyframes glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .card { background: var(--white); border-radius: 12px; padding: 15px; margin: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .msg-box { height: 45px; background: #fff; padding: 10px; font-weight: bold; font-size: 14px; border-bottom: 1px solid #ddd; overflow-y: auto; }
        .control-panel { padding: 5px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: #333; height: 80px; position: fixed; bottom: 0; width: 100%; }
        .btn-nav { background: #444; color: white; border: none; font-size: 10px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-back { background: var(--danger); color: white; width: calc(100% - 20px); padding: 15px; margin: 10px; border: none; border-radius: 8px; font-weight: bold; }
        .ball-throw { display: block !important; animation: ballCurve 0.8s cubic-bezier(0.25, 0.5, 0.5, 1) forwards; }
        .ball-shake { display: block !important; animation: ballShake 0.5s 3; }
        @keyframes ballCurve { 0% { left: 40px; bottom: 40px; transform: scale(1); } 100% { left: 240px; bottom: 160px; transform: scale(0.7); } }
        @keyframes ballShake { 0%, 100% { transform: translate(240px, -160px) rotate(0deg); } 25% { transform: translate(240px, -160px) rotate(20deg); } 75% { transform: translate(240px, -160px) rotate(-20deg); } }
        .gotcha-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); color: gold; font-size: 45px; font-weight: 900; text-shadow: 3px 3px 0 #000; z-index: 200; display: none; }
        .hist-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; align-items: center; }
        .hidden { display: none; }
    </style>

    lastUpdate: new Date().toDateString()
};

// --- [ 核心刷新與初始化 ] ---
function updateUI() {
    localStorage.setItem('pokemaster_v52', JSON.stringify(s));
    document.getElementById('st-bal').innerText = s.bal.toLocaleString();
    document.getElementById('st-achieve').innerText = s.achieveBal.toLocaleString();
    document.getElementById('p-evo-txt').innerText = s.prog.evo;
    document.getElementById('p-evo-bar').style.width = (s.prog.evo/5*100) + "%";
    document.getElementById('p-mega-txt').innerText = s.prog.mega;
    document.getElementById('p-mega-bar').style.width = (s.prog.mega/5*100) + "%";
    const isMega = Date.now() < s.buddy.megaUntil;
    let bImg = isMega ? `${API}/pokemon/${MEGA_DATA[s.buddyId] || s.buddyId+'-mega'}.png` : `${API}/pokemon/${s.isShinyBuddy?'shiny/':''}${s.buddyId}.png`;
    document.getElementById('buddyImg').src = bImg;
    isMega ? document.getElementById('buddyImg').classList.add('mega-fx') : document.getElementById('buddyImg').classList.remove('mega-fx');
    renderBackpack();
}

function record() {
    const amt = parseInt(document.getElementById('recAmt').value);
    const date = document.getElementById('recDate').value;
    if (!amt || !date) return alert("請填入金額與日期");
    s.bal += Math.floor(amt * 0.1); s.pool += amt; s.achieveBal += amt;
    const month = date.substring(0, 7);
    s.hist.push({id: Date.now(), date, cat: document.getElementById('recCat').value, amt, note: document.getElementById('recNote').value});
    s.yearSums[month] = (s.yearSums[month] || 0) + amt;
    while (s.achieveBal >= 5000) { s.achieveBal -= 5000; s.items.master++; alert("🏆 成就達成！獲得 1 顆大師球！"); }
    if (s.pool >= 500) { s.pool -= 500; spawnEnemy(); }
    document.getElementById('recAmt').value = ""; updateUI();
}

function searchHistory() {
    const start = document.getElementById('hStart').value, end = document.getElementById('hEnd').value;
    if (!start || !end) return;
    const d1 = new Date(start), d2 = new Date(end);
    if (((d2 - d1) / (1000 * 60 * 60 * 24)) > 7) return alert("查詢區間不可超過 7 天");
    const filtered = s.hist.filter(h => h.date >= start && h.date <= end);
    document.getElementById('historyList').innerHTML = filtered.map(h => `
        <div class="hist-item"><div><small>${h.date}</small><br><b>${h.cat}</b>: $${h.amt}</div><button onclick="deleteRecord(${h.id})" style="background:var(--danger); color:white; border:none; padding:5px; border-radius:3px;">刪除</button></div>
    `).join('') || "查無資料";
}

function deleteRecord(id) {
    const idx = s.hist.findIndex(h => h.id === id);
    if (idx > -1) {
        const h = s.hist[idx];
        s.bal = Math.max(0, s.bal - Math.floor(h.amt * 0.1));
        s.achieveBal = Math.max(0, s.achieveBal - h.amt);
        s.hist.splice(idx, 1); alert("已刪除紀錄並扣除獎勵"); searchHistory(); updateUI();
    }
}

let curE = null;
function spawnEnemy() {
    const id = Math.floor(Math.random()*493)+1;
    const isShiny = Math.random() < (Date.now() < s.buddy.megaUntil ? 0.1 : 0.05);
    curE = {id, hp: 100, isShiny, name: NAMES[id-1]};
    document.getElementById('enemyImg').src = `${API}/pokemon/${isShiny?'shiny/':''}${id}.png`;
    document.getElementById('enemyArea').style.display = "block";
    document.getElementById('battleActions').classList.remove('hidden');
    document.getElementById('inputArea').classList.add('hidden');
    document.getElementById('hpFill').style.width = "100%";
    document.getElementById('msg').innerText = `野生的 ${curE.name} 出現了！`;
}

async function throwBall() {
    const type = document.getElementById('ballSelect').value;
    if (s.items[type] <= 0 && type !== 'master') return alert("球不足！");
    if (type !== 'master') s.items[type]--;
    const ball = document.getElementById('ballOverlay');
    ball.src = `${API}/items/${type}-ball.png`; ball.className = 'ball-throw';
    await new Promise(r => setTimeout(r, 800));
    ball.className = 'ball-shake';
    await new Promise(r => setTimeout(r, 1500));
    const catchRate = {poke:0.3, great:0.5, ultra:0.7, master:1.0}[type] * (1.5 - curE.hp/100);
    if (Math.random() < catchRate || type === 'master') {
        document.getElementById('gotcha').style.display = "block";
        if (!s.owned.includes(curE.id)) s.owned.push(curE.id);
        if (curE.isShiny && !s.shinyOwned.includes(curE.id)) s.shinyOwned.push(curE.id);
        s.prog.evo++; if ([3,6,9,94,130,448].includes(curE.id)) s.prog.mega++;
        if (s.prog.evo >= 5) { s.prog.evo=0; s.items.stone++; }
        if (s.prog.mega >= 5) { s.prog.mega=0; s.items.mstone++; }
        setTimeout(resetBattle, 2000);
    } else { ball.style.display = 'none'; document.getElementById('msg').innerText = "哎呀！被逃走了！"; }
    updateUI();
}
