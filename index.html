<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster: v47 Legacy Plus</title>
    <style>
        :root { --p: #2d5a27; --g: #d4af37; --bg: #e0eed0; --hp: #4caf50; --task: #3498db; --m: #ff00ff; --crit: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: #1a1a1a; margin: 0; color: #333; overflow: hidden; }
        
        .page { display: none; width: 100vw; height: 100vh; background: var(--bg); position: fixed; top: 0; left: 0; z-index: 10; overflow-y: auto; }
        .page-active { display: block; }
        .main-container { display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .game-screen { width: 100%; max-width: 420px; background: var(--bg); border: 4px solid #333; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .battle-stage { height: 260px; position: relative; background: linear-gradient(#b8eaea, #e0eed0); border-bottom: 4px solid #333; overflow: hidden; }
        #buddyImg, #pokeImg { width: 110px; transition: 0.3s; }
        .buddy-container { position: absolute; bottom: -15px; left: -10px; width: 180px; z-index: 5; text-align: center; }
        .enemy-container { position: absolute; top: 30px; right: 30px; width: 110px; text-align: center; }
        
        /* 動畫修復與強化 */
        .icon-img { width: 22px; height: 22px; vertical-align: middle; object-fit: contain; }
        #ballOverlay { position: absolute; width: 40px; display: none; left: 60px; bottom: 60px; z-index: 50; }
        
        .ball-throw { display: block !important; animation: ballCurve 0.9s forwards ease-in-out; }
        .ball-shake { display: block !important; animation: ballShake 0.5s infinite; }
        @keyframes ballCurve { 
            0% { transform: translate(0,0) scale(1.5) rotate(0deg); }
            50% { transform: translate(120px,-160px) scale(1.2) rotate(360deg); }
            100% { transform: translate(240px,-100px) scale(0.8) rotate(720deg); } 
        }
        @keyframes ballShake { 
            0%, 100% { transform: translate(235px,-100px) rotate(0deg); }
            50% { transform: translate(235px,-100px) rotate(15deg); }
        }

        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--p); color: white; padding: 6px; font-size: 11px; text-align: center; }
        .msg-box { height: 90px; background: #fff; padding: 12px; font-weight: bold; border-top: 4px solid #888; overflow-y: auto; font-size: 14px; }
        .result-text { font-size: 28px; color: gold; font-weight: 900; position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); display: none; z-index: 100; text-shadow: 2px 2px #000; animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { transform: translate(-50%, -50%) scale(1); } to { transform: translate(-50%, -50%) scale(1.1); } }

        .card { background: #f8fff0; border: 2px solid var(--p); padding: 10px; margin: 8px; border-radius: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 10px; border: 2px solid #333; font-weight: bold; cursor: pointer; border-radius: 6px; background: #fff; }
        .back-btn { background: #333; color: white; width: calc(100% - 16px); margin: 8px; padding: 12px; }

        .hp-bar { width: 100px; height: 8px; background: #444; border: 1px solid #000; margin: 5px auto; border-radius: 4px; overflow: hidden; }
        #hpFill { height: 100%; background: var(--hp); transition: 0.3s; width: 100%; }
        .hidden { display: none; }
        .shiny-effect { filter: drop-shadow(0 0 10px gold) brightness(1.2); }
        canvas { width: 100%; background: #fff; margin-top: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div id="mainPage" class="page page-active">
    <div class="main-container">
        <div class="game-screen">
            <div class="stats-bar">
                <span>💰P$<b id="balance">0</b></span>
                <span>✨<b id="shinyRate">5</b>%</span>
                <span><img id="mShardIco" class="icon-img"> <b id="shards">0</b>/5</span>
                <span><img id="mStoneIco" class="icon-img"> x<b id="stones">0</b></span>
            </div>
            <div class="stats-bar" style="background:#1e3d1a;">
                <span><img id="i-poke-ico" class="icon-img"> <b id="i-poke">0</b></span>
                <span><img id="i-great-ico" class="icon-img"> <b id="i-great">0</b></span>
                <span><img id="i-ultra-ico" class="icon-img"> <b id="i-ultra">0</b></span>
                <span><img id="i-master-ico" class="icon-img"> <b id="i-master">0</b></span>
            </div>

            <div class="battle-stage">
                <div id="resText" class="result-text">成功捕捉！</div>
                <div class="buddy-container"><img id="buddyImg" src=""></div>
                <div class="enemy-container">
                    <div id="hpWrap" class="hidden"><div class="hp-bar"><div id="hpFill"></div></div></div>
                    <img id="pokeImg" src="">
                </div>
                <img id="ballOverlay" src="">
            </div>

            <div class="msg-box" id="msgText">系統就緒。</div>

            <div id="inputArea" class="card">
                <div class="grid">
                    <select id="cat"><option>飲食</option><option>交通</option><option>娛樂</option><option>購物</option><option>其他</option></select>
                    <input id="note" type="text" placeholder="備註">
                </div>
                <div class="grid" style="margin-top:8px;">
                    <input id="amt" type="number" placeholder="金額">
                    <button onclick="record()" style="background:var(--p); color:white;">記帳探索</button>
                </div>
            </div>

            <div id="battleActions" class="card hidden">
                <div class="grid">
                    <button onclick="atk()">⚔️ 攻擊</button>
                    <button id="megaBtn" class="hidden" onclick="megaEvolve()" style="background:linear-gradient(to right, #f0f, #70f); color:white;">MEGA 進化</button>
                </div>
                <div class="grid" style="margin-top:8px;">
                    <select id="ballSelect">
                        <option value="poke">精靈球</option><option value="great">超級球</option>
                        <option value="ultra">高級球</option><option value="master">大師球</option>
                    </select>
                    <button onclick="handleThrow()">投球 (<span id="turn">1</span>/8)</button>
                </div>
            </div>

            <div class="grid" style="padding:0 8px 8px 8px;">
                <button onclick="openPanel('shopPage')">🛒 商店</button>
                <button onclick="openPanel('taskPage')">🎯 任務</button>
                <button onclick="openPanel('buddyPage')">🐾 背包/夥伴</button>
                <button onclick="openPanel('adminPage')">⚙️ 後台</button>
            </div>
            <button onclick="openPanel('chartPage')" style="margin: 0 8px 10px 8px; background: var(--task); color:white; border:none; padding:10px; border-radius:8px;">📈 年度與分類圖表統計</button>
        </div>
    </div>
</div>

<div id="chartPage" class="page">
    <div style="padding:20px;">
        <h2>📊 數據統計</h2>
        <div class="card"><h3>年度消費趨勢</h3><canvas id="canvasYear" height="180"></canvas></div>
        <div class="card"><h3>本月分類佔比</h3><canvas id="canvasMonth" height="180"></canvas></div>
        <button class="back-btn" onclick="backToMain()">返回主頁</button>
    </div>
</div>

<div id="shopPage" class="page"><div style="padding:20px;"><h2>🛒 商店</h2><div id="shopList"></div><button class="back-btn" onclick="backToMain()">離開</button></div></div>
<div id="taskPage" class="page"><div style="padding:20px;"><h2>🎯 任務</h2><div id="taskList"></div><button class="back-btn" onclick="backToMain()">返回</button></div></div>
<div id="buddyPage" class="page"><div style="padding:20px;"><h2>🐾 資源/箱子</h2><div id="buddyList"></div><button class="back-btn" onclick="backToMain()">返回</button></div></div>

const MEGA_IDS = { 1:10033, 4:10034, 7:10035, 25:10001, 448:10054 };

let s = {
    bal: 0, pool: 0, megaT: 0,
    items: { poke:10, great:0, ultra:0, master:0, shards:0, stones:0 },
    owned: [{id:25, shiny:false}], buddy: {id:25, shiny:false},
    hist: [], daily: 0, weekly: 0, lastD: "",
    stats: { caught:0, spend:0, yearSums:{} }, 
    claimed: []

function updateUI() {
    const today = new Date().toISOString().split('T')[0];
    if(s.lastD !== today) { s.daily = 0; s.lastD = today; }
    
    document.getElementById('mShardIco').src = ASSETS.shard;
    document.getElementById('mStoneIco').src = ASSETS.stone;
    document.getElementById('i-poke-ico').src = ASSETS.poke;
    document.getElementById('i-great-ico').src = ASSETS.great;
    document.getElementById('i-ultra-ico').src = ASSETS.ultra;
    document.getElementById('i-master-ico').src = ASSETS.master;

    document.getElementById('balance').innerText = s.bal.toLocaleString();
    document.getElementById('shards').innerText = s.items.shards;
    document.getElementById('stones').innerText = s.items.stones;
    document.getElementById('i-poke').innerText = s.items.poke;
    document.getElementById('i-great').innerText = s.items.great;
    document.getElementById('i-ultra').innerText = s.items.ultra;
    document.getElementById('i-master').innerText = s.items.master;

    const isM = Date.now() < s.megaT;
    document.getElementById('shinyRate').innerText = isM ? 20 : 5;
    
    const bImg = document.getElementById('buddyImg');
    const displayId = (isM && MEGA_IDS[s.buddy.id]) ? MEGA_IDS[s.buddy.id] : s.buddy.id;
    bImg.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${displayId}.png`;
    s.buddy.shiny ? bImg.classList.add('shiny-effect') : bImg.classList.remove('shiny-effect');

    document.getElementById('megaBtn').className = (s.items.stones > 0 && !isM) ? "" : "hidden";
    localStorage.setItem('poke_final_v47_plus', JSON.stringify(s));
}

// --- v47 記帳邏輯 + 年度統計持久化 ---
function record() {
    const a = parseInt(document.getElementById('amt').value); if(!a) return;
    const cat = document.getElementById('cat').value;
    const date = new Date().toISOString().split('T')[0];
    const monthKey = date.slice(0, 7);

    s.bal += a; s.stats.spend += a; s.weekly += a; s.pool += (a/500)*100;
    s.hist.push({ id: Date.now(), date, cat, amt: a });
    
    // [新增] 統計持久化，輕量化也不會消失
    if(!s.stats.yearSums[monthKey]) s.stats.yearSums[monthKey] = 0;
    s.stats.yearSums[monthKey] += a;

    if(s.daily < 3) s.daily++;
    if(s.pool >= 100) { s.pool = 0; spawn(); }
    updateUI(); document.getElementById('amt').value = "";
}

function spawn() {
    const id = Math.floor(Math.random() * 151) + 1;
    const isS = Math.random() < (Date.now() < s.megaT ? 0.2 : 0.05);
    s.cur = { id, hp: 100, t: 1, isS };
    const p = document.getElementById('pokeImg');
    p.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
    isS ? p.classList.add('shiny-effect') : p.classList.remove('shiny-effect');
    document.getElementById('inputArea').classList.add('hidden');
    document.getElementById('battleActions').classList.remove('hidden');
    document.getElementById('hpWrap').classList.remove('hidden');
    // [新增] 中文名字顯示
    document.getElementById('msgText').innerText = `發現了 ${isS?'✨':''}${POKE_NAME[id-1] || '野生的寶可夢'}！`;
}

// --- [新增] 增強捕捉動畫 ---
async function handleThrow() {
    const type = document.getElementById('ballSelect').value;
    if(s.items[type] <= 0 && type !== 'master') return alert("球數不足");
    if(type !== 'master') s.items[type]--;

    const ball = document.getElementById('ballOverlay');
    const res = document.getElementById('resText');
    ball.src = ASSETS[type]; 
    
    // 拋物線動畫
    ball.className = 'ball-throw'; 
    await new Promise(r => setTimeout(r, 900));
    
    // 搖晃動畫
    ball.className = 'ball-shake';
    await new Promise(r => setTimeout(r, 1500)); 

    const rate = {poke:0.3, great:0.5, ultra:0.7, master:1.0}[type] + (100-s.cur.hp)/200;
    if(Math.random() < rate || type === 'master') {
        res.style.display = "block";
        s.owned.push({id: s.cur.id, shiny: s.cur.isS}); s.stats.caught++;
        if(MEGA_IDS[s.cur.id]) { 
            s.items.shards++; 
            if(s.items.shards>=5){ s.items.shards=0; s.items.stones++; } 
        }
        setTimeout(() => { res.style.display = "none"; resetBattle(); }, 1500);
    } else {
        ball.style.display = 'none'; ball.className = '';
        s.cur.t++; document.getElementById('turn').innerText = s.cur.t;
        if(s.cur.t > 8) { alert("逃跑了..."); resetBattle(); }
    }
    updateUI();
}

// --- [新增] 年度統計持久化繪圖 ---
function drawCharts() {
    const yCtx = document.getElementById('canvasYear').getContext('2d');
    const mCtx = document.getElementById('canvasMonth').getContext('2d');
    const curYear = new Date().getFullYear().toString();
    const curMonth = new Date().toISOString().slice(0, 7);

    const months = ["01","02","03","04","05","06","07","08","09","10","11","12"];
    const yData = months.map(m => s.stats.yearSums[`${curYear}-${m}`] || 0);
    const maxVal = Math.max(...yData, 1000);
    
    yCtx.clearRect(0,0,400,180);
    yCtx.beginPath(); yCtx.strokeStyle = "#3498db"; yCtx.lineWidth = 3;
    yData.forEach((v, i) => {
        const x = 30 + i*30; const y = 160 - (v/maxVal)*140;
        i===0 ? yCtx.moveTo(x,y) : yCtx.lineTo(x,y);
        yCtx.fillStyle="#666"; yCtx.fillText(i+1+'月', x-10, 175);
    });
    yCtx.stroke();

    const cats = {};
    s.hist.filter(h => h.date.startsWith(curMonth)).forEach(h => cats[h.cat] = (cats[h.cat]||0) + h.amt);
    mCtx.clearRect(0,0,400,180);
    let i = 0;
    for(let c in cats) {
        mCtx.fillStyle = "#2ecc71";
        const h = (cats[c]/Math.max(...Object.values(cats),1))*140;
        mCtx.fillRect(40+i*70, 160-h, 40, h);
        mCtx.fillStyle="#333"; mCtx.fillText(c, 40+i*70, 175);
        i++;
    }
}

// --- v47 背包與後台功能 (完全保留) ---
function openPanel(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
    document.getElementById(id).classList.add('page-active');
    if(id === 'chartPage') drawCharts();
    if(id === 'adminPage') renderAdmin();
    if(id === 'taskPage') renderTasks();
    if(id === 'buddyPage') renderBuddy();
    if(id === 'shopPage') renderShop();
}
function backToMain() { openPanel('mainPage'); updateUI(); }

function doLightweight() {
    exportJSON();
    const limit = new Date(); limit.setDate(limit.getDate() - 30);
    s.hist = s.hist.filter(h => new Date(h.date) >= limit);
    alert("輕量化完成（統計數據已保留）");
    renderAdmin(); updateUI();
}

function exportJSON() {
    const blob = new Blob([JSON.stringify(s)], {type:"application/json"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `Backup_${Date.now()}.json`; a.click();
}

function renderAdmin() {
    document.getElementById('histList').innerHTML = s.hist.slice(-50).reverse().map(h => `<div style="padding:5px; border-bottom:1px solid #ddd; font-size:12px;">${h.date} | ${h.cat} | $${h.amt}</div>`).join('');
}
function renderShop() {
    const list = [{n:"精靈球", p:100, k:"poke"}, {n:"超級球", p:300, k:"great"}, {n:"高級球", p:600, k:"ultra"}];
    document.getElementById('shopList').innerHTML = list.map(i => `<div class="card">${i.n} ($${i.p}) <button onclick="buy('${i.k}',${i.p})">購買</button></div>`).join('');
}
function buy(k,p) { if(s.bal>=p){ s.bal-=p; s.items[k]++; renderShop(); updateUI(); } }

function renderBuddy() {
    document.getElementById('buddyList').innerHTML = s.owned.map((p,i) => `<div class="card" onclick="s.buddy=s.owned[${i}];backToMain()">${p.id}號 ${POKE_NAME[p.id-1] || '寶可夢'} ${p.shiny?'✨':''}</div>`).join('');
}
function renderTasks() {
    document.getElementById('taskList').innerHTML = `<div class="card">每日記帳: ${s.daily}/3</div>`;
}

function atk() { s.cur.hp = Math.max(10, s.cur.hp-25); document.getElementById('hpFill').style.width = s.cur.hp+"%"; }
function resetBattle() {
    s.cur = null; document.getElementById('ballOverlay').style.display = 'none';
    document.getElementById('inputArea').classList.remove('hidden');
    document.getElementById('battleActions').classList.add('hidden');
    document.getElementById('hpWrap').classList.add('hidden');
    updateUI();
}
function megaEvolve() { s.items.stones--; s.megaT = Date.now() + 86400000; updateUI(); }

const saved = localStorage.getItem('poke_final_v47_plus');
if(saved) s = JSON.parse(saved);
updateUI();
</script>
