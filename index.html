<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster v56.0 - 終極修復版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        :root { 
            --p: #2d5a27; --bg: #f4f7f6; --text: #2c3e50; --accent: #f1c40f;
            --mega: #9b59b6; --danger: #e74c3c; --white: #ffffff; --gray: #95a5a6;
        }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: #1a1a1a; margin: 0; color: var(--text); overflow: hidden; }
        
        .page { display: none; width: 100vw; height: 100vh; background: var(--bg); position: fixed; top: 0; left: 0; z-index: 100; overflow-y: auto; padding-bottom: 130px; }
        .page-active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .battle-stage { height: 240px; position: relative; background: linear-gradient(#87ceeb 60%, #9cd39c 60%); border-bottom: 4px solid #333; overflow: hidden; }
        .buddy-box { position: absolute; bottom: 20px; left: 30px; width: 100px; transition: 0.3s; text-align: center; }
        .enemy-box { position: absolute; top: 30px; right: 30px; width: 100px; text-align: center; }
        .hp-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 5px; border: 1px solid #000; }
        #hpFill { height: 100%; background: #2ecc71; width: 100%; transition: 0.4s; }

        .card { background: var(--white); border-radius: 12px; padding: 15px; margin: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg-box { height: 40px; background: #fff; padding: 8px 15px; font-weight: bold; border-bottom: 1px solid #ddd; color: var(--p); overflow: hidden; }
        
        .control-panel { 
            display: grid; grid-template-columns: repeat(4, 25%); grid-template-rows: repeat(2, 60px);
            background: #222; height: 120px; position: fixed; bottom: 0; width: 100%; padding: 5px; box-sizing: border-box; z-index: 1000;
        }
        .btn-nav { background: #333; color: white; border: 1px solid #444; font-size: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .btn-nav:active { background: #555; }

        #megaCountdown { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; display: none; z-index: 200; }
        .mega-fx { filter: drop-shadow(0 0 8px var(--mega)); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* 進化選擇彈窗 */
        #evoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
        .evo-dialog { background: white; padding: 20px; border-radius: 15px; width: 80%; text-align: center; }
        .evo-btn { background: var(--p); color: white; border: none; padding: 12px; margin: 5px; width: 100%; border-radius: 8px; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div id="mainPage" class="page page-active">
    <div class="battle-stage">
        <div id="megaCountdown">🧬 Mega: <span id="timer">--:--</span></div>
        <div class="buddy-box"><img id="buddyImg" src="" style="width:100%; height:90px; object-fit:contain;"></div>
        <div class="enemy-box" id="enemyArea" style="display:none;">
            <div id="turnTag" style="font-size:10px; color:white; background:rgba(0,0,0,0.5); border-radius:3px;">回合: 1/8</div>
            <div class="hp-bar"><div id="hpFill"></div></div>
            <img id="enemyImg" src="" style="width:100%; height:80px; object-fit:contain;">
        </div>
    </div>
    <div id="msg" class="msg-box">準備好開始記帳了嗎？</div>
    
    <div id="inputArea" class="card">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:8px;">
            <input type="date" id="recDate">
            <select id="recCat"><option>飲食</option><option>交通</option><option>娛樂</option><option>購物</option><option>其他</option></select>
        </div>
        <input id="recNote" type="text" placeholder="備註" style="width:100%; padding:10px; margin-bottom:8px; box-sizing:border-box;">
        <input id="recAmt" type="number" placeholder="金額" style="width:100%; padding:10px; margin-bottom:12px; box-sizing:border-box;">
        <button onclick="record()" style="background:var(--p); color:white; width:100%; padding:15px; border:none; border-radius:8px; font-weight:bold;">記帳並探索</button>
    </div>

    <div id="battleActions" class="card" style="display:none; border:2px solid var(--p);">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;">
            <button onclick="attack()" style="background:var(--danger); color:white; padding:12px; border:none; border-radius:8px;">⚔️ 攻擊 (-33%)</button>
            <button onclick="tryMega()" style="background:var(--mega); color:white; padding:12px; border:none; border-radius:8px;">🧬 MEGA</button>
        </div>
        <div style="display:flex; gap:8px;">
            <select id="ballSelect" style="flex:1; padding:10px;">
                <option value="poke">精靈球</option><option value="great">超級球</option>
                <option value="ultra">高級球</option><option value="master">大師球</option>
            </select>
            <button onclick="throwBall()" style="background:var(--p); color:white; padding:10px 20px; border:none; border-radius:8px;">投球</button>
        </div>
    </div>
</div>

<div id="dexPage" class="page"><div class="card"><h2>圖鑑收藏</h2><div id="dexList"></div></div></div>
<div id="shopPage" class="page"><div class="card"><h2>道具商店</h2><p>功能運作中...</p></div></div>
<div id="historyPage" class="page"><div class="card"><h2>歷史明細</h2><table id="histTable"></table></div></div>
<div id="adminPage" class="page">
    <div class="card">
        <h2>管理與載具匯入</h2>
        <input type="file" id="csvFile" accept=".csv" onchange="importCSV(this)">
        <hr>
        <button onclick="lightenData()" style="background:var(--danger); color:white; width:100%; padding:10px; border:none; border-radius:5px;">數據輕量化與備份</button>
    </div>
</div>

<div class="control-panel">
    <button class="btn-nav" onclick="openPage('mainPage')">🏠<br>首頁</button>
    <button class="btn-nav" onclick="openPage('dexPage')">📖<br>圖鑑</button>
    <button class="btn-nav" onclick="openPage('shopPage')">💰<br>商店</button>
    <button class="btn-nav" onclick="openPage('historyPage')">📜<br>紀錄</button>
    <button class="btn-nav" onclick="openPage('adminPage')">⚙️<br>管理</button>
    <button class="btn-nav" onclick="location.reload()">🔄<br>刷新</button>
</div>

<div id="evoOverlay"><div class="evo-dialog"><h3>選擇進化目標</h3><div id="evoChoices"></div></div></div>

const MEGA_DATA = {3: "3-mega", 6: "6-mega-y", 9: "9-mega", 94: "94-mega", 130: "130-mega", 212: "212-mega", 248: "248-mega", 282: "282-mega", 448: "448-mega"};

    bal: 500, items: {poke:10, great:5, ultra:0, master:1, stone:5, mstone:2},
    buddyId: 1, isShinyBuddy: false, owned: [1], shinyOwned: [],
    playerLv: 1, playerExp: 0, buddy: {megaUntil: 0}, hist: []
};

let curE = null;
let curTurn = 1;

// --- [ 3. 基礎函數 ] ---
function openPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
    document.getElementById(id).classList.add('page-active');
    if(id === 'historyPage') renderHistory();
    if(id === 'dexPage') renderDex();
}

function updateUI() {
    const isMega = Date.now() < s.buddy.megaUntil;
    const mId = MEGA_DATA[s.buddyId];
    
    // 夥伴圖示
    let url = isMega && mId ? 
        `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${mId.split('-')[0]}.png` :
        `${API_SPRITE}${s.isShinyBuddy?'shiny/':''}${s.buddyId}.png`;
    
    document.getElementById('buddyImg').src = url;
    document.getElementById('buddyImg').className = isMega ? "mega-fx" : "";
    localStorage.setItem('pms_v56', JSON.stringify(s));
}

// --- [ 4. 戰鬥邏輯 ] ---
function record() {
    const amt = parseInt(document.getElementById('recAmt').value);
    if(isNaN(amt) || amt <= 0) return alert("請輸入正確金額");
    
    s.bal -= amt;
    s.hist.push({ date: document.getElementById('recDate').value, cat: document.getElementById('recCat').value, note: document.getElementById('recNote').value, amt: amt });
    
    // 進入戰鬥
    const id = Math.floor(Math.random() * 493) + 1;
    const isMega = Date.now() < s.buddy.megaUntil;
    const isShiny = Math.random() < (isMega ? 0.2 : 0.05);
    
    curE = { id, hp: 100, name: NAMES[id-1], isShiny };
    curTurn = 1;

    document.getElementById('enemyImg').src = `${API_SPRITE}${isShiny?'shiny/':''}${id}.png`;
    document.getElementById('enemyArea').style.display = "block";
    document.getElementById('battleActions').style.display = "block";
    document.getElementById('inputArea').style.display = "none";
    updateBattleUI();
    document.getElementById('msg').innerText = `遭遇野生 ${curE.name}${isShiny?' ✨':''}！`;
}

function updateBattleUI() {
    document.getElementById('hpFill').style.width = curE.hp + "%";
    document.getElementById('turnTag').innerText = `回合: ${curTurn}/8`;
}

function attack() {
    if(!curE) return;
    curE.hp -= 33;
    document.getElementById('msg').innerText = `夥伴攻擊！命中 33% 傷害！`;
    
    if(curE.hp <= 1) {
        alert(`${curE.name} 被擊倒！獲得 2 倍經驗！`);
        s.playerExp += 20;
        resetBattle();
    } else {
        curTurn++;
        if(curTurn > 8) { alert("寶可夢逃走了..."); resetBattle(); }
        else updateBattleUI();
    }
}

function throwBall() {
    const b = document.getElementById('ballSelect').value;
    if(s.items[b] <= 0) return alert("球不夠了！");
    s.items[b]--;
    
    let rate = {poke:0.3, great:0.5, ultra:0.7, master:1}[b] + (100 - curE.hp)/100;
    if(Math.random() < rate) {
        alert(`成功捕捉 ${curE.name}！`);
        if(!s.owned.includes(curE.id)) s.owned.push(curE.id);
        if(curE.isShiny && !s.shinyOwned.includes(curE.id)) s.shinyOwned.push(curE.id);
        s.playerExp += 10;
        resetBattle();
    } else {
        document.getElementById('msg').innerText = "捕捉失敗！";
        curTurn++;
        if(curTurn > 8) { alert("逃走了..."); resetBattle(); }
        else updateBattleUI();
    }
    updateUI();
}

function resetBattle() {
    curE = null;
    document.getElementById('enemyArea').style.display = "none";
    document.getElementById('battleActions').style.display = "none";
    document.getElementById('inputArea').style.display = "block";
    updateUI();
}

// --- [ 5. Mega 與 進化 ] ---
function tryMega() {
    const mId = MEGA_DATA[s.buddyId];
    if(!mId) return alert("此夥伴無法 Mega 進化");
    if(s.items.mstone <= 0) return alert("Mega石不足");
    
    s.items.mstone--;
    s.buddy.megaUntil = Date.now() + (120 * 60 * 1000); // 2小時
    alert(`${NAMES[s.buddyId-1]} Mega進化了！`);
    updateUI();
}

// --- [ 6. 載具與輕量化 ] ---
function importCSV(input) {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = function(e) {
        const lines = e.target.result.split('\n');
        lines.forEach(line => {
            const parts = line.split(',');
            if(parts.length >= 4) {
                s.hist.push({ date: parts[0], cat: parts[1], note: parts[2], amt: parseInt(parts[3]) });
            }
        });
        save(); alert("匯入成功！");
    };
    reader.readAsText(file);
}

function lightenData() {
    if(!confirm("將下載 JSON 備份並清空歷史明細，確定嗎？")) return;
    const blob = new Blob([JSON.stringify(s.hist)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    s.hist = [];
    save(); alert("已輕量化！");
}

function save() { localStorage.setItem('pms_v56', JSON.stringify(s)); }

function renderHistory() {
    const t = document.getElementById('histTable');
    t.innerHTML = "<tr><th>日期</th><th>項目</th><th>金額</th></tr>";
    s.hist.slice(-20).reverse().forEach(h => {
        t.innerHTML += `<tr><td>${h.date}</td><td>${h.note}</td><td>$${h.amt}</td></tr>`;
    });
}

// --- [ 7. 計時與初始 ] ---
setInterval(() => {
    const now = Date.now();
    if(now < s.buddy.megaUntil) {
        const d = s.buddy.megaUntil - now;
        document.getElementById('megaCountdown').style.display = "block";
        document.getElementById('timer').innerText = `${Math.floor(d/60000)}:${Math.floor((d%60000)/1000).toString().padStart(2,'0')}`;
    } else {
        document.getElementById('megaCountdown').style.display = "none";
    }
}, 1000);

window.onload = () => {
    document.getElementById('recDate').valueAsDate = new Date();
    updateUI();
};
</script>
</body>
