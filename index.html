<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster: Final Legacy v49.0</title>
    <style>
        :root { --p: #2d5a27; --g: #d4af37; --bg: #e0eed0; --hp: #4caf50; --task: #3498db; --crit: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: #1a1a1a; margin: 0; color: #333; overflow: hidden; }
        
        /* 頁面層級 */
        .page { display: none; width: 100vw; height: 100vh; background: var(--bg); position: fixed; top: 0; left: 0; z-index: 100; overflow-y: auto; }
        .page-active { display: block; }

        /* 主畫面介面 */
        .game-screen { width: 100%; max-width: 420px; margin: 0 auto; background: var(--bg); border: 4px solid #333; position: relative; height: 100vh; display: flex; flex-direction: column; }
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--p); color: white; padding: 8px; font-size: 12px; text-align: center; border-bottom: 2px solid #1e3d1a; }
        .icon-img { width: 22px; height: 22px; vertical-align: middle; margin-right: 2px; }

        /* 戰鬥舞台 */
        .battle-stage { height: 260px; position: relative; background: linear-gradient(#b8eaea, #e0eed0); border-bottom: 4px solid #333; overflow: hidden; }
        #ballOverlay { position: absolute; width: 40px; display: none; left: 60px; bottom: 60px; z-index: 200; }
        
        /* 捕捉動畫 */
        .ball-throw { animation: ballCurve 0.8s forwards ease-in-out; }
        .ball-shake { animation: ballShake 0.5s 3; }
        @keyframes ballCurve { 0% { transform: translate(0,0) rotate(0deg); } 100% { transform: translate(240px,-110px) rotate(720deg); } }
        @keyframes ballShake { 0%,100% { transform: translate(240px,-110px) rotate(0deg); } 50% { transform: translate(240px,-110px) rotate(20deg); } }

        /* 組件 */
        .card { background: #f8fff0; border: 2px solid var(--p); padding: 12px; margin: 8px; border-radius: 10px; box-shadow: 2px 2px 0 #2d5a27; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 12px; border: 2px solid #333; font-weight: bold; cursor: pointer; border-radius: 8px; background: #fff; }
        .back-btn { background: #333; color: white; width: calc(100% - 16px); margin: 8px; padding: 15px; font-size: 16px; }
        .msg-box { height: 80px; background: #fff; padding: 12px; font-weight: bold; border-top: 4px solid #888; overflow-y: auto; }
        .hp-bar { width: 100px; height: 10px; background: #444; border: 2px solid #000; margin: 5px auto; border-radius: 5px; }
        #hpFill { height: 100%; background: var(--hp); transition: 0.3s; width: 100%; }
        .shiny-effect { filter: drop-shadow(0 0 12px gold) brightness(1.2); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="mainPage" class="page page-active" style="z-index: 10;">
    <div class="game-screen">
        <div class="stats-bar">
            <span>💰P$<b id="balance">0</b></span>
            <span>✨<b id="shinyRate">5</b>%</span>
            <span><img id="ico-shard" class="icon-img"> <b id="shards">0</b></span>
            <span><img id="ico-stone" class="icon-img"> x<b id="stones">0</b></span>
        </div>
        <div class="stats-bar" style="background:#1e3d1a;">
            <span><img id="ico-p" class="icon-img"> <b id="i-p">0</b></span>
            <span><img id="ico-g" class="icon-img"> <b id="i-g">0</b></span>
            <span><img id="ico-u" class="icon-img"> <b id="i-u">0</b></span>
            <span><img id="ico-m" class="icon-img"> <b id="i-m">0</b></span>
        </div>

        <div class="battle-stage">
            <div id="resText" style="position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); font-size:30px; font-weight:900; color:gold; display:none; z-index:300; text-shadow:2px 2px #000;">GOTCHA!</div>
            <div style="position:absolute; bottom:-10px; left:10px; width:130px;"><img id="buddyImg" style="width:100%;"></div>
            <div style="position:absolute; top:30px; right:30px; width:110px; text-align:center;">
                <div id="hpWrap" class="hidden"><div class="hp-bar"><div id="hpFill"></div></div></div>
                <img id="pokeImg" style="width:100%;">
            </div>
            <img id="ballOverlay" src="">
        </div>

        <div class="msg-box" id="msgText">歡迎使用。輸入金額以啟動探索。</div>

        <div id="inputArea" class="card">
            <div class="grid">
                <select id="cat"><option>飲食</option><option>交通</option><option>娛樂</option><option>購物</option><option>其他</option></select>
                <input id="note" type="text" placeholder="備註內容">
            </div>
            <div class="grid" style="margin-top:8px;">
                <input id="amt" type="number" placeholder="金額">
                <button onclick="record()" style="background:var(--p); color:white;">記帳探索</button>
            </div>
        </div>

        <div id="battleActions" class="card hidden">
            <div class="grid"><button onclick="atk()">⚔️ 攻擊</button><button id="megaBtn" class="hidden" onclick="megaEvolve()" style="background:linear-gradient(to right,#f0f,#70f);color:white;">MEGA 進化</button></div>
            <div class="grid" style="margin-top:8px;">
                <select id="ballSelect"><option value="poke">精靈球</option><option value="great">超級球</option><option value="ultra">高級球</option><option value="master">大師球</option></select>
                <button onclick="handleThrow()">投球 (<span id="turn">1</span>/8)</button>
            </div>
        </div>

        <div class="grid" style="padding:0 8px;"><button onclick="openPanel('shopPage')">🛒 商店</button><button onclick="openPanel('taskPage')">🎯 任務</button><button onclick="openPanel('buddyPage')">🐾 背包</button><button onclick="openPanel('adminPage')">⚙️ 後台</button></div>
        <button onclick="openPanel('chartPage')" style="margin: 8px; background: var(--task); color:white; border:none; padding:12px; border-radius:8px;">📈 年度與分類統計圖表</button>
    </div>
</div>

<div id="chartPage" class="page">
    <div style="padding:20px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>📊 數據統計</h2>
            <button onclick="backToMain()" style="padding:5px 15px;">❌ 離開</button>
        </div>
        <div class="card"><h3>年度趨勢</h3><canvas id="canvasYear" height="180" style="width:100%;"></canvas></div>
        <div class="card"><h3>類別佔比</h3><canvas id="canvasMonth" height="180" style="width:100%;"></canvas></div>
        <button class="back-btn" onclick="backToMain()">返回主畫面</button>
    </div>
</div>

<div id="taskPage" class="page">
    <div style="padding:20px;">
        <h2>🎯 任務中心</h2>
        <div id="taskList"></div>
        <button class="back-btn" onclick="backToMain()">離開</button>
    </div>
</div>

<div id="buddyPage" class="page">
    <div style="padding:20px;">
        <h2>🎒 資源與箱子</h2>
        <div id="buddyList"></div>
        <button class="back-btn" onclick="backToMain()">離開</button>
    </div>
</div>

<div id="shopPage" class="page"><div style="padding:20px;"><h2>🛒 商店</h2><div id="shopList"></div><button class="back-btn" onclick="backToMain()">離開</button></div></div>
<div id="adminPage" class="page"><div style="padding:20px;"><h2>⚙️ 後台</h2><div class="grid"><button onclick="exportJSON()">💾 匯出</button><button onclick="doLightweight()" style="color:red;">🧹 輕量化</button></div><div id="histList" class="card" style="height:350px; overflow-y:auto;"></div><button class="back-btn" onclick="backToMain()">返回</button></div></div>

    stone: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAApElEQVR4XmNgGAWjYBSMAtwAiAnE/EDMC8S8ZOhnA+RGYgMglgJiXyz6QAZIA7EpEEtC9YIEiAExLxBzArEYEEsC/QEDxICYD4h5gVgAiHmp0Y8MkAdiUSDmAmI9qF6QADEg5gNiXiDmBWJeIPZSo58NkBuJOYFYGYglgVgS6A8YIAbEnEDMC8S8QMwLxLxU6GcD5EaiuYNoFEy8YBRQDADl32f91qU7wwAAAABJRU5ErkJggg=="
};

const POKE_NAME = ["妙蛙種子","妙蛙草","妙蛙花","小火龍","火恐龍","噴火龍","傑尼龜","卡咪龜","水箭龜","綠毛蟲","鐵甲蛹","巴大蝶","獨角蟲","鐵殼蛹","大針蜂","波波","比比鳥","比雕","小拉達","拉達","烈雀","大嘴雀","阿柏蛇","阿柏怪","皮卡丘","雷丘","穿山鼠","穿山王","尼多蘭","尼多娜","尼多后","尼多朗","尼多力諾","尼多王","皮皮","皮可西","六尾","九尾","胖丁","胖丁","超音蝠","大嘴蝠","走路草","臭臭花","霸王花"];

let s = {
    bal: 0, pool: 0, megaT: 0,
    items: { poke:10, great:0, ultra:0, master:0, shards:0, stones:0 },
    owned: [{id:25, shiny:false}], buddy: {id:25, shiny:false},
    hist: [], daily: 0, weekly: 0, lastD: "",
    stats: { caught:0, spend:0, yearSums:{} },
    claimed: []
};

function updateUI() {
    const today = new Date().toISOString().split('T')[0];
    if(s.lastD !== today) { s.daily = 0; s.lastD = today; }
    
    // 主頁圖示載入
    document.getElementById('ico-shard').src = ASSETS.shard;
    document.getElementById('ico-stone').src = ASSETS.stone;
    document.getElementById('ico-p').src = ASSETS.poke;
    document.getElementById('ico-g').src = ASSETS.great;
    document.getElementById('ico-u').src = ASSETS.ultra;
    document.getElementById('ico-m').src = ASSETS.master;

    document.getElementById('balance').innerText = s.bal.toLocaleString();
    document.getElementById('shards').innerText = s.items.shards;
    document.getElementById('stones').innerText = s.items.stones;
    document.getElementById('i-p').innerText = s.items.poke;
    document.getElementById('i-g').innerText = s.items.great;
    document.getElementById('i-u').innerText = s.items.ultra;
    document.getElementById('i-m').innerText = s.items.master;

    const isM = Date.now() < s.megaT;
    document.getElementById('shinyRate').innerText = isM ? 20 : 5;
    
    const bImg = document.getElementById('buddyImg');
    bImg.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${s.buddy.id}.png`;
    s.buddy.shiny ? bImg.classList.add('shiny-effect') : bImg.classList.remove('shiny-effect');

    document.getElementById('megaBtn').className = (s.items.stones > 0 && !isM) ? "" : "hidden";
    localStorage.setItem('poke_final_v49', JSON.stringify(s));
}

// --- 任務系統邏輯 ---
function renderTasks() {
    const tasks = [
        { id: 'd3', n: '每日冒險者', d: '記帳完成 3 筆', c: s.daily, g: 3, r: '精靈球 x2' },
        { id: 'w5k', n: '每週金幣狂', d: '消費滿 5000', c: s.weekly, g: 5000, r: '高級球 x1' },
        { id: 'c10', n: '小小蒐集家', d: '捕捉 10 隻', c: s.stats.caught, g: 10, r: '超級球 x3' }
    ];
    document.getElementById('taskList').innerHTML = tasks.map(t => `
        <div class="card">
            <b>${t.n}</b> (${t.c}/${t.g})<br><small>${t.d}</small>
            ${t.c >= t.g && !s.claimed.includes(t.id) ? `<button onclick="claim('${t.id}')">領取獎勵</button>` : ''}
            ${s.claimed.includes(t.id) ? '<span style="color:gray;"> [已領取]</span>' : ''}
        </div>
    `).join('');
}
function claim(id) {
    s.claimed.push(id);
    if(id === 'd3') s.items.poke += 2;
    if(id === 'w5k') s.items.ultra += 1;
    if(id === 'c10') s.items.great += 3;
    alert("獎勵已放入背包！"); renderTasks(); updateUI();
}

// --- 核心功能 (記帳/捕捉/圖表) ---
function record() {
    const a = parseInt(document.getElementById('amt').value); if(!a) return;
    const cat = document.getElementById('cat').value;
    const date = new Date().toISOString().split('T')[0];
    const monthKey = date.slice(0, 7);

    s.bal += a; s.stats.spend += a; s.weekly += a; s.pool += (a/500)*100;
    s.hist.push({ id: Date.now(), date, cat, amt: a });
    
    if(!s.stats.yearSums[monthKey]) s.stats.yearSums[monthKey] = 0;
    s.stats.yearSums[monthKey] += a;

    if(s.daily < 3) s.daily++;
    if(s.pool >= 100) { s.pool = 0; spawn(); }
    updateUI(); document.getElementById('amt').value = "";
}

function spawn() {
    const id = Math.floor(Math.random() * 151) + 1;
    const isS = Math.random() < (Date.now() < s.megaT ? 0.2 : 0.05);
    s.cur = { id, hp: 100, t: 1, isS };
    const p = document.getElementById('pokeImg');
    p.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
    isS ? p.classList.add('shiny-effect') : p.classList.remove('shiny-effect');
    document.getElementById('inputArea').classList.add('hidden');
    document.getElementById('battleActions').classList.remove('hidden');
    document.getElementById('hpWrap').classList.remove('hidden');
    document.getElementById('msgText').innerText = `發現野生的 ${POKE_NAME[id-1] || '寶可夢'}！`;
}

async function handleThrow() {
    const ballType = document.getElementById('ballSelect').value;
    if(s.items[ballType] <= 0 && ballType !== 'master') return alert("球不夠了！");
    if(ballType !== 'master') s.items[ballType]--;

    const ball = document.getElementById('ballOverlay');
    ball.src = ASSETS[ballType]; ball.className = 'ball-throw'; ball.style.display = 'block';
    await new Promise(r => setTimeout(r, 850));
    ball.className = 'ball-shake';

    const rate = {poke:0.3, great:0.5, ultra:0.7, master:1.0}[ballType] + (100-s.cur.hp)/200;
    await new Promise(r => setTimeout(r, 1500));

    if(Math.random() < rate || ballType === 'master') {
        document.getElementById('resText').style.display = 'block';
        s.owned.push({id: s.cur.id, shiny: s.cur.isS}); s.stats.caught++;
        if(s.cur.id <= 151) { s.items.shards++; if(s.items.shards >= 5) { s.items.shards=0; s.items.stones++; } }
        setTimeout(() => { document.getElementById('resText').style.display = 'none'; resetBattle(); }, 1200);
    } else {
        ball.style.display = 'none'; s.cur.t++; document.getElementById('turn').innerText = s.cur.t;
        if(s.cur.t > 8) { alert("跑掉了..."); resetBattle(); }
    }
    updateUI();
}

function drawCharts() {
    const yCtx = document.getElementById('canvasYear').getContext('2d');
    const mCtx = document.getElementById('canvasMonth').getContext('2d');
    const curYear = new Date().getFullYear().toString();
    const curMonth = new Date().toISOString().slice(0, 7);

    const yData = ["01","02","03","04","05","06","07","08","09","10","11","12"].map(m => s.stats.yearSums[`${curYear}-${m}`] || 0);
    const maxVal = Math.max(...yData, 1000);
    yCtx.clearRect(0,0,400,200); yCtx.beginPath(); yCtx.strokeStyle="#3498db";
    yData.forEach((v, i) => {
        const x = 30 + i*30; const y = 160 - (v/maxVal)*140;
        i===0 ? yCtx.moveTo(x,y) : yCtx.lineTo(x,y);
    });
    yCtx.stroke();

    const cats = {}; s.hist.filter(h => h.date.startsWith(curMonth)).forEach(h => cats[h.cat] = (cats[h.cat]||0) + h.amt);
    mCtx.clearRect(0,0,400,200); let i=0;
    for(let c in cats) {
        mCtx.fillStyle="#2ecc71"; const h = (cats[c]/Math.max(...Object.values(cats),1))*140;
        mCtx.fillRect(40+i*70, 160-h, 40, h); mCtx.fillStyle="#333"; mCtx.fillText(c, 40+i*70, 175); i++;
    }
}

// --- 頁面跳轉與後台 ---
function openPanel(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
    document.getElementById(id).classList.add('page-active');
    if(id === 'taskPage') renderTasks();
    if(id === 'buddyPage') renderBuddy();
    if(id === 'shopPage') renderShop();
    if(id === 'chartPage') drawCharts();
    if(id === 'adminPage') renderAdmin();
}
function backToMain() { openPanel('mainPage'); updateUI(); }

function renderShop() {
    const list = [{n:"精靈球", p:100, k:"poke"}, {n:"超級球", p:300, k:"great"}, {n:"高級球", p:600, k:"ultra"}];
    document.getElementById('shopList').innerHTML = list.map(i => `<div class="card" style="display:flex; justify-content:space-between;"><span>${i.n} (P$${i.p})</span><button onclick="buy('${i.k}',${i.p})">購買</button></div>`).join('');
}
function buy(k,p) { if(s.bal>=p){ s.bal-=p; s.items[k]++; renderShop(); updateUI(); } else alert("餘額不足"); }

function renderBuddy() {
    document.getElementById('buddyList').innerHTML = `<h3>🎒 背包資產</h3><p>碎片: ${s.items.shards} | 進化石: ${s.items.stones}</p>` + 
    s.owned.map((p,i) => `<div class="card" onclick="s.buddy=s.owned[${i}];backToMain()">${p.id}號 ${POKE_NAME[p.id-1]||'寶可夢'} ${p.shiny?'✨':''}</div>`).join('');
}

function renderAdmin() {
    document.getElementById('histList').innerHTML = s.hist.slice(-50).reverse().map(h => `<div style="padding:8px; border-bottom:1px solid #ddd;">${h.date} | ${h.cat} | $${h.amt}</div>`).join('');
}

function exportJSON() {
    const blob = new Blob([JSON.stringify(s)], {type:"application/json"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `PokeSave_${Date.now()}.json`; a.click();
}

function doLightweight() {
    if(confirm("將先強制匯出備份，隨後清除 30 天前的紀錄以節省空間（統計圖表會保留）。")) {
        exportJSON();
        const limit = new Date(); limit.setDate(limit.getDate() - 30);
        s.hist = s.hist.filter(h => new Date(h.date) >= limit);
        alert("清理完成！"); backToMain();
    }
}

function atk() { s.cur.hp = Math.max(10, s.cur.hp-25); document.getElementById('hpFill').style.width = s.cur.hp+"%"; }
function megaEvolve() { s.items.stones--; s.megaT = Date.now() + 86400000; alert("MEGA 進化！閃光機率提升至 20%！"); updateUI(); }
function resetBattle() {
    s.cur = null; document.getElementById('ballOverlay').style.display='none';
    document.getElementById('inputArea').classList.remove('hidden');
    document.getElementById('battleActions').classList.add('hidden');
    document.getElementById('hpWrap').classList.add('hidden');
    updateUI();
}

// 初始化
const saved = localStorage.getItem('poke_final_v49');
if(saved) s = JSON.parse(saved);
updateUI();
</script>
</body>
</html>
