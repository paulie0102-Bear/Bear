<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster v52 - 神奧終極版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --p: #2d5a27; --bg: #f8f9fa; --text: #2c3e50; --accent: #f1c40f;
            --mega: #9b59b6; --danger: #e74c3c; --white: #ffffff;
        }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #1a1a1a; margin: 0; color: var(--text); overflow: hidden; }
        
        /* 全屏獨立頁面 */
        .page { display: none; width: 100vw; height: 100vh; background: var(--bg); position: fixed; top: 0; left: 0; z-index: 100; overflow-y: auto; }
        .page-active { display: block; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* 主畫面：極簡戰鬥舞台 */
        .battle-stage { height: 280px; position: relative; background: linear-gradient(#87ceeb 60%, #9cd39c 60%); border-bottom: 4px solid #333; overflow: hidden; }
        .buddy-box { position: absolute; bottom: 30px; left: 40px; width: 110px; z-index: 5; }
        .enemy-box { position: absolute; top: 40px; right: 40px; width: 110px; text-align: center; }
        .hp-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; overflow: hidden; border: 1px solid #000; }
        #hpFill { height: 100%; background: #2ecc71; width: 100%; transition: 0.3s; }
        #ballOverlay { position: absolute; width: 40px; display: none; z-index: 100; }

        /* 圖鑑：左滑動右顯示 */
        .dex-container { display: flex; height: calc(100vh - 120px); background: #eee; margin: 10px; border-radius: 12px; overflow: hidden; }
        .dex-sidebar { width: 40%; overflow-y: scroll; background: #ddd; border-right: 2px solid #ccc; }
        .dex-main { width: 60%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; background: white; }
        .dex-nav-item { padding: 15px 10px; border-bottom: 1px solid #ccc; font-size: 13px; cursor: pointer; text-align: center; }
        .dex-nav-item.active { background: var(--p); color: white; }
        .dex-pokemon-img { width: 150px; height: 150px; object-fit: contain; }

        /* UI 元件 */
        .card { background: var(--white); border-radius: 12px; padding: 15px; margin: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .control-panel { padding: 8px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; background: #333; height: 100px; }
        .btn-nav { background: #444; color: white; border: none; font-size: 11px; border-radius: 8px; }
        .btn-back { background: var(--danger); color: white; width: 100%; padding: 12px; font-weight: bold; }
        
        /* 動畫特效 */
        .ball-throw { display: block !important; animation: ballCurve 0.8s ease-in forwards; }
        .ball-shake { display: block !important; animation: ballShake 0.4s 3; }
        @keyframes ballCurve { 0% { left: 50px; bottom: 50px; } 100% { left: 250px; bottom: 170px; } }
        @keyframes ballShake { 50% { transform: translate(250px, -170px) rotate(20deg); } }
        .gotcha-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); color: gold; font-size: 50px; font-weight: 900; text-shadow: 3px 3px 0 #000; z-index: 200; display: none; }
        .mega-fx { filter: drop-shadow(0 0 15px var(--mega)) hue-rotate(45deg); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="mainPage" style="display:block;">
    <div class="battle-stage">
        <div id="gotcha" class="gotcha-text">GOTCHA!</div>
        <div class="buddy-box"><img id="buddyImg" src="" style="width:100%"></div>
        <div class="enemy-box" id="enemyArea" style="display:none;">
            <div class="hp-bar"><div id="hpFill"></div></div>
            <img id="enemyImg" src="" style="width:100%">
        </div>
        <img id="ballOverlay" src="">
    </div>

    <div id="msg" style="height:50px; background:#fff; padding:10px; font-weight:bold; border-bottom:1px solid #ddd;">載入系統中...</div>

    <div id="inputArea" class="card">
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <select id="cat" style="width:70px;"><option>飲食</option><option>交通</option><option>娛樂</option><option>購物</option><option>其他</option></select>
            <input id="note" type="text" placeholder="品項" style="flex:1;">
            <input id="amt" type="number" placeholder="金額" style="width:70px;">
        </div>
        <button onclick="record()" style="background:var(--p); color:white; width:100%; padding:12px; border:none; border-radius:8px;">記帳探索冒險</button>
    </div>

    <div id="battleActions" class="card hidden" style="border:2px solid var(--p);">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px;">
            <button onclick="attack()" style="background:#e74c3c; color:white; padding:10px; border:none; border-radius:8px;">⚔️ 削弱血量</button>
            <button onclick="tryMega()" style="background:var(--mega); color:white; padding:10px; border:none; border-radius:8px;">🧬 MEGA進化</button>
        </div>
        <div style="display:flex; gap:5px;">
            <select id="ballSelect" style="flex:1;"></select>
            <button onclick="throwBall()" style="background:var(--p); color:white; padding:0 20px; border:none; border-radius:8px;">投球</button>
        </div>
    </div>

    <div class="control-panel">
        <button class="btn-nav" onclick="openPage('statusPage')">👤 狀態</button>
        <button class="btn-nav" onclick="openPage('dexPage')">📖 圖鑑</button>
        <button class="btn-nav" onclick="openPage('chartPage')">📈 報表</button>
        <button class="btn-nav" onclick="openPage('taskPage')">🎯 任務</button>
        <button class="btn-nav" onclick="openPage('shopPage')">🛒 商店</button>
        <button class="btn-nav" onclick="openPage('adminPage')">⚙️ 設定</button>
    </div>
</div>

<div id="dexPage" class="page">
    <div class="dex-container">
        <div class="dex-sidebar" id="dexNav"></div>
        <div class="dex-main" id="dexView">
            <h3 id="dexName">請選擇寶可夢</h3>
            <img id="dexImg" class="dex-pokemon-img" src="">
            <div id="dexControls" class="hidden">
                <div style="margin:10px 0;">
                    <button id="btnShiny" onclick="toggleDexShiny(true)">✨ 閃光</button>
                    <button id="btnNormal" onclick="toggleDexShiny(false)">常規</button>
                </div>
                <button onclick="confirmBuddy()" style="background:var(--p); color:white; padding:10px 20px; border:none; border-radius:20px;">就決定是你了！</button>
            </div>
        </div>
    </div>
    <button class="btn-back" onclick="back()">離開圖鑑</button>
</div>

<div id="chartPage" class="page">
    <div class="card">
        <h3>📈 消費統計報表</h3>
        <div style="height:250px;"><canvas id="chartYear"></canvas></div>
        <div style="height:250px;"><canvas id="chartCat"></canvas></div>
    </div>
    <button class="btn-back" onclick="back()">離開報表</button>
</div>

<div id="statusPage" class="page">
    <div class="card">
        <h3>👤 訓練家狀態</h3>
        <p>錢包：P$ <b id="st-bal"></b></p>
        <hr>
        <p>進化石進度：<span id="p-evo-txt"></span>/5</p>
        <div class="hp-bar"><div id="p-evo-bar" style="height:100%; background:var(--accent);"></div></div>
        <p>Mega石進度：<span id="p-mega-txt"></span>/5</p>
        <div class="hp-bar"><div id="p-mega-bar" style="height:100%; background:var(--mega);"></div></div>
        <hr>
        <h4>背包物品</h4>
        <div id="st-items" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; text-align:center;"></div>
        <button onclick="tryEvolve()" style="background:orange; color:white; width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px;">消耗進化石進化夥伴</button>
    </div>
    <button class="btn-back" onclick="back()">返回</button>
</div>

<div id="adminPage" class="page">
    <div class="card">
        <h3>⚙️ 數據管理中心</h3>
        <button onclick="saveToFile()" class="btn-back" style="background:#2980b9; margin-bottom:10px;">💾 匯出備份檔案 (Save)</button>
        <input type="file" id="loadFile" style="display:none" onchange="loadFromFile(event)">
        <button onclick="document.getElementById('loadFile').click()" class="btn-back" style="background:#27ae60; margin-bottom:10px;">📂 讀取備份檔案 (Load)</button>
        <hr>
        <h4>台灣載具 CSV 匯入</h4>
        <input type="file" id="csvFile" style="display:none" onchange="importCSV(event)">
        <button onclick="document.getElementById('csvFile').click()" class="btn-back" style="background:var(--p);">📑 匯入財政部載具 CSV</button>
        <hr>
        <h4>區間輕量化</h4>
        <input type="date" id="cStart"> ~ <input type="date" id="cEnd">
        <button onclick="archiveData()" class="btn-back" style="background:var(--danger); margin-top:5px;">⚠️ 歸檔並刪除詳細明細</button>
    </div>
    <button class="btn-back" onclick="back()">返回</button>
</div>

<script>
// --- [1-493 全中文名稱索引庫] ---
const POKE_NAMES = ["妙蛙種子","妙蛙草","妙蛙花","小火龍","火恐龍","噴火龍","傑尼龜","卡咪龜","水箭龜","綠毛蟲","鐵甲蛹","巴大蝶","獨角蟲","鐵殼蛹","大針蜂","波波","比比鳥","比雕","小拉達","拉達","烈雀","大嘴雀","阿柏蛇","阿柏怪","皮卡丘","雷丘","穿山鼠","穿山王","尼多蘭","尼多娜","尼多后","尼多朗","尼多力諾","尼多王","皮皮","皮可西","六尾","九尾","胖丁","胖可丁","超音蝠","大嘴蝠","走路草","臭臭花","霸王花","派拉斯","派拉斯特","毛球","末入蛾","地鼠","三地鼠","喵喵","貓老大","可達鴨","哥達鴨","猴怪","火爆猴","卡蒂狗","風速狗","蚊香蝌蚪","蚊香蛙","快泳蛙","凱西","勇吉拉","胡地","腕力","豪力","怪力","喇叭芽","口呆花","大食花","瑪瑙水母","毒刺水母","小拳石","隆隆石","隆隆岩","小火馬","烈焰馬","呆呆獸","呆殼獸","小磁怪","三合一磁怪","大蔥鴨","嘟嘟","嘟嘟利","小海獅","白海獅","臭泥","臭臭泥","大舌貝","刺甲貝","鬼斯","鬼斯通","耿鬼","大岩蛇","催眠貘","引夢貘人","大鉗蟹","巨鉗蟹","霹靂電球","頑皮雷彈","蛋蛋","椰蛋樹","卡拉卡拉","嘎啦嘎啦","飛腿郎","快拳郎","大舌頭","瓦斯彈","雙彈瓦斯","獨角犀牛","鑽角犀獸","吉利蛋","蔓藤怪","袋獸","墨海馬","海刺龍","角金魚","金魚王","海星星","寶石海星星","魔牆人偶","飛天螳螂","迷唇姐","電擊獸","鴨嘴火獸","凱羅斯","肯泰羅","鯉魚王","暴鯉龍","拉普拉斯","百變怪","伊布","水伊布","雷伊布","火伊布","多邊獸","菊石獸","多刺菊石獸","化石盔","鐮刀盔","化石翼龍","卡比獸","急凍鳥","閃電鳥","火焰鳥","迷你龍","哈克龍","快龍","超夢","夢幻","草苗龜","森林龜","土台龜","小火焰猴","猛火猴","烈焰猴","波加曼","波皇子","帝王拿波","姆克兒","姆克鳥","姆克鷹","大牙狸","大尾狸","圓法師","音箱蟀","小貓怪","勒克貓","倫琴貓","含羞苞","羅絲雷朵","頭蓋龍","戰槌龍","盾甲龍","護城龍","結草兒","結草貴婦","紳士蛾","三蜜蜂","蜂后","帕奇利茲","泳圈鼬","浮潛鼬","櫻花寶","櫻花兒","無殼海兔","海牛獸","雙尾怪手","飄飄球","隨風球","捲捲耳","長耳兔","夢妖魔","烏鴉頭頭","魅力喵","東施喵","鈴鐺響","臭鼬噗","坦克臭鼬","銅鏡怪","青銅鐘","盆才怪","魔尼尼","小福蛋","聒噪鳥","花岩怪","圓陸鯊","尖牙陸鯊","烈咬陸鯊","小卡比獸","利歐路","路卡利歐","怪河馬","河馬獸","鉗尾蠍","德王蠍","不良蛙","毒骷蛙","尖牙籠","螢火魚","霓虹魚","小球飛魚","雪笠怪","暴雪王","瑪狃拉","自爆磁怪","大舌舔","超甲狂犀","唐菖蒲","電擊魔獸","鴨嘴炎獸","波克基斯","梅卡陽瑪","葉伊布","冰伊布","天蠍王","象牙豬","多邊獸Ｚ","艾路雷朵","大朝北鼻","黑夜魔靈","雪妖女","洛托姆","由克希","艾姆利多","亞克諾姆","帝牙盧卡","帕路奇亞","席多藍恩","雷吉奇卡斯","騎拉帝納","克雷色利亞","霏歐納","瑪納霏","達克萊伊","謝米","阿爾宙斯"];
const MEGA_DATA = {3: "3-mega", 6: "6-mega-y", 9: "9-mega", 94: "94-mega", 130: "130-mega", 448: "448-mega"};

const POKE_API = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites";

let s = {
    bal: 1000, pool: 0, items: {poke:10, great:5, ultra:0, master:1, stone:0, mstone:0},
    prog: {evo:0, mega:0}, buddyId: 25, isShinyBuddy: false, owned: [25],
    buddy: {megaUntil: 0, dailyMega: ""}, hist: [], yearSums: {}, 
    tasks: {dailyRec: false, dailyCatch: false, weekCatch: 0, totalSpend: 0}, lastDate: new Date().toDateString()
};

// --- [核心功能：UI 刷新與存檔] ---
function updateUI() {
    localStorage.setItem('pokemaster_v52_final', JSON.stringify(s));
    document.getElementById('st-bal').innerText = s.bal.toLocaleString();
    document.getElementById('p-evo-txt').innerText = s.prog.evo;
    document.getElementById('p-evo-bar').style.width = (s.prog.evo/5*100) + "%";
    document.getElementById('p-mega-txt').innerText = s.prog.mega;
    document.getElementById('p-mega-bar').style.width = (s.prog.mega/5*100) + "%";
    
    // 渲染夥伴
    const isMega = Date.now() < s.buddy.megaUntil;
    let imgPath = isMega ? `${POKE_API}/pokemon/${MEGA_DATA[s.buddyId] || s.buddyId+'-mega'}.png` 
                         : `${POKE_API}/pokemon/${s.isShinyBuddy?'shiny/':''}${s.buddyId}.png`;
    document.getElementById('buddyImg').src = imgPath;
    isMega ? document.getElementById('buddyImg').classList.add('mega-fx') : document.getElementById('buddyImg').classList.remove('mega-fx');

    renderBackpack();
}

// --- [圖鑑系統：左滑動右顯示] ---
let tempDexId = 25;
let tempDexShiny = false;

function renderDex() {
    const nav = document.getElementById('dexNav');
    nav.innerHTML = POKE_NAMES.map((name, i) => {
        const id = i + 1;
        const isOwned = s.owned.includes(id);
        return `<div class="dex-nav-item ${tempDexId === id ? 'active' : ''}" onclick="selectDex(${id})">
                    No.${String(id).padStart(3,'0')} ${isOwned ? name : '???' }
                </div>`;
    }).join('');
}

function selectDex(id) {
    tempDexId = id;
    const isOwned = s.owned.includes(id);
    document.getElementById('dexName').innerText = isOwned ? `No.${id} ${POKE_NAMES[id-1]}` : "尚未捕獲";
    document.getElementById('dexControls').className = isOwned ? "" : "hidden";
    renderDex();
    updateDexView();
}

function toggleDexShiny(val) { tempDexShiny = val; updateDexView(); }

function updateDexView() {
    const isOwned = s.owned.includes(tempDexId);
    document.getElementById('dexImg').src = isOwned ? `${POKE_API}/pokemon/${tempDexShiny?'shiny/':''}${tempDexId}.png` : "";
}

function confirmBuddy() {
    s.buddyId = tempDexId;
    s.isShinyBuddy = tempDexShiny;
    alert("就決定是你了！");
    updateUI();
    back();
}

// --- [記帳與探索] ---
function record() {
    const amt = parseInt(document.getElementById('amt').value);
    if (!amt) return;
    const cat = document.getElementById('cat').value;
    const date = new Date().toISOString().split('T')[0];
    const month = date.substring(0, 7);
    s.bal -= amt; s.pool += amt; s.tasks.totalSpend += amt;
    s.hist.push({date, cat, amt, note: document.getElementById('note').value});
    s.yearSums[month] = (s.yearSums[month] || 0) + amt;
    s.tasks.dailyRec = true;
    if (s.pool >= 500) { s.pool -= 500; spawn(); }
    document.getElementById('amt').value = "";
    updateUI();
}

let curE = null;
function spawn() {
    const id = Math.floor(Math.random()*493)+1;
    const isShiny = Math.random() < (Date.now() < s.buddy.megaUntil ? 0.1 : 0.05);
    curE = {id, hp: 100, t: 1, isShiny, name: POKE_NAMES[id-1]};
    document.getElementById('enemyImg').src = `${POKE_API}/pokemon/${isShiny?'shiny/':''}${id}.png`;
    document.getElementById('enemyArea').style.display = "block";
    document.getElementById('battleActions').classList.remove('hidden');
    document.getElementById('inputArea').classList.add('hidden');
    document.getElementById('hpFill').style.width = "100%";
}

async function throwBall() {
    const type = document.getElementById('ballSelect').value;
    if (s.items[type] <= 0 && type!=='master') return alert("球不足");
    if (type !== 'master') s.items[type]--;
    const ball = document.getElementById('ballOverlay');
    ball.src = `${POKE_API}/items/${type}-ball.png`;
    ball.className = 'ball-throw';
    await new Promise(r => setTimeout(r, 800));
    ball.className = 'ball-shake';
    await new Promise(r => setTimeout(r, 1500));
    const rate = {poke:0.3, great:0.5, ultra:0.7, master:1.0}[type] * (1.5 - curE.hp/100);
    if (Math.random() < rate || type === 'master') {
        document.getElementById('gotcha').style.display = "block";
        if (!s.owned.includes(curE.id)) s.owned.push(curE.id);
        s.prog.evo++;
        if ([3,6,9,94,130,448].includes(curE.id)) s.prog.mega++;
        if (s.prog.evo>=5) {s.prog.evo=0; s.items.stone++;}
        if (s.prog.mega>=5) {s.prog.mega=0; s.items.mstone++;}
        setTimeout(resetBattle, 2000);
    } else {
        ball.style.display = 'none'; curE.t++;
        if (curE.t > 8) { alert("逃走了..."); resetBattle(); }
    }
    updateUI();
}

// --- [數據管理：CSV 與 存檔] ---
function saveToFile() {
    const blob = new Blob([JSON.stringify(s)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `PokeMaster_Save_${new Date().toLocaleDateString()}.json`;
    a.click();
}

function loadFromFile(e) {
    const reader = new FileReader();
    reader.onload = (evt) => {
        s = JSON.parse(evt.target.result);
        updateUI();
        alert("讀檔成功！");
    };
    reader.readAsText(e.target.files[0]);
}

function importCSV(e) {
    const reader = new FileReader();
    reader.onload = (evt) => {
        const rows = evt.target.result.split('\n');
        rows.forEach((row, i) => {
            const cols = row.split(',');
            if (i > 0 && cols.length >= 4) {
                const amt = parseInt(cols[3]);
                if (!isNaN(amt)) {
                    s.hist.push({date: cols[0], cat: "購物", amt, note: cols[2]});
                    s.pool += amt;
                    const m = cols[0].substring(0, 7);
                    s.yearSums[m] = (s.yearSums[m] || 0) + amt;
                }
            }
        });
        while (s.pool >= 500) { s.pool -= 500; spawn(); }
        updateUI();
        alert("載具資料匯入成功！");
    };
    reader.readAsText(e.target.files[0]);
}

// --- [輔助工具] ---
function openPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
    document.getElementById(id).classList.add('page-active');
    if (id === 'dexPage') renderDex();
    if (id === 'chartPage') renderCharts();
}
function back() { document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active')); }
function resetBattle() {
    curE = null; document.getElementById('gotcha').style.display = "none";
    document.getElementById('enemyArea').style.display = "none";
    document.getElementById('battleActions').classList.add('hidden');
    document.getElementById('inputArea').classList.remove('hidden');
    document.getElementById('ballOverlay').style.display = "none";
    document.getElementById('ballOverlay').className = "";
}
function tryMega() {
    if (s.items.mstone < 1) return alert("需要Mega石");
    s.items.mstone--; s.buddy.megaUntil = Date.now() + 7200000;
    updateUI();
}
function renderBackpack() {
    const items = [{k:'poke',n:'寶貝球',i:'poke-ball'},{k:'great',n:'超級球',i:'great-ball'},{k:'ultra',n:'高級球',i:'ultra-ball'},{k:'master',n:'大師球',i:'master-ball'},{k:'stone',n:'進化石',i:'shiny-stone'},{k:'mstone',n:'Mega石',i:'mega-stone'}];
    document.getElementById('st-items').innerHTML = items.map(it => `<div><img src="${POKE_API}/items/${it.i}.png" style="width:30px;"><br>${it.n}x${s.items[it.k]}</div>`).join('');
    document.getElementById('ballSelect').innerHTML = ['poke','great','ultra','master'].map(k => `<option value="${k}">${k} x${s.items[k]}</option>`).join('');
}
let chart1, chart2;
function renderCharts() {
    if (chart1) chart1.destroy(); if (chart2) chart2.destroy();
    const ctx1 = document.getElementById('chartYear').getContext('2d');
    const ctx2 = document.getElementById('chartCat').getContext('2d');
    chart1 = new Chart(ctx1, {type:'line', data:{labels:Object.keys(s.yearSums), datasets:[{label:'每月支出', data:Object.values(s.yearSums), borderColor:'green'}]}});
    const cats = ["飲食","交通","娛樂","購物","其他"];
    const catData = cats.map(c => s.hist.filter(h=>h.cat===c).reduce((a,b)=>a+b.amt,0));
    chart2 = new Chart(ctx2, {type:'doughnut', data:{labels:cats, datasets:[{data:catData, backgroundColor:['red','blue','yellow','green','purple']}]}});
}

// 初始化
const saved = localStorage.getItem('pokemaster_v52_final');
if (saved) s = JSON.parse(saved);
updateUI();
</script>
