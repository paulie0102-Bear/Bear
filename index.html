<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster: Final Legacy v40.0</title>
    <style>
        :root { --primary: #2d5a27; --gold: #d4af37; --bg: #e0eed0; --mega: #ff00ff; --hp-green: #4caf50; --task-blue: #3498db; }
        body { font-family: -apple-system, sans-serif; background: #222; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; color: #333; }
        
        /* 戰鬥舞台 */
        .game-screen { width: 100%; max-width: 400px; background: var(--bg); border: 6px solid #444; border-radius: 12px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .battle-stage { height: 240px; position: relative; background: linear-gradient(#b8eaea, #e0eed0); border-bottom: 4px solid #333; overflow: hidden; }
        .buddy-container { position: absolute; bottom: -10px; left: -10px; width: 180px; z-index: 5; }
        #buddyImg { width: 100%; filter: drop-shadow(4px 4px 6px rgba(0,0,0,0.3)); }
        .enemy-container { position: absolute; top: 20px; right: 20px; width: 110px; text-align: center; }
        #pokeImg { width: 100%; transition: 0.3s; }
        .shiny-effect { filter: drop-shadow(0 0 15px gold) brightness(1.2); }
        
        /* 動畫效果 */
        #ballOverlay { position: absolute; width: 35px; display: none; left: 50px; bottom: 50px; z-index: 50; }
        .ball-throw { animation: ballCurve 0.8s forwards ease-in-out; }
        .ball-shake { animation: ballShake 0.5s 3; }
        .ball-success { animation: ballCaptureSuccess 0.5s forwards; }
        @keyframes ballCurve { 0% { transform: translate(0,0) rotate(0); } 50% { transform: translate(100px,-100px) rotate(360deg); } 100% { transform: translate(245px,-115px) rotate(720deg); } }
        @keyframes ballShake { 0%,100% { transform: translate(245px,-115px) rotate(0); } 25% { transform: translate(245px,-115px) rotate(-20deg); } 75% { transform: translate(245px,-115px) rotate(20deg); } }
        @keyframes ballCaptureSuccess { 0% { transform: translate(245px,-115px) scale(1); } 100% { transform: translate(245px,-115px) scale(0); opacity: 0; } }

        /* 星星噴發 */
        .stars-container { position: absolute; top: 55px; right: 55px; width: 40px; height: 40px; pointer-events: none; }
        .star { position: absolute; width: 8px; height: 8px; background: gold; border-radius: 50%; opacity: 0; }
        .star-animate { animation: starBurst 0.6s ease-out forwards; }
        @keyframes starBurst { 0% { transform: translate(0,0); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)); opacity: 0; } }

        /* UI 狀態欄 - 套用您繪製的 Mega 圖示 */
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--primary); color: white; padding: 8px; border-radius: 8px; margin: 10px 0; font-size: 11px; gap: 4px; text-align: center; width: 100%; max-width: 400px; box-sizing: border-box; align-items: center; }
        .stats-bar span { display: flex; align-items: center; justify-content: center; gap: 3px; }
        .item-icon { width: 22px; height: 22px; object-fit: cover; border-radius: 3px; }
        
        /* 訊息與按鈕 */
        .message-box { height: 95px; background: #fff; padding: 10px; font-weight: bold; border-top: 4px solid #888; box-shadow: inset 0 0 0 2px #333; position: relative; overflow-y: auto; box-sizing: border-box; }
        .help-btn { position: absolute; right: 5px; top: 5px; background: #333; color: white; font-size: 10px; border-radius: 4px; padding: 2px 5px; border: none; cursor: pointer; z-index: 10; }
        .card { background: #f8fff0; border: 2px solid var(--primary); padding: 12px; margin-bottom: 8px; border-radius: 10px; width: 100%; max-width: 400px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 10px; border: 2px solid #333; font-weight: bold; cursor: pointer; border-radius: 6px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        
        /* 任務成就 */
        .task-item { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 8px; background: #fff; position: relative; }
        .progress-bar { height: 12px; background: #eee; border-radius: 6px; border: 1px solid #ccc; margin: 5px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--task-blue); transition: 0.5s; }
        .tab-btn { padding: 8px 15px; border: none; background: #ddd; cursor: pointer; border-radius: 5px; margin-right: 5px; }
        .tab-active { background: var(--primary); color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="game-screen">
    <div class="battle-stage">
        <div class="buddy-container"><img id="buddyImg" src=""></div>
        <div class="enemy-container">

                </div>
            </div>
            <img id="pokeImg" src="">

        <img id="ballOverlay" src="">
        <div id="starsArea" class="stars-container"></div>

    <div class="message-box">
        <button class="help-btn" onclick="openModal('helpModal')">❓說明</button>
        <div id="msgInner">正在載入冒險存檔...</div>
    </div>
</div>

<div class="stats-bar">

    <span><img src="https://r.jina.ai/i/e9c1f7b0e8c440f1a9a8340d8924b4c6" class="item-icon"> x<span id="inv-stones">0</span></span>

<div class="card" id="inputArea">

<div id="battleActions" class="card hidden">

</div>

<div class="grid" style="width:100%; max-width:400px;">

    <button onclick="openModal('taskModal')">🎯 任務/成就</button>

    <button onclick="openModal('adminModal')">⚙️ 設定</button>
</div>

<div id="taskModal" class="modal">

    <div style="margin-bottom:15px;">

        <button id="tabA" class="tab-btn" onclick="showTab('A')">長期成就</button>
    </div>
    <div id="contentW">

        <hr>
        <h4>🗓️ 每週消費任務</h4><div id="weeklyList"></div>
    </div>
    <div id="contentA" class="hidden">

    </div>
</div>

<div id="helpModal" class="modal">
    <h3>📖 遊戲指南 <button onclick="closeModals()" style="float:right">❌</button></h3>

        <p><b>3. 成就：</b>累積特定的捕捉數量或消費額，可換取珍貴道具。</p>

</div>

<div id="shopModal" class="modal">

let state = {
    balance: 0, pool: 0, megaTime: 0,
    items: { poke: 10, great: 0, ultra: 0, master: 0, shards: 0, stones: 0 },
    owned: [{id: 25, shiny: false}], buddy: {id: 25, shiny: false},
    history: [], dailyCount: 0, weeklySpend: 0, lastDate: "",
    stats: { caught: 0, spend: 0, shiny: 0 }, claimed: []
};

// --- 成就系統定義 ---
const ACHIEVEMENTS = [
    { id: 'c1', title: '小小捕手', desc: '累計捕捉 10 隻', goal: 10, key: 'caught', r_id: 'great', r_qty: 10 },
    { id: 'c2', title: '大師之路', desc: '累計捕捉 50 隻', goal: 50, key: 'caught', r_id: 'master', r_qty: 1 },
    { id: 's1', title: '第一桶金', desc: '消費累計 3000', goal: 3000, key: 'spend', r_id: 'ultra', r_qty: 5 },
    { id: 'h1', title: '閃光收藏家', desc: '遇見 1 隻閃光', goal: 1, key: 'shiny', r_id: 'stones', r_qty: 1 }
];

// --- 更新畫面 ---
function updateUI() {
    const today = new Date().toISOString().split('T')[0];
    if(state.lastDate !== today) { state.dailyCount = 0; state.lastDate = today; }

    document.getElementById('balance').innerText = state.balance.toLocaleString();
    document.getElementById('megaShard').innerText = state.items.shards;
    document.getElementById('inv-stones').innerText = state.items.stones;
    document.getElementById('inv-poke').innerText = state.items.poke;
    document.getElementById('inv-great').innerText = state.items.great;
    document.getElementById('inv-ultra').innerText = state.items.ultra;
    document.getElementById('inv-master').innerText = state.items.master;
    
    const isM = Date.now() < state.megaTime;
    document.getElementById('shinyRate').innerText = isM ? 20 : 5;

    const bImg = document.getElementById('buddyImg');
    const displayId = (isM && MEGA_ID_MAP[state.buddy.id]) ? MEGA_ID_MAP[state.buddy.id] : state.buddy.id;
    bImg.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${displayId}.png`;
    state.buddy.shiny ? bImg.classList.add('shiny-effect') : bImg.classList.remove('shiny-effect');

    const mBtn = document.getElementById('megaBtn');
    (state.items.stones > 0 && MEGA_ID_MAP[state.buddy.id] && !isM) ? mBtn.classList.remove('hidden') : mBtn.classList.add('hidden');

    if (state.current) {
        document.getElementById('hpFill').style.width = state.current.hp + "%";
        document.getElementById('turnText').innerText = state.current.turn;
    }
    localStorage.setItem('poke_legacy_v40', JSON.stringify(state));
}

// --- 記帳與遭遇 ---
function record() {
    const amt = parseInt(document.getElementById('amt').value); if(!amt) return;
    const date = new Date().toISOString().split('T')[0];
    state.history.push({id: Date.now(), date, cat: document.getElementById('cat').value, note: document.getElementById('note').value||"記帳", amt});
    
    state.balance += amt; state.weeklySpend += amt; state.stats.spend += amt;
    state.pool += (amt / 500) * 100;
    
    let msg = "記帳成功！";
    if(state.dailyCount < 3) { state.dailyCount++; state.items.poke++; msg += " 獲得獎勵 🔴x1"; }
    document.getElementById('msgInner').innerText = msg;
    
    if(state.pool >= 100) { state.pool = 0; spawn(); }
    updateUI(); document.getElementById('amt').value = "";
}

function spawn() {
    const id = Math.floor(Math.random() * 493) + 1;
    const shinyRoll = Math.random() < (Date.now() < state.megaTime ? 0.2 : 0.05);
    state.current = { id, hp: 100, turn: 1, isShiny: shinyRoll };
    
    const pImg = document.getElementById('pokeImg');
    pImg.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
    shinyRoll ? pImg.classList.add('shiny-effect') : pImg.classList.remove('shiny-effect');
    if(shinyRoll) state.stats.shiny++;

    document.getElementById('inputArea').classList.add('hidden');
    document.getElementById('battleActions').classList.remove('hidden');
    document.getElementById('hpWrapper').classList.remove('hidden');
    document.getElementById('msgInner').innerText = `野生的 ${shinyRoll?'✨':''}${POKE_NAMES[id-1]} 出現了！`;
    updateUI();
}

// --- 戰鬥動作 ---
async function throwBall() {
    const b = document.getElementById('ballSelect').value;
    if(state.items[b] <= 0 && b !== 'master') return alert("球數不足");
    if(b !== 'master') state.items[b]--;
    
    const ov = document.getElementById('ballOverlay');
    ov.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/${b}-ball.png`;
    ov.style.display = 'block'; ov.className = 'ball-throw';
    
    await new Promise(r => setTimeout(r, 800));
    ov.className = 'ball-shake';
    await new Promise(r => setTimeout(r, 1500));
    
    const chance = {poke:0.2, great:0.3, ultra:0.4, master:1.0}[b] + (100-state.current.hp)/200;
    if(Math.random() < chance || b === 'master') {
        ov.className = 'ball-success'; triggerStars();
        document.getElementById('msgInner').innerText = "捕捉成功！";
        state.owned.push({id: state.current.id, shiny: state.current.isShiny});
        state.stats.caught++;
        
        if(MEGA_ID_MAP[state.current.id]) {
            state.items.shards++;
            if(state.items.shards >= 5) { state.items.shards = 0; state.items.stones++; }
        }
        setTimeout(resetBattle, 1200);
    } else {
        ov.style.display = 'none';
        state.current.turn++;
        if(state.current.turn > 8) { document.getElementById('msgInner').innerText = "逃走了..."; setTimeout(resetBattle, 1200); }
        else { document.getElementById('msgInner').innerText = "掙脫了！"; }
    }
    updateUI();
}

function triggerStars() {
    const area = document.getElementById('starsArea'); area.innerHTML = '';
    for(let i=0; i<8; i++){
        const s = document.createElement('div'); s.className = 'star star-animate';
        const a = (i*45)*Math.PI/180;
        s.style.setProperty('--tx', Math.cos(a)*40+'px'); s.style.setProperty('--ty', Math.sin(a)*40+'px');
        area.appendChild(s);
    }
}

function atk() { state.current.hp = Math.max(10, state.current.hp - 20); updateUI(); }
function triggerMega() { state.items.stones--; state.megaTime = Date.now() + 86400000; updateUI(); }
function resetBattle() {
    state.current = null; document.getElementById('inputArea').classList.remove('hidden');
    document.getElementById('battleActions').classList.add('hidden');
    document.getElementById('hpWrapper').classList.add('hidden');
    document.getElementById('msgInner').innerText = "正在探索新的領域..."; updateUI();
}

// --- 商店與成就 ---
function showTab(t) {
    document.getElementById('contentW').classList.toggle('hidden', t !== 'W');
    document.getElementById('contentA').classList.toggle('hidden', t !== 'A');
    document.getElementById('tabW').className = t === 'W' ? 'tab-btn tab-active' : 'tab-btn';
    document.getElementById('tabA').className = t === 'A' ? 'tab-btn tab-active' : 'tab-btn';
    renderTasks();
}

function renderTasks() {
    // 每日每週
    document.getElementById('dailyList').innerHTML = `<div class="task-item">每日記帳獎勵 (${state.dailyCount}/3) <div class="progress-bar"><div class="progress-fill" style="width:${(state.dailyCount/3)*100}%"></div></div></div>`;
    const wGoal = 3000;
    document.getElementById('weeklyList').innerHTML = `<div class="task-item">每週累積消費 (${state.weeklySpend}/${wGoal}) <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,(state.weeklySpend/wGoal)*100)}%"></div></div>${state.weeklySpend>=wGoal?`<button onclick="claimWeekly()">領取 🟡x3</button>`:''}</div>`;
    
    // 成就
    document.getElementById('achieveList').innerHTML = ACHIEVEMENTS.map(a => {
        const val = state.stats[a.key]; const done = val >= a.goal; const claimed = state.claimed.includes(a.id);
        return `<div class="task-item"><b>${a.title}</b>: ${a.desc} (${val}/${a.goal})<div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,(val/a.goal)*100)}%; background:#f1c40f;"></div></div>${done && !claimed ? `<button onclick="claimAch('${a.id}')">領取獎勵</button>` : (claimed?'✅ 已領取':'')}</div>`;
    }).join('');
}

function claimWeekly() { state.items.ultra += 3; state.weeklySpend = 0; updateUI(); renderTasks(); }
function claimAch(id) {
    const a = ACHIEVEMENTS.find(x => x.id === id);
    state.items[a.r_id] += a.r_qty; state.claimed.push(id);
    alert(`獲得獎勵！`); updateUI(); renderTasks();
}

// --- 管理與後台 ---
function renderAdmin() {
    document.getElementById('statsArea').innerHTML = `累計捕捉: ${state.stats.caught} | 累計消費: ${state.stats.spend} | 遇見閃光: ${state.stats.shiny}`;
    document.getElementById('recentHistory').innerHTML = state.history.slice(-10).reverse().map(h => `<div style="font-size:12px; border-bottom:1px solid #ddd; padding:5px;">${h.date} ${h.note} $${h.amt} <button onclick="delRec(${h.id})">🗑️</button></div>`).join('');
}
function delRec(id) { const i = state.history.findIndex(x=>x.id===id); if(i>-1){ state.balance-=state.history[i].amt; state.history.splice(i,1); updateUI(); renderAdmin(); } }

function openModal(id) {
    if(id==='taskModal') renderTasks();
    if(id==='adminModal') renderAdmin();
    if(id==='shopModal') {
        document.getElementById('shopList').innerHTML = `
            <div style="padding:10px; border-bottom:1px solid #eee;">精靈球 $100 <button onclick="buy('poke',100)">購買</button></div>
            <div style="padding:10px; border-bottom:1px solid #eee;">超級球 $300 <button onclick="buy('great',300)">購買</button></div>
            <div style="padding:10px; border-bottom:1px solid #eee;">高級球 $600 <button onclick="buy('ultra',600)">購買</button></div>
        `;
    }
    if(id==='buddyModal') {
        const list = [...new Set(state.owned.map(p=>p.id))].sort((a,b)=>a-b);
        document.getElementById('buddyList').innerHTML = list.map(id => `<div onclick="prevB(${id})" style="padding:10px; border-bottom:1px solid #eee;">No.${id} ${POKE_NAMES[id-1]}</div>`).join('');
    }
    document.getElementById(id).style.display = 'block';
}
function buy(id,p){ if(state.balance>=p){ state.balance-=p; state.items[id]++; updateUI(); openModal('shopModal'); } }
function closeModals() { document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }
function prevB(id) { state.tempId = id; document.getElementById('prevImg').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`; document.getElementById('prevName').innerText = POKE_NAMES[id-1]; }
function setBuddy() { state.buddy.id = state.tempId; updateUI(); closeModals(); }

function exportJSON() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
    const a = document.createElement('a'); a.setAttribute("href", dataStr); a.setAttribute("download", "poke_save.json"); a.click();
}
function importCsv(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        ev.target.result.split('\n').forEach((l,i) => {
            if(i===0 || !l.trim()) return;
            const p = l.split(',');
            state.history.push({id:Date.now()+i, date:p[0].replace(/^\uFEFF/,''), cat:p[1], note:p[2], amt:parseInt(p[3])});
            state.balance += parseInt(p[3]);
        });
        updateUI(); alert("匯入成功");
    };
    reader.readAsText(e.target.files[0]);
}

// --- 初始化 ---
const saved = localStorage.getItem('poke_legacy_v40');
if(saved) state = JSON.parse(saved);
updateUI();
</script>
