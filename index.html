<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster v57 - 終極完整版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #2d5a27; --bg: #f4f7f6; --text: #2c3e50; --accent: #f1c40f; --mega: #9b59b6; --danger: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: #1a1a1a; margin: 0; color: var(--text); overflow: hidden; }
        .page { display: none; width: 100vw; height: 100vh; background: var(--bg); position: fixed; top: 0; left: 0; z-index: 100; overflow-y: auto; padding-bottom: 120px; }
        .page-active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 戰鬥舞台 */
        .battle-stage { height: 240px; position: relative; background: linear-gradient(#87ceeb 60%, #9cd39c 60%); border-bottom: 4px solid #333; }
        .pool-ui { position: absolute; top: 10px; left: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 15px; color: white; font-size: 13px; }
        .pool-bar { height: 10px; background: #444; border-radius: 5px; margin-top: 5px; overflow: hidden; border: 1px solid #666; }
        #poolFill { height: 100%; background: linear-gradient(90deg, #f1c40f, #f39c12); width: 0%; transition: 0.5s; }

        /* 角色與動畫 */
        .buddy-box { position: absolute; bottom: 30px; left: 20px; width: 120px; text-align: center; }
        .enemy-box { position: absolute; top: 45px; right: 20px; width: 110px; text-align: center; }
        #ballOverlay { position: absolute; width: 40px; display: none; z-index: 100; pointer-events: none; }
        .hp-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        #hpFill { height: 100%; background: #2ecc71; width: 100%; transition: 0.4s; }

        /* UI 元件 */
        .card { background: white; border-radius: 12px; padding: 15px; margin: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .msg-box { height: 45px; background: #fff; padding: 0 15px; font-weight: bold; border-bottom: 2px solid #eee; color: var(--p); line-height: 45px; overflow: hidden; }
        .nav-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; position: fixed; bottom: 0; width: 100%; height: 110px; background: #222; padding: 8px; box-sizing: border-box; }
        .nav-btn { background: #444; color: white; border: none; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .btn-back { background: var(--danger); color: white; width: calc(100% - 20px); padding: 18px; margin: 10px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; box-shadow: 0 4px #c0392b; cursor: pointer; }
        .btn-back:active { box-shadow: none; transform: translateY(4px); }

        /* 圖鑑佈局 */
        .dex-container { display: flex; height: calc(100vh - 180px); }
        .dex-list { width: 40%; overflow-y: auto; background: #ddd; }
        .dex-item { padding: 12px; border-bottom: 1px solid #ccc; font-size: 13px; cursor: pointer; }
        .dex-item.active { background: var(--p); color: white; }
        .dex-view { width: 60%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; padding: 10px; text-align: center; }

        /* 任務系統樣式 */
        .task-item { border-left: 5px solid var(--p); padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
        .task-progress { font-size: 12px; color: #666; margin-top: 5px; }

        /* 動畫 */
        .shake { animation: ballShake 0.5s 3; }
        @keyframes ballShake { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(20deg); } 75% { transform: rotate(-20deg); } }
        .mega-glow { filter: drop-shadow(0 0 15px var(--mega)); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>

<div id="mainPage">
    <div class="battle-stage">
        <div class="pool-ui">
            冒險能量: $<span id="poolTxt">0</span> / $500
            <div class="pool-bar"><div id="poolFill"></div></div>
        </div>
        <div class="buddy-box">
            <img id="buddyImg" src="" style="width:100px;">
        </div>
        <div class="enemy-box" id="enemyArea" style="display:none;">
            <div class="hp-bar"><div id="hpFill"></div></div>
            <img id="enemyImg" src="" style="width:90px;">
        </div>
        <img id="ballOverlay" src="">
    </div>

    <div id="msg" class="msg-box">系統初始化完成...</div>

    <div id="inputArea" class="card">
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <input type="date" id="recDate" style="flex: 1.5; padding: 8px;">
            <select id="recCat" style="flex: 1; padding: 8px;">
                <option>飲食</option><option>交通</option><option>娛樂</option><option>購物</option><option>其他</option>
            </select>
        </div>
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <input id="recNote" type="text" placeholder="備註內容" style="flex: 2; padding: 10px;">
            <input id="recAmt" type="number" placeholder="金額" style="flex: 1; padding: 10px;">
        </div>
        <button onclick="record()" style="width:100%; padding:15px; background:var(--p); color:white; border:none; border-radius:10px; font-weight:bold; font-size:16px;">同步記帳與探索</button>
    </div>

    <div id="battleActions" class="card" style="display:none; border:3px solid var(--p);">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px;">
            <button onclick="attackEnemy()" style="background:#e74c3c; color:white; padding:12px; border:none; border-radius:8px; font-weight:bold;">⚔️ 攻擊</button>
            <button onclick="megaEvolve()" style="background:var(--mega); color:white; padding:12px; border:none; border-radius:8px; font-weight:bold;">🧬 MEGA進化</button>
        </div>
        <div style="display:flex; gap:8px;">
            <select id="ballSelect" style="flex:1; padding:10px; border-radius:5px;"></select>
            <button onclick="throwBall()" style="background:var(--p); color:white; padding:10px 25px; border:none; border-radius:8px; font-weight:bold;">投球</button>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn" onclick="openPage('chartPage')">📊<br>統計圖表</button>
        <button class="nav-btn" onclick="openPage('dexPage')">📖<br>圖鑑</button>
        <button class="nav-btn" onclick="openPage('shopPage')">💰<br>商店</button>
        <button class="nav-btn" onclick="openPage('statusPage')">👤<br>狀態</button>
        <button class="nav-btn" onclick="openPage('historyPage')">📜<br>歷史</button>
        <button class="nav-btn" onclick="openPage('taskPage')">🎯<br>任務</button>
        <button class="nav-btn" onclick="openPage('adminPage')">⚙️<br>管理</button>
        <button class="nav-btn" onclick="location.reload()">🔄<br>刷新</button>
    </div>
</div>

<div id="chartPage" class="page">
    <div class="card"><h3>🍕 分類消費佔比</h3><canvas id="chartCat"></canvas></div>
    <div class="card"><h3>📈 年度支出趨勢</h3><canvas id="chartTrend"></canvas></div>
    <button class="btn-back" onclick="back()">⬅ 離開頁面</button>
</div>

<div id="dexPage" class="page">
    <div class="dex-container">
        <div class="dex-list" id="dexList"></div>
        <div class="dex-view">
            <h2 id="dexName">#???</h2>
            <img id="dexImg" src="" style="width:160px; height:160px; object-fit:contain;">
            <div style="margin: 15px 0;">
                <button onclick="toggleDexShiny(false)" style="padding:8px 15px;">一般型態</button>
                <button onclick="toggleDexShiny(true)" style="padding:8px 15px;">✨ 閃光</button>
            </div>
            <button onclick="setBuddy()" style="background:var(--p); color:white; padding:12px 25px; border:none; border-radius:30px; font-weight:bold;">就決定是你了</button>
        </div>
    </div>
    <button class="btn-back" onclick="back()">⬅ 離開圖鑑</button>
</div>

<div id="shopPage" class="page">
    <div class="card">
        <h2 style="color:var(--p)">💰 精靈道具商店</h2>
        <p>當前餘額: <b>P$ <span id="shopBal">0</span></b></p>
        <hr>
        <div id="shopItems"></div>
        <p style="font-size:12px; color:gray; margin-top:20px;">* 大師球為非賣品，請透過成就任務獲得。</p>
    </div>
    <button class="btn-back" onclick="back()">⬅ 離開商店</button>
</div>

<div id="statusPage" class="page">
    <div class="card">
        <h3>🎒 訓練家背包</h3>
        <div id="inventory" style="display:grid; grid-template-columns:repeat(3,1fr); gap:15px; text-align:center;"></div>
        <hr>
        <h3>🧬 進化管理</h3>
        <button onclick="evolveBuddy()" style="width:100%; padding:15px; background:#e67e22; color:white; border:none; border-radius:10px; font-weight:bold;">消耗進化石使夥伴進化</button>
    </div>
    <button class="btn-back" onclick="back()">⬅ 離開狀態</button>
</div>

<div id="taskPage" class="page">
    <div class="card">
        <h2>🎯 任務與成就</h2>
        <div id="taskList"></div>
        <hr>
        <div class="task-item" style="border-left-color: gold;">
            <b>🏆 長期成就：消費達人</b><br>
            累計消費每滿 $5000 贈送大師球 (無上限)<br>
            <div class="pool-bar"><div id="achieveFill" style="height:100%; background:gold; width:0%"></div></div>
            <div class="task-progress">目前進度: $<span id="achieveTxt">0</span> / $5000</div>
        </div>
    </div>
    <button class="btn-back" onclick="back()">⬅ 離開任務</button>
</div>

<div id="historyPage" class="page">
    <div class="card">
        <h3>📜 歷史帳務紀錄</h3>
        <div id="histList" style="max-height: 60vh; overflow-y: auto;"></div>
    </div>
    <button class="btn-back" onclick="back()">⬅ 離開紀錄</button>
</div>

<div id="adminPage" class="page">
    <div class="card">
        <h3>⚙️ 資料管理</h3>
        <button onclick="exportJSON()" style="width:100%; padding:12px; margin-bottom:10px;">💾 匯出完整備份 (JSON)</button>
        <button onclick="lighten()" style="width:100%; padding:12px; background:var(--mega); color:white; border:none; border-radius:5px;">🧹 匯出並清理舊資料 (輕量化)</button>
        <hr>
        <button onclick="if(confirm('警告：這將刪除所有遊戲進度與帳務！')) {localStorage.clear(); location.reload();}" style="color:red; width:100%; background:none; border:1px solid red; padding:10px;">🔥 格式化系統</button>
    </div>
    <button class="btn-back" onclick="back()">⬅ 離開管理</button>
</div>

<script>
// --- [ 1. 完整 1-493 名單 ] ---
const NAMES = ["妙蛙種子","妙蛙草","妙蛙花","小火龍","火恐龍","噴火龍","傑尼龜","卡咪龜","水箭龜","綠毛蟲","鐵甲蛹","巴大蝶","獨角蟲","鐵殼蛹","大針蜂","波波","比比鳥","比雕","小拉達","拉達","烈雀","大嘴雀","阿柏蛇","阿柏怪","皮卡丘","雷丘","穿山鼠","穿山王","尼多蘭","尼多娜","尼多后","尼多朗","尼多力諾","尼多王","皮皮","皮可西","六尾","九尾","胖丁","胖可丁","超音蝠","大嘴蝠","走路草","臭臭花","霸王花","派拉斯","派拉斯特","毛球","末入蛾","地鼠","三地鼠","喵喵","貓老大","可達鴨","哥達鴨","猴怪","火爆猴","卡蒂狗","風速狗","蚊香蝌蚪","蚊香蛙","快泳蛙","凱西","勇吉拉","胡地","腕力","豪力","怪力","喇叭芽","口呆花","大食花","瑪瑙水母","毒刺水母","小拳石","隆隆石","隆隆岩","小火馬","烈焰馬","呆呆獸","呆殼獸","小磁怪","三合一磁怪","大蔥鴨","嘟嘟","嘟嘟利","小海獅","白海獅","臭泥","臭臭泥","大舌貝","刺甲貝","鬼斯","鬼斯通","耿鬼","大岩蛇","催眠貘","引夢貘人","大鉗蟹","巨鉗蟹","霹靂電球","頑皮雷彈","蛋蛋","椰蛋樹","卡拉卡拉","嘎啦嘎啦","飛腿郎","快拳郎","大舌頭","瓦斯彈","雙彈瓦斯","獨角犀牛","鑽角犀獸","吉利蛋","蔓藤怪","袋獸","墨海馬","海刺龍","角金魚","金魚王","海星星","寶石海星","魔牆人偶","飛天螳螂","迷唇姐","電擊獸","鴨嘴火獸","凱羅斯","肯泰羅","鯉魚王","暴鯉龍","拉普拉斯","百變怪","伊布","水伊布","雷伊布","火伊布","多邊獸","菊石獸","多刺菊石獸","化石盔","鐮刀盔","化石翼龍","卡比獸","急凍鳥","閃電鳥","火焰鳥","迷你龍","哈克龍","快龍","超夢","夢幻","草苗龜","森林龜","土台龜","小火焰猴","猛火猴","烈焰猴","波加曼","波皇子","帝王拿波","姆克兒","姆克鳥","姆克鷹","大牙狸","大尾狸","圓法師","音箱蟀","小貓怪","勒克貓","倫琴貓","含羞苞","羅絲雷朵","頭蓋龍","戰槌龍","盾甲龍","護城龍","結草兒","結草貴婦","紳士蛾","三蜜蜂","蜂后","帕奇利茲","泳圈鼬","浮潛鼬","櫻花寶","櫻花兒","無殼海兔","海兔獸","長尾怪手","雙尾怪手","飄飄球","隨風球","捲捲耳","長耳兔","夢妖","夢妖魔","黑暗鴉","烏鴉頭頭","魅力喵","東施喵","鈴鐺響","青銅鏡","青銅鐘","盆才怪","愛哭樹","魔尼尼","小福蛋","聒噪鳥","花岩怪","圓陸鯊","尖牙陸鯊","烈咬陸鯊","小卡比獸","利歐路","路卡利歐","怪河馬","河馬獸","鉗尾蠍","龍王蠍","不良蛙","毒骷蛙","尖牙籠","螢火魚","霓虹魚","小球飛魚","雪笠怪","暴雪王","瑪狃拉","自爆磁怪","大舌舔","超甲狂犀","巨蔓藤","電擊魔獸","鴨嘴炎獸","波克基斯","梅卡陽瑪","葉伊布","冰伊布","天蠍王","象牙豬","多邊獸Ｚ","艾路雷朵","大朝北鼻","黑夜魔靈","雪妖女","洛托姆","由克希","艾姆利多","亞克諾姆","帝牙盧卡","帕路奇亞","席多藍恩","雷吉奇卡斯","騎拉帝納","克雷色利亞","瑪納霏","達克萊伊","潔咪","阿爾宙斯"];
const EVOS = { 1:2, 2:3, 4:5, 5:6, 7:8, 8:9, 129:130, 133:[134,135,136,470,471], 387:388, 388:389, 390:391, 391:392, 393:394, 394:395, 443:444, 444:445, 447:448 };
const MEGAs = [3, 6, 9, 15, 18, 65, 94, 130, 150, 445, 448];

let d = {
    bal: 1000, pool: 0, items: {poke:10, great:5, ultra:0, master:1, stone:0, mstone:0},
    owned: [393], shinyOwned: [], buddyId: 393, isShinyBuddy: false,
    achieve: 0, yearSums: {}, catSums: {}, hist: [], megaUntil: 0,
    tasks: {lastDate: "", dRec: 0, dCatch: 0, wRec: 0, wCatch: 0}
};

const API = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites";
let curE = null;
let dexId = 1;
let dexShiny = false;
let battleQ = 0;

// --- [ 2. 核心功能 ] ---
window.onload = () => {
    const saved = localStorage.getItem('pokemaster_v57');
    if(saved) d = JSON.parse(saved);
    checkTaskReset();
    document.getElementById('recDate').valueAsDate = new Date();
    updateUI();
};

function updateUI() {
    localStorage.setItem('pokemaster_v57', JSON.stringify(d));
    document.getElementById('poolTxt').innerText = Math.floor(d.pool);
    document.getElementById('poolFill').style.width = (d.pool / 500 * 100) + "%";
    document.getElementById('shopBal').innerText = d.bal;
    document.getElementById('achieveTxt').innerText = d.achieve;
    document.getElementById('achieveFill').style.width = (d.achieve / 5000 * 100) + "%";

    // 夥伴更新
    const bImg = document.getElementById('buddyImg');
    bImg.src = `${API}/pokemon/${d.isShinyBuddy?'shiny/':''}${d.buddyId}.png`;
    (Date.now() < d.megaUntil) ? bImg.classList.add('mega-glow') : bImg.classList.remove('mega-glow');

    // 下拉選單
    const ballOpts = [['poke','精靈球'],['great','超級球'],['ultra','高級球'],['master','大師球']];
    document.getElementById('ballSelect').innerHTML = ballOpts.map(o => `<option value="${o[0]}">${o[1]} (剩餘 ${d.items[o[0]]})</option>`).join('');

    // 背包
    document.getElementById('inventory').innerHTML = ballOpts.map(o => `<div><img src="${API}/items/${o[0]}-ball.png" width="30"><br>${d.items[o[0]]}</div>`).join('') + 
        `<div>進化石<br>${d.items.stone}</div><div>MEGA石<br>${d.items.mstone}</div>`;

    // 商店 (嚴格限制3種)
    const shopList = [['poke',100,'精靈球'],['great',300,'超級球'],['ultra',600,'高級球']];
    document.getElementById('shopItems').innerHTML = shopList.map(s => `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #eee;">
            <span><img src="${API}/items/${s[0]}-ball.png" width="24"> ${s[2]} ($${s[1]})</span>
            <button onclick="buyItem('${s[0]}',${s[1]})" style="background:var(--p); color:white; border:none; padding:8px 15px; border-radius:5px;">購買</button>
        </div>`).join('');
}

// --- [ 3. 記帳與能量邏輯 ] ---
function record() {
    const amt = parseInt(document.getElementById('recAmt').value);
    const date = document.getElementById('recDate').value;
    const cat = document.getElementById('recCat').value;
    if(!amt || !date) return;

    d.bal += Math.floor(amt * 0.1);
    d.achieve += amt;
    while(d.achieve >= 5000) { d.achieve -= 5000; d.items.master++; alert("🏆 成就達成！獲得大師球一張！"); }

    const mon = date.substring(0,7);
    d.yearSums[mon] = (d.yearSums[mon]||0) + amt;
    d.catSums[cat] = (d.catSums[cat]||0) + amt;
    d.hist.push({id:Date.now(), date, amt, note:document.getElementById('recNote').value, cat});

    d.tasks.dRec++; d.tasks.wRec++;
    d.pool += amt;
    if(d.pool >= 500) {
        battleQ = Math.floor(d.pool/500);
        d.pool %= 500;
        spawnEnemy();
    }
    document.getElementById('recAmt').value = "";
    document.getElementById('msg').innerText = `記帳成功！P$ +${Math.floor(amt*0.1)}`;
    updateUI();
}

function spawnEnemy() {
    const id = Math.floor(Math.random() * 493) + 1;
    const isShiny = Math.random() < (Date.now() < d.megaUntil ? 0.15 : 0.05);
    curE = {id, name:NAMES[id-1], isShiny};
    document.getElementById('enemyImg').src = `${API}/pokemon/${isShiny?'shiny/':''}${id}.png`;
    document.getElementById('enemyArea').style.display = "block";
    document.getElementById('battleActions').style.display = "block";
    document.getElementById('inputArea').style.display = "none";
    document.getElementById('msg').innerText = `野生的 ${curE.name}${isShiny?' ✨':''} 出現了！`;
}

function throwBall() {
    const bType = document.getElementById('ballSelect').value;
    if(d.items[bType] <= 0) return alert("球數不足！");
    d.items[bType]--;
    const ball = document.getElementById('ballOverlay');
    ball.src = `${API}/items/${bType}-ball.png`;
    ball.style.display = "block";
    ball.style.top = "100px"; ball.style.right = "50px";
    ball.className = "shake";

    setTimeout(() => {
        const rate = {poke:0.3, great:0.5, ultra:0.8, master:1}[bType];
        if(Math.random() < rate) {
            d.owned.push(curE.id);
            if(curE.isShiny) d.shinyOwned.push(curE.id);
            MEGAs.includes(curE.id) ? d.items.mstone++ : d.items.stone++;
            d.tasks.dCatch++; d.tasks.wCatch++;
            alert(`成功捕捉 ${curE.name}！獲得石頭獎勵。`);
            resetBattle();
            if(battleQ > 1) { battleQ--; spawnEnemy(); }
        } else {
            alert("逃跑了...");
            resetBattle();
        }
        updateUI();
    }, 1500);
}

function megaEvolve() {
    if(!MEGAs.includes(d.buddyId)) return alert("此夥伴無法進行 MEGA 進化");
    if(d.items.mstone < 1) return alert("MEGA石不足");
    d.items.mstone--;
    d.megaUntil = Date.now() + 600000;
    updateUI();
    alert("🧬 MEGA進化成功！持續10分鐘閃光加成。");
}

function evolveBuddy() {
    const next = EVOS[d.buddyId];
    if(!next) return alert("此夥伴已達進化頂點");
    if(d.items.stone < 1) return alert("進化石不足");
    d.items.stone--;
    d.buddyId = Array.isArray(next) ? next[Math.floor(Math.random()*next.length)] : next;
    if(!d.owned.includes(d.buddyId)) d.owned.push(d.buddyId);
    updateUI();
    alert("恭喜！夥伴已完成進化！");
}

function resetBattle() {
    document.getElementById('enemyArea').style.display = "none";
    document.getElementById('battleActions').style.display = "none";
    document.getElementById('inputArea').style.display = "block";
    document.getElementById('ballOverlay').style.display = "none";
}

// --- [ 4. 統計與任務渲染 ] ---
function openPage(p) {
    document.querySelectorAll('.page').forEach(x => x.classList.remove('page-active'));
    document.getElementById(p).classList.add('page-active');
    if(p==='chartPage') renderCharts();
    if(p==='dexPage') renderDex();
    if(p==='historyPage') renderHist();
    if(p==='taskPage') renderTasks();
}
function back() { document.querySelectorAll('.page').forEach(x => x.classList.remove('page-active')); }

function renderCharts() {
    new Chart(document.getElementById('chartCat'), { type:'pie', data:{ labels:Object.keys(d.catSums), datasets:[{data:Object.values(d.catSums), backgroundColor:['#e74c3c','#3498db','#f1c40f','#2ecc71','#9b59b6']}] } });
    new Chart(document.getElementById('chartTrend'), { type:'line', data:{ labels:Object.keys(d.yearSums).sort(), datasets:[{label:'月支出', data:Object.values(d.yearSums), borderColor:'#2d5a27'}] } });
}

function renderTasks() {
    const t = d.tasks;
    document.getElementById('taskList').innerHTML = `
        <div class="task-item"><b>📅 每日任務</b><div class="task-progress">記帳: ${t.dRec}/1 | 捕捉: ${t.dCatch}/1</div></div>
        <div class="task-item"><b>週挑戰</b><div class="task-progress">記帳: ${t.wRec}/5 | 捕捉: ${t.wCatch}/3</div></div>
    `;
}

function renderDex() {
    document.getElementById('dexList').innerHTML = NAMES.map((n,i)=>{
        const id=i+1; const own=d.owned.includes(id);
        return `<div class="dex-item ${dexId===id?'active':''}" onclick="dexId=${id};renderDex()">${id}. ${own?n:'???' }</div>`;
    }).join('');
    const own = d.owned.includes(dexId);
    document.getElementById('dexName').innerText = own ? `#${dexId} ${NAMES[dexId-1]}` : `#${dexId} ???`;
    document.getElementById('dexImg').src = own ? `${API}/pokemon/${dexShiny?'shiny/':''}${dexId}.png` : "";
}

function renderHist() {
    document.getElementById('histList').innerHTML = d.hist.slice().reverse().map(h => `
        <div style="font-size:12px; border-bottom:1px solid #eee; padding:8px;">
            <b>${h.date}</b> [${h.cat}] $${h.amt}<br><span style="color:gray">${h.note}</span>
            <button onclick="delHist(${h.id})" style="float:right; border:none; background:none; color:red;">[刪除]</button>
        </div>`).join('');
}

function delHist(id) {
    const i = d.hist.findIndex(x=>x.id===id);
    if(i!==-1) {
        const h=d.hist[i]; d.yearSums[h.date.substring(0,7)]-=h.amt; d.catSums[h.cat]-=h.amt;
        d.hist.splice(i,1); renderHist(); updateUI();
    }
}

function checkTaskReset() {
    const now = new Date();
    const today = now.toISOString().split('T')[0];
    if(d.tasks.lastDate !== today) {
        d.tasks.dRec=0; d.tasks.dCatch=0;
        if(now.getDay()===1) { d.tasks.wRec=0; d.tasks.wCatch=0; } // 週一重置
        d.tasks.lastDate = today;
    }
}

function buyItem(t, p) { if(d.bal>=p){d.bal-=p; d.items[t]++; updateUI();} else alert("P$ 不足！"); }
function setBuddy() { if(d.owned.includes(dexId)) { d.buddyId=dexId; d.isShinyBuddy=dexShiny; updateUI(); alert("更換夥伴成功！"); } }
function toggleDexShiny(s) { dexShiny = s; renderDex(); }
function exportJSON() { const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(d)); const a = document.createElement('a'); a.href=data; a.download="pokemaster_save.json"; a.click(); }
function lighten() { exportJSON(); d.hist=[]; updateUI(); alert("資料已匯出並清理明細。"); }
</script>
</body>
</html>
