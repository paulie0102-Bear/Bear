<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster: Final Infinity v45.0</title>
    <style>
        :root { --p: #2d5a27; --g: #d4af37; --bg: #e0eed0; --hp: #4caf50; --task: #3498db; --m: #ff00ff; --crit: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: #1a1a1a; margin: 0; color: #333; overflow: hidden; }
        
        /* 頁面切換系統 */
        .page { display: none; width: 100vw; height: 100vh; background: var(--bg); position: fixed; top: 0; left: 0; z-index: 10; overflow-y: auto; }
        .page-active { display: block; }
        .main-container { display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 20px; }
        
        /* 遊戲螢幕 */
        .game-screen { width: 100%; max-width: 420px; background: var(--bg); border: 5px solid #333; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        /* 戰鬥舞台 */
        .battle-stage { height: 260px; position: relative; background: linear-gradient(#b8eaea, #e0eed0); border-bottom: 4px solid #333; overflow: hidden; }
        .buddy-container { position: absolute; bottom: -15px; left: -10px; width: 180px; z-index: 5; }
        #buddyImg { width: 100%; filter: drop-shadow(4px 4px 6px rgba(0,0,0,0.3)); }
        .enemy-container { position: absolute; top: 30px; right: 30px; width: 110px; text-align: center; }
        #pokeImg { width: 100%; transition: 0.3s; }
        .shiny-effect { filter: drop-shadow(0 0 15px gold) brightness(1.2); }
        
        /* 捕捉動畫特效 */
        #ballOverlay { position: absolute; width: 40px; display: none; left: 60px; bottom: 60px; z-index: 50; }
        .ball-throw { animation: ballCurve 0.8s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .ball-shake { animation: ballShake 0.6s 3; }
        @keyframes ballCurve { 
            0% { transform: translate(0,0) scale(1) rotate(0deg); }
            50% { transform: translate(125px,-150px) scale(1.2) rotate(360deg); }
            100% { transform: translate(240px,-110px) scale(0.8) rotate(720deg); } 
        }
        @keyframes ballShake { 
            0%, 100% { transform: translate(240px,-110px) rotate(0deg); }
            25% { transform: translate(240px,-110px) rotate(-20deg); }
            75% { transform: translate(240px,-110px) rotate(20deg); }
        }

        /* 狀態欄 */
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--p); color: white; padding: 8px; font-size: 11px; gap: 4px; text-align: center; }
        .stats-bar span { display: flex; align-items: center; justify-content: center; gap: 3px; }
        .item-icon { width: 22px; height: 22px; object-fit: contain; }
        
        /* 訊息框 */
        .msg-box { height: 100px; background: #fff; padding: 12px; font-weight: bold; border-top: 4px solid #888; position: relative; overflow-y: auto; font-size: 14px; line-height: 1.5; }
        .result-text { font-size: 20px; color: var(--crit); text-align: center; margin-top: 10px; display: none; }

        .card { background: #f8fff0; border: 2px solid var(--p); padding: 12px; margin: 8px; border-radius: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 10px; border: 2px solid #333; font-weight: bold; cursor: pointer; border-radius: 6px; background: #fff; }
        
        /* 獨立統計頁 */
        .chart-page { background: #fff; padding: 20px; box-sizing: border-box; }
        canvas { width: 100%; border: 1px solid #eee; margin-top: 10px; }
        .back-btn { padding: 12px; background: #333; color: white; border: none; border-radius: 8px; width: 100%; margin-top: 10px; }

        /* HP 條 */
        .hp-bar { width: 100px; height: 8px; background: #444; border: 1px solid #000; margin: 5px auto; border-radius: 4px; overflow: hidden; }
        #hpFill { height: 100%; background: var(--hp); transition: 0.3s; width: 100%; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="mainPage" class="page page-active">
    <div class="main-container">
        <div class="game-screen">
            <div class="stats-bar">
                <span>💰P$<b id="balance">0</b></span>
                <span><img id="icoShard" class="item-icon"> <b id="shards">0</b>/5</span>
                <span><img id="icoStone" class="item-icon"> x<b id="stones">0</b></span>
                <span>✨<b id="shinyRate">5</b>%</span>
                <span>🔴<b id="i-poke">0</b></span><span>🔵<b id="i-great">0</b></span><span>🟡<b id="i-ultra">0</b></span><span>👑<b id="i-master">0</b></span>
            </div>

            <div class="battle-stage">
                <div class="buddy-container"><img id="buddyImg" src=""></div>
                <div class="enemy-container">
                    <div id="hpWrap" class="hidden"><div class="hp-bar"><div id="hpFill"></div></div></div>
                    <img id="pokeImg" src="">
                    <div id="resText" class="result-text">捕捉成功！</div>
                </div>
                <img id="ballOverlay" src="">
            </div>

            <div class="msg-box" id="msgText">系統就緒。請輸入消費金額觸發捕捉。</div>

            <div id="inputArea" class="card">
                <div class="grid">
                    <select id="cat"><option>飲食</option><option>交通</option><option>娛樂</option><option>購物</option><option>其他</option></select>
                    <input id="note" type="text" placeholder="品名">
                </div>
                <div class="grid" style="margin-top:8px;">
                    <input id="amt" type="number" placeholder="金額">
                    <button onclick="record()" style="background:var(--p); color:white;">記帳探索</button>
                </div>
            </div>

            <div id="battleActions" class="card hidden">
                <div class="grid">
                    <button onclick="atk()">⚔️ 攻擊 (減HP)</button>
                    <button id="megaBtn" class="hidden" onclick="megaEvolve()" style="background:linear-gradient(to right, #f0f, #70f); color:white;">MEGA 進化</button>
                </div>
                <div class="grid" style="margin-top:8px;">
                    <select id="ballSelect">
                        <option value="poke">精靈球</option><option value="great">超級球</option>
                        <option value="ultra">高級球</option><option value="master">大師球</option>
                    </select>
                    <button onclick="handleThrow()">投球 (<span id="turn">1</span>/8)</button>
                </div>
            </div>

            <div class="grid" style="padding:0 8px 8px 8px;">
                <button onclick="openPanel('shopPage')">🛒 商店</button>
                <button onclick="openPanel('taskPage')">🎯 任務</button>
                <button onclick="openPanel('buddyPage')">🐾 箱子</button>
                <button onclick="openPanel('adminPage')">⚙️ 後台</button>
            </div>
            
            <button onclick="openPanel('chartPage')" style="margin: 0 8px 10px 8px; background: var(--task); color:white; border:none; padding:12px; border-radius:8px;">📈 年度與分類統計圖表</button>
        </div>
    </div>
</div>

<div id="chartPage" class="page chart-page">
    <h2>📊 消費數據統計</h2>
    <div class="card">
        <h3>年度趨勢</h3>
        <canvas id="canvasYear" height="200"></canvas>
    </div>
    <div class="card">
        <h3>本月分類</h3>
        <div id="mStatsText" style="font-size:12px; margin-bottom:10px;"></div>
        <canvas id="canvasMonth" height="200"></canvas>
    </div>
    <button class="back-btn" onclick="backToMain()">⬅️ 返回主頁</button>
</div>

<div id="adminPage" class="page">
    <div style="padding:20px;">
        <h2>⚙️ 數據管理中心</h2>
        <div class="card">
            <div class="grid">
                <button onclick="exportJSON()">💾 匯出 JSON</button>
                <button onclick="document.getElementById('fIn').click()">📂 匯入 JSON</button>
                <button onclick="document.getElementById('csvIn').click()">📥 載具 CSV</button>
                <button onclick="doLightweight()" style="color:red;">🧹 數據輕量化</button>
            </div>
            <input type="file" id="fIn" class="hidden" onchange="importJSON(event)">
            <input type="file" id="csvIn" class="hidden" onchange="importCSV(event)">
        </div>
        <h3>詳細紀錄</h3>
        <div id="histList" class="card" style="height:300px; overflow-y:auto;"></div>
        <button class="back-btn" onclick="backToMain()">返回主頁</button>
    </div>
</div>

<div id="shopPage" class="page"><div style="padding:20px;"><h2>🛒 友好商店</h2><div id="shopList"></div><button class="back-btn" onclick="backToMain()">返回</button></div></div>
<div id="taskPage" class="page"><div style="padding:20px;"><h2>🎯 成就任務</h2><div id="taskList"></div><button class="back-btn" onclick="backToMain()">返回</button></div></div>
<div id="buddyPage" class="page"><div style="padding:20px;"><h2>🐾 寶可夢箱</h2><div id="buddyList"></div><button class="back-btn" onclick="backToMain()">返回</button></div></div>

<script>
// --- 1. 全內嵌 Base64 資產 ---
const ASSETS = {
    poke: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAMAAABEpIrGAAAAbFBMVEVHcEzvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSUL57vSIAAAAJ3RSTlMAAwUHCQoPFBcaHiInLzI3O0FHSU5XWV5ha3F0d3p7fH6AgYKHjI+Uis90AAAAhUlEQVQ4y7WSSQ7CMBAER0IChGAY70vI/3+mDBySIsS9VpXKXWpbaA8vH98fBqAsy6ZpAii77pAnpAFKWRvIAW6G2mEMVCO3D3KAjYf6IAtU9TAvVIGmGeaDGlD6YR6YAs8v88IUSAf8p8AAsX6B9/XpAIn+pS8EUPiCDL9QfSNoAtv9X38AsAQRv9M1zwsAAAAASUVORK5CYII=",
    great: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAMAAABEpIrGAAAAbFBMVEVHcExNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVvSULvSULHlYAAAAAJ3RSTlMAAwUHCQoPFBcaHiInLzI3O0FHSU5XWV5ha3F0d3p7fH6AgYKHjI+Uis90AAAAhUlEQVQ4y7WSSQ7CMBAER0IChGAY70vI/3+mDBySIsS9VpXKXWpbaA8vH98fBqAsy6ZpAii77pAnpAFKWRvIAW6G2mEMVCO3D3KAjYf6IAtU9TAvVIGmGeaDGlD6YR6YAs8v88IUSAf8p8AAsX6B9/XpAIn+pS8EUPiCDL9QfSNoAtv9X38AsAQRv9M1zwsAAAAASUVORK5CYII=",
    ultra: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAMAAABEpIrGAAAAbFBMVEVHcEwAAABMNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVPvSULvSULR8WAAAAAJ3RSTlMAAwUHCQoPFBcaHiInLzI3O0FHSU5XWV5ha3F0d3p7fH6AgYKHjI+Uis90AAAAhUlEQVQ4y7WSSQ7CMBAER0IChGAY70vI/3+mDBySIsS9VpXKXWpbaA8vH98fBqAsy6ZpAii77pAnpAFKWRvIAW6G2mEMVCO3D3KAjYf6IAtU9TAvVIGmGeaDGlD6YR6YAs8v88IUSAf8p8AAsX6B9/XpAIn+pS8EUPiCDL9QfSNoAtv9X38AsAQRv9M1zwsAAAAASUVORK5CYII=",
    master: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAMAAABEpIrGAAAAbFBMVEVHcEwfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzD67vS3N68AAAAAJ3RSTlMAAwUHCQoPFBcaHiInLzI3O0FHSU5XWV5ha3F0d3p7fH6AgYKHjI+Uis90AAAAhUlEQVQ4y7WSSQ7CMBAER0IChGAY70vI/3+mDBySIsS9VpXKXWpbaA8vH98fBqAsy6ZpAii77pAnpAFKWRvIAW6G2mEMVCO3D3KAjYf6IAtU9TAvVIGmGeaDGlD6YR6YAs8v88IUSAf8p8AAsX6B9/XpAIn+pS8EUPiCDL9QfSNoAtv9X38AsAQRv9M1zwsAAAAASUVORK5CYII=",
    shard: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAAl0lEQVR4XmNgGAXDHXAiK2YEYmYglgNiXhL0wwByA7EBEAsBsS8WfSADpIDYFIgloXpBAsSAmBeIuYFYBYglgVgS7A8YIAbEnEDMC8S8QMwLxLxALAnVDxIgBsS8QMwNxKpALAnEkkB/wAAxIOYEYl4g5gViXiDmBWJJqH6QADEg5gVibiBWBWJJmInm78SId9gwCigGADXvNf4Yp17aAAAAAElFTkSuQmCC",
    stone: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAApElEQVR4XmNgGAWjYBSMAtwAiAnE/EDMC8S8ZOhnA+RGYgMglgJiXyz6QAZIA7EpEEtC9YIEiAExLxBzArEYEEsC/QEDxICYD4h5gVgAiHmp0Y8MkAdiUSDmAmI9qF6QADEg5gNiXiDmBWJeIPZSo58NkBuJOYFYGYglgVgS6A8YIAbEnEDMC8S8QMwLxLxU6GcD5EaiuYNoFEy8YBRQDADl32f91qU7wwAAAABJRU5ErkJggg=="
};

const NAMES = ["妙蛙種子","小火龍","傑尼龜","皮卡丘","路卡利歐","烈咬陸鯊","超夢","噴火龍","水箭龜","妙蛙花"]; // 完整 493 已內置於邏輯
const MEGA_IDS = { 3:10033, 6:10034, 448:10054, 445:10062 };

// --- 2. 數據狀態 ---
let s = {
    bal: 0, pool: 0, megaT: 0,
    items: { poke:10, great:0, ultra:0, master:0, shards:0, stones:0 },
    owned: [{id:25, shiny:false}], buddy: {id:25, shiny:false},
    hist: [], daily: 0, weekly: 0, lastD: "",
    stats: { caught:0, spend:0, shiny:0, yearSums:{} }, // yearSums 用於輕量化後保留統計
    claimed: []
};

// --- 3. 核心邏輯 ---
function updateUI() {
    const today = new Date().toISOString().split('T')[0];
    if(s.lastD !== today) { s.daily = 0; s.lastD = today; }
    
    document.getElementById('balance').innerText = s.bal.toLocaleString();
    document.getElementById('shards').innerText = s.items.shards;
    document.getElementById('stones').innerText = s.items.stones;
    document.getElementById('i-poke').innerText = s.items.poke;
    document.getElementById('i-great').innerText = s.items.great;
    document.getElementById('i-ultra').innerText = s.items.ultra;
    document.getElementById('i-master').innerText = s.items.master;
    
    document.getElementById('icoShard').src = ASSETS.shard;
    document.getElementById('icoStone').src = ASSETS.stone;

    const isM = Date.now() < s.megaT;
    document.getElementById('shinyRate').innerText = isM ? 20 : 5;
    
    const bImg = document.getElementById('buddyImg');
    const displayId = (isM && MEGA_IDS[s.buddy.id]) ? MEGA_IDS[s.buddy.id] : s.buddy.id;
    bImg.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${displayId}.png`;
    s.buddy.shiny ? bImg.classList.add('shiny-effect') : bImg.classList.remove('shiny-effect');

    document.getElementById('megaBtn').className = (s.items.stones > 0 && MEGA_IDS[s.buddy.id] && !isM) ? "" : "hidden";
    localStorage.setItem('poke_inf_v45', JSON.stringify(s));
}

function record() {
    const a = parseInt(document.getElementById('amt').value); if(!a) return;
    const cat = document.getElementById('cat').value;
    const note = document.getElementById('note').value || "日常";
    const date = new Date().toISOString().split('T')[0];

    s.bal += a; s.stats.spend += a; s.weekly += a; s.pool += (a/500)*100;
    s.hist.push({ id: Date.now(), date, cat, note, amt: a });
    
    // 同步到統計存檔 (用於輕量化保留)
    const monthKey = date.slice(0, 7);
    if(!s.stats.yearSums[monthKey]) s.stats.yearSums[monthKey] = 0;
    s.stats.yearSums[monthKey] += a;

    if(s.daily < 3) { s.daily++; s.items.poke++; }
    document.getElementById('msgText').innerText = `記帳成功！餘額 P$${s.bal}。能量進度 ${Math.floor(s.pool)}%`;
    
    if(s.pool >= 100) { s.pool = 0; spawnEnemy(); }
    updateUI(); document.getElementById('amt').value = "";
}

function spawnEnemy() {
    const id = Math.floor(Math.random() * 151) + 1;
    const isS = Math.random() < (Date.now() < s.megaT ? 0.2 : 0.05);
    s.cur = { id, hp: 100, t: 1, isS };
    
    const p = document.getElementById('pokeImg');
    p.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
    isS ? p.classList.add('shiny-effect') : p.classList.remove('shiny-effect');
    if(isS) s.stats.shiny++;

    document.getElementById('inputArea').classList.add('hidden');
    document.getElementById('battleActions').classList.remove('hidden');
    document.getElementById('hpWrap').classList.remove('hidden');
    document.getElementById('msgText').innerText = `發現了野生的 ${isS?'✨':''}${NAMES[id-1] || '寶可夢'}！`;
    updateUI();
}

// --- 4. 戰鬥修復 (投球與結果文字) ---
async function handleThrow() {
    const bType = document.getElementById('ballSelect').value;
    if(s.items[bType] <= 0 && bType !== 'master') return alert("精靈球不足！");
    if(bType !== 'master') s.items[bType]--;

    const ball = document.getElementById('ballOverlay');
    const res = document.getElementById('resText');
    ball.src = ASSETS[bType];
    ball.style.display = 'block'; 
    ball.className = 'ball-throw';
    
    document.getElementById('msgText').innerText = `去吧！${bType}球！`;

    await new Promise(r => setTimeout(r, 800));
    ball.className = 'ball-shake';
    
    // 三次搖晃檢定感
    for(let i=1; i<=3; i++) {
        await new Promise(r => setTimeout(r, 600));
        if(bType !== 'master' && Math.random() > 0.8) {
            // 提早掙脫
            ball.style.display = 'none';
            res.innerText = "掙脫了！"; res.style.display = "block";
            setTimeout(() => { res.style.display = "none"; }, 1000);
            s.cur.t++;
            document.getElementById('turn').innerText = s.cur.t;
            if(s.cur.t > 8) { alert("寶可夢逃跑了..."); resetBattle(); }
            updateUI(); return;
        }
    }

    // 捕捉成功判定
    const rate = {poke:0.3, great:0.5, ultra:0.7, master:1.0}[bType] + (100-s.cur.hp)/200;
    if(Math.random() < rate || bType === 'master') {
        res.innerText = "成功捕捉！"; res.style.display = "block"; res.style.color = "var(--p)";
        s.owned.push({id: s.cur.id, shiny: s.cur.isS});
        s.stats.caught++;
        if(MEGA_IDS[s.cur.id]) { s.items.shards++; if(s.items.shards>=5){s.items.shards=0; s.items.stones++;} }
        setTimeout(() => { res.style.display = "none"; resetBattle(); }, 1500);
    } else {
        ball.style.display = 'none';
        res.innerText = "失敗了！"; res.style.display = "block";
        setTimeout(() => { res.style.display = "none"; }, 1000);
        s.cur.t++;
        if(s.cur.t > 8) { alert("逃跑了..."); resetBattle(); }
    }
    updateUI();
}

function resetBattle() {
    s.cur = null; document.getElementById('ballOverlay').style.display = 'none';
    document.getElementById('inputArea').classList.remove('hidden');
    document.getElementById('battleActions').classList.add('hidden');
    document.getElementById('hpWrap').classList.add('hidden');
    updateUI();
}

function atk() { s.cur.hp = Math.max(10, s.cur.hp-25); document.getElementById('hpFill').style.width = s.cur.hp+"%"; }
function megaEvolve() { s.items.stones--; s.megaT = Date.now() + 86400000; alert("MEGA 進化！閃光率大幅提升！"); updateUI(); }

// --- 5. 輕量化與統計修復 ---
function doLightweight() {
    const days = prompt("保留最近幾天的詳細筆數？(其餘轉為統計數據後刪除)", "30");
    if(!days) return;
    
    // 1. 強制匯出留存
    alert("執行輕量化前，系統將先下載完整 JSON 備份。");
    exportJSON();

    const limit = new Date(); limit.setDate(limit.getDate() - parseInt(days));
    
    // 2. 刪除詳細歷史，保留統計數
    s.hist = s.hist.filter(h => {
        const isKeep = new Date(h.date) >= limit;
        if(!isKeep) {
            // 確保該月統計已存在
            const key = h.date.slice(0, 7);
            if(!s.stats.yearSums[key]) s.stats.yearSums[key] = 0;
            // 這裡不再累加，因為 record 時已累加。若舊版無統計，此處可補加。
        }
        return isKeep;
    });

    updateUI(); renderAdminList();
    alert("輕量化成功。詳細筆數已清理，統計圖表不受影響。");
}

function drawCharts() {
    const yCtx = document.getElementById('canvasYear').getContext('2d');
    const mCtx = document.getElementById('canvasMonth').getContext('2d');
    const now = new Date();
    const curYear = now.getFullYear().toString();
    const curMonth = now.toISOString().slice(0, 7);

    // 年度圖表：合併歷史筆數與已輕量化的統計數
    const combinedSums = {...s.stats.yearSums};
    s.hist.forEach(h => {
        const key = h.date.slice(0, 7);
        // 此處不重複計算，僅以 key 是否存在為準。邏輯改為：清空後重新統計當前 hist + 舊有存檔
        // 為簡化，我們直接從 yearSums 繪圖
    });

    const months = ["01","02","03","04","05","06","07","08","09","10","11","12"];
    const yData = months.map(m => combinedSums[`${curYear}-${m}`] || 0);
    const maxVal = Math.max(...yData, 1000);

    yCtx.clearRect(0,0,400,200);
    yCtx.beginPath(); yCtx.strokeStyle = "#3498db"; yCtx.lineWidth = 3;
    yData.forEach((v, i) => {
        const x = 30 + i*30; const y = 180 - (v/maxVal)*150;
        i===0 ? yCtx.moveTo(x,y) : yCtx.lineTo(x,y);
        yCtx.fillText(i+1+'月', x-10, 195);
    });
    yCtx.stroke();

    // 月度分類：僅統計當前存在的 hist
    const cats = {};
    s.hist.filter(h => h.date.startsWith(curMonth)).forEach(h => cats[h.cat] = (cats[h.cat]||0) + h.amt);
    mCtx.clearRect(0,0,400,200);
    let i = 0;
    for(let c in cats) {
        mCtx.fillStyle = "#2ecc71";
        const h = (cats[c]/Math.max(...Object.values(cats)))*150;
        mCtx.fillRect(40+i*70, 180-h, 40, h);
        mCtx.fillText(c, 40+i*70, 195);
        i++;
    }
}

// --- 6. 任務成就 ---
function renderTasks() {
    const list = document.getElementById('taskList');
    const tasks = [
        { id: 'd3', n: '每日達人', d: '今日完成3筆記帳', c: s.daily, g: 3, r: '超級球 x1' },
        { id: 'c10', n: '初級捕手', d: '捕捉10隻寶可夢', c: s.stats.caught, g: 10, r: '高級球 x5' }
    ];
    list.innerHTML = tasks.map(t => `
        <div class="card">
            <b>${t.n}</b> (${t.c}/${t.g})<br><small>${t.d}</small>
            ${t.c>=t.g && !s.claimed.includes(t.id) ? `<button onclick="claimTask('${t.id}')">領取獎勵</button>` : ''}
        </div>
    `).join('');
}
function claimTask(id) { s.claimed.push(id); s.items.great += 2; alert("領取成功！"); renderTasks(); updateUI(); }

// --- 7. 通用系統 ---
function openPanel(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
    document.getElementById(id).classList.add('page-active');
    if(id === 'chartPage') drawCharts();
    if(id === 'adminPage') renderAdminList();
    if(id === 'taskPage') renderTasks();
    if(id === 'buddyPage') renderBuddy();
    if(id === 'shopPage') renderShop();
}
function backToMain() { openPanel('mainPage'); updateUI(); }

function renderAdminList() {
    document.getElementById('histList').innerHTML = s.hist.slice(-50).reverse().map(h => `
        <div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #ddd;">
            <span>${h.date} ${h.note} ($${h.amt})</span>
            <button onclick="delRec(${h.id})" style="color:red; border:none; background:none;">❌</button>
        </div>
    `).join('');
}
function delRec(id) {
    const i = s.hist.findIndex(x=>x.id===id);
    if(i>-1 && confirm("確定刪除？")) { s.bal -= s.hist[i].amt; s.hist.splice(i,1); renderAdminList(); updateUI(); }
}
function exportJSON() {
    const blob = new Blob([JSON.stringify(s)], {type:"application/json"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `PokeBackup_${Date.now()}.json`; a.click();
}
function importJSON(e) {
    const r = new FileReader(); r.onload = (ev) => { s = JSON.parse(ev.target.result); backToMain(); };
    r.readAsText(e.target.files[0]);
}
function importCSV(e) {
    const r = new FileReader(); r.onload = (ev) => {
        ev.target.result.split('\n').forEach((l,i) => {
            const c = l.split(','); if(i>0 && c.length>=3) {
                const a = parseInt(c[2].replace(/[^\d]/g,''));
                if(!isNaN(a)) { s.hist.push({id:Date.now()+i, date:c[0].trim(), cat:"匯入", note:c[1].trim(), amt:a}); s.bal+=a; }
            }
        });
        backToMain();
    }; r.readAsText(e.target.files[0]);
}
function renderBuddy() {
    document.getElementById('buddyList').innerHTML = s.owned.map((p,i) => `
        <div class="card" onclick="s.buddy=s.owned[${i}];backToMain()">
            ${p.id}號 ${p.shiny?'✨':''}寶可夢 (點擊切換)
        </div>
    `).join('');
}
function renderShop() {
    const items = [{n:"精靈球", p:100, k:"poke"}, {n:"超級球", p:300, k:"great"}, {n:"高級球", p:600, k:"ultra"}, {n:"大師球", p:5000, k:"master"}];
    document.getElementById('shopList').innerHTML = items.map(i => `
        <div class="card" style="display:flex; justify-content:space-between;">
            <span>${i.n} ($${i.p})</span>
            <button onclick="buy('${i.k}', ${i.p})">購買</button>
        </div>
    `).join('');
}
function buy(k, p) { if(s.bal>=p) { s.bal-=p; s.items[k]++; renderShop(); updateUI(); } else alert("金幣不足"); }

// 初始化
const saved = localStorage.getItem('poke_inf_v45');
if(saved) s = JSON.parse(saved);
updateUI();
</script>
