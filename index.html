<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster v56.0 - 完整不刪減版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        :root { 
            --p: #2d5a27; --bg: #f4f7f6; --text: #2c3e50; --accent: #f1c40f;
            --mega: #9b59b6; --danger: #e74c3c; --white: #ffffff; --gray: #95a5a6;
        }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: #1a1a1a; margin: 0; color: var(--text); overflow: hidden; }
        
        .page { display: none; width: 100vw; height: 100vh; background: var(--bg); position: fixed; top: 0; left: 0; z-index: 100; overflow-y: auto; }
        .page-active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .battle-stage { height: 240px; position: relative; background: linear-gradient(#87ceeb 60%, #9cd39c 60%); border-bottom: 4px solid #333; overflow: hidden; }
        .buddy-box { position: absolute; bottom: 20px; left: 30px; width: 100px; transition: 0.3s; }
        .enemy-box { position: absolute; top: 30px; right: 30px; width: 100px; text-align: center; }
        #ballOverlay { position: absolute; width: 40px; display: none; z-index: 100; }
        .hp-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        #hpFill { height: 100%; background: #2ecc71; width: 100%; transition: 0.5s; }

        .dex-container { display: flex; height: calc(100vh - 140px); margin: 10px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .dex-sidebar { width: 40%; overflow-y: auto; background: #e0e0e0; }
        .dex-main { width: 60%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; padding: 15px; }
        .dex-item { padding: 15px 10px; border-bottom: 1px solid #ccc; font-size: 14px; text-align: center; }
        .dex-item.active { background: var(--p); color: white; }

        .card { background: var(--white); border-radius: 12px; padding: 15px; margin: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg-box { height: 40px; background: #fff; padding: 8px 15px; font-weight: bold; border-bottom: 1px solid #ddd; color: var(--p); overflow: hidden; line-height: 24px; }
        
        .control-panel { 
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr);
            gap: 4px; background: #222; height: 120px; position: fixed; bottom: 0; width: 100%; padding: 5px; box-sizing: border-box; 
        }
        .btn-nav { background: #333; color: white; border: none; font-size: 12px; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* 分支進化彈窗樣式 */
        #evoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .evo-dialog { background: white; padding: 20px; border-radius: 15px; width: 85%; max-height: 80%; overflow-y: auto; text-align: center; }
        .evo-choice-btn { background: var(--p); color: white; border: none; padding: 12px; margin: 8px 0; width: 100%; border-radius: 8px; font-weight: bold; }

        .mega-fx { filter: drop-shadow(0 0 10px var(--mega)); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        #megaCountdown { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 2px 8px; border-radius: 5px; font-size: 12px; display: none; }
    </style>
</head>
    
<body>

<div id="mainPage">
    <div class="battle-stage">
        <div id="megaCountdown">🧬 Mega: <span id="timer">--:--</span></div>
        <div id="gotcha" style="display:none;">GOTCHA!</div>
        <div class="buddy-box"><img id="buddyImg" src="" style="width:100%; height:90px; object-fit:contain;"></div>
        <div class="enemy-box" id="enemyArea" style="display:none;">
            <div id="turnTag" style="font-size:10px; color:white; background:rgba(0,0,0,0.5); border-radius:3px;">回合: 1/8</div>
            <div class="hp-bar"><div id="hpFill"></div></div>
            <img id="enemyImg" src="" style="width:100%; height:80px; object-fit:contain;">
        </div>
        <img id="ballOverlay" src="">
    </div>

    <div id="msg" class="msg-box">系統初始化...</div>

    <div id="inputArea" class="card">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:8px;">
            <input type="date" id="recDate">
            <select id="recCat"><option>飲食</option><option>交通</option><option>娛樂</option><option>購物</option><option>其他</option></select>
        </div>
        <div style="display:flex; gap:8px; margin-bottom:8px;">
            <input id="recNote" type="text" placeholder="備註" style="flex:1; padding:8px;">
            <input id="recAmt" type="number" placeholder="金額" style="width:80px; padding:8px;">
        </div>
        <button onclick="record()" style="background:var(--p); color:white; width:100%; padding:12px; border:none; border-radius:8px; font-weight:bold;">記帳並探索</button>
    </div>

    <div id="battleActions" class="card" style="border:2px solid var(--p); display:none;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;">
            <button onclick="attack()" style="background:#e74c3c; color:white; padding:10px; border:none; border-radius:5px;">⚔️ 攻擊 (-33%)</button>
            <button onclick="tryMega()" style="background:var(--mega); color:white; padding:10px; border:none; border-radius:5px;">🧬 MEGA進化</button>
        </div>
        <div style="display:flex; gap:5px;">
            <select id="ballSelect" style="flex:1;">
                <option value="poke">精靈球</option>
                <option value="great">超級球</option>
                <option value="ultra">高級球</option>
                <option value="master">大師球</option>
            </select>
            <button onclick="throwBall()" style="background:var(--p); color:white; padding:0 20px; border:none; border-radius:5px;">投球</button>
        </div>
    </div>

    <div class="control-panel">
        <button class="btn-nav" onclick="openPage('chartPage')">📈<br>報表</button>
        <button class="btn-nav" onclick="openPage('dexPage')">📖<br>圖鑑</button>
        <button class="btn-nav" onclick="openPage('statusPage')">👤<br>狀態</button>
        <button class="btn-nav" onclick="openPage('shopPage')">💰<br>商店</button>
        <button class="btn-nav" onclick="openPage('historyPage')">📜<br>紀錄</button>
        <button class="btn-nav" onclick="openPage('taskPage')">🎯<br>任務</button>
        <button class="btn-nav" onclick="openPage('adminPage')">⚙️<br>管理</button>
        <button class="btn-nav" onclick="location.reload()">🔄<br>刷新</button>
    </div>
</div>

<div id="evoOverlay">
    <div class="evo-dialog">
        <h3>選擇進化分支</h3>
        <div id="evoChoices"></div>
        <button onclick="document.getElementById('evoOverlay').style.display='none'" style="margin-top:15px; border:none; background:none; color:gray;">取消</button>
    </div>
</div>

    if (s.items[ballType] <= 0) return alert("球不夠了！");
    
    s.items[ballType]--;
    const rates = { poke: 0.3, great: 0.5, ultra: 0.7, master: 1.0 };
    const bonus = (100 - curE.hp) / 100 * 0.5; // 血量越低加成越高
    const finalRate = rates[ballType] + bonus;

    logMsg(`投出了 ${document.getElementById('ballSelect').selectedOptions[0].text}...`);
    
    if (Math.random() < finalRate) {
        logMsg(`成功捕捉 ${curE.name}！`);
        if (!s.owned.includes(curE.id)) s.owned.push(curE.id);
        if (curE.isShiny && !s.shinyOwned.includes(curE.id)) s.shinyOwned.push(curE.id);
        addExp(15);
        s.tasks.dCatch++;
        setTimeout(resetBattle, 1500);
    } else {
        logMsg("可惜！差一點就抓到了！");
        curTurn++;
        if (curTurn > 8) {
            alert("寶可夢趁亂逃走了！");
            resetBattle();
        } else {
            updateBattleUI();
        }
    }
    save();
}

// --- [ 進化系統 (含分支選擇) ] ---
function openPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
    document.getElementById(pageId).classList.add('page-active');
    if(pageId === 'dexPage') renderDex();
    if(pageId === 'historyPage') renderHistory();
}

function tryMega() {
    const megaId = MEGA_LIST[s.buddyId];
    if (!megaId) return alert("這隻寶可夢目前無法 Mega 進化");
    if (s.items.mstone <= 0) return alert("能量不足 (需要 1 個 Mega 石)");

    s.items.mstone--;
    s.buddy.megaUntil = Date.now() + (120 * 60 * 1000); // 120 分鐘
    alert(`${NAMES[s.buddyId-1]} 成功 Mega 進化！力量湧現，持續 2 小時！`);
    save();
    updateUI();
}

function executeEvolve(tid) {
    s.buddyId = tid;
    s.items.stone--;
    if(!s.owned.includes(tid)) s.owned.push(tid);
    document.getElementById('evoOverlay').style.display = "none";
    alert(`進化成功！目前的夥伴是 ${NAMES[tid-1]}`);
    save();
    updateUI();
}

// --- [ 經驗與等級 ] ---
function addExp(v) {
    s.playerExp += v;
    let nextLv = s.playerLv * 100;
    if (s.playerExp >= nextLv) {
        s.playerLv++;
        s.playerExp -= nextLv;
        alert(`🎉 等級提升至 Lv.${s.playerLv}！`);
    }
}

// --- [ 管理功能：CSV 與 輕量化 ] ---
function handleCSV(event) {
    const file = event.target.files[0];
    const reader = new FileReader();
    reader.onload = function(e) {
        const rows = e.target.result.split('\n');
        rows.forEach(row => {
            const cols = row.split(',');
            if (cols.length >= 2) {
                const amt = parseInt(cols[3]);
                if(!isNaN(amt)) {
                    s.hist.push({ date: cols[0], cat: cols[1], note: cols[2], amt: amt });
                    s.bal -= amt;
                }
            }
        });
        save();
        alert("載具 CSV 匯入完成！");
        updateUI();
    };
    reader.readAsText(file);
}

function performLighten() {
    const start = prompt("請輸入開始日期 (YYYY-MM-DD):");
    const end = prompt("請輸入結束日期 (YYYY-MM-DD):");
    if(!start || !end) return;

    const toBackup = s.hist.filter(h => h.date >= start && h.date <= end);
    if(toBackup.length === 0) return alert("此區間無紀錄");

    // 備份
    const blob = new Blob([JSON.stringify(toBackup, null, 2)], {type: "application/json"});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `PokeMaster_Backup_${start}_to_${end}.json`;
    a.click();

    // 刪除
    s.hist = s.hist.filter(h => h.date < start || h.date > end);
    save();
    alert(`成功備份並刪除 ${toBackup.length} 筆明細，總額已保留在年度統計中。`);
}

// --- [ 介面更新 ] ---
function updateUI() {
    const isMega = Date.now() < s.buddy.megaUntil;
    const mId = MEGA_LIST[s.buddyId];
    
    // Mega 圖片切換
    if (isMega && mId) {
        document.getElementById('buddyImg').src = `${API}/pokemon/other/official-artwork/${mId.split('-')[0]}.png`; 
        document.getElementById('buddyImg').classList.add('mega-fx');
    } else {
        document.getElementById('buddyImg').src = `${API}/pokemon/${s.isShinyBuddy?'shiny/':''}${s.buddyId}.png`;
        document.getElementById('buddyImg').classList.remove('mega-fx');
    }
    
    // 更新餘額與球數等 UI (範例)
    document.getElementById('msg').innerText = `錢包: $${s.bal} | 經驗: ${s.playerExp}/${s.playerLv*100}`;
}

// 啟動計時與初始化
setInterval(() => {
    const now = Date.now();
    const countdown = document.getElementById('megaCountdown');
    if (now < s.buddy.megaUntil) {
        const diff = s.buddy.megaUntil - now;
        const m = Math.floor(diff/60000);
        const sec = Math.floor((diff%60000)/1000);
        countdown.style.display = "block";
        document.getElementById('timer').innerText = `${m}:${sec.toString().padStart(2,'0')}`;
    } else {
        countdown.style.display = "none";
        // 如果剛結束 Mega，刷新一下圖標
        if(document.getElementById('buddyImg').classList.contains('mega-fx')) updateUI();
    }
}, 1000);

window.onload = () => {
    updateUI();
};
</script>
