<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster: Final Infinity v44.0</title>
    <style>
        :root { --p: #2d5a27; --g: #d4af37; --bg: #e0eed0; --hp: #4caf50; --task: #3498db; --m: #ff00ff; }
        body { font-family: -apple-system, sans-serif; background: #1a1a1a; margin: 0; color: #333; overflow-x: hidden; }
        
        /* 頁面切換系統 */
        .page { display: none; width: 100vw; height: 100vh; background: var(--bg); position: fixed; top: 0; left: 0; z-index: 10; overflow-y: auto; }
        .page-active { display: block; }
        .main-container { display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 20px; }
        
        /* 遊戲螢幕佈局 */
        .game-screen { width: 100%; max-width: 420px; background: var(--bg); border: 5px solid #333; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        /* 戰鬥舞台 */
        .battle-stage { height: 240px; position: relative; background: linear-gradient(#b8eaea, #e0eed0); border-bottom: 4px solid #333; overflow: hidden; }
        .buddy-container { position: absolute; bottom: -15px; left: -10px; width: 180px; z-index: 5; }
        #buddyImg { width: 100%; filter: drop-shadow(4px 4px 6px rgba(0,0,0,0.3)); }
        .enemy-container { position: absolute; top: 25px; right: 25px; width: 110px; text-align: center; }
        #pokeImg { width: 100%; transition: 0.3s; }
        .shiny-effect { filter: drop-shadow(0 0 15px gold) brightness(1.2); }
        
        /* 狀態欄 */
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--p); color: white; padding: 8px; font-size: 11px; gap: 4px; text-align: center; }
        .stats-bar span { display: flex; align-items: center; justify-content: center; gap: 3px; }
        .item-icon { width: 22px; height: 22px; object-fit: contain; }
        
        /* 訊息與控制 */
        .msg-box { height: 90px; background: #fff; padding: 12px; font-weight: bold; border-top: 4px solid #888; position: relative; overflow-y: auto; }
        .card { background: #f8fff0; border: 2px solid var(--p); padding: 12px; margin: 8px; border-radius: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 10px; border: 2px solid #333; font-weight: bold; cursor: pointer; border-radius: 6px; background: #fff; }
        .btn-p { background: var(--p); color: white; }
        
        /* 統計圖表頁專屬樣式 */
        .chart-page { background: #fff; padding: 20px; box-sizing: border-box; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { padding: 10px 20px; background: #333; color: white; border-radius: 5px; border: none; }
        canvas { width: 100%; height: auto; margin-top: 20px; }
        
        /* 歷史與列表 */
        .hist-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .del-btn { color: #e74c3c; border: none; background: none; font-size: 18px; }
        .hp-bar { width: 100px; height: 8px; background: #444; border: 1px solid #000; margin: 5px auto; border-radius: 4px; overflow: hidden; }
        #hpFill { height: 100%; background: var(--hp); transition: 0.3s; }
    </style>
</head>
<body>

<div id="mainPage" class="page page-active">
    <div class="main-container">

                <div class="grid" style="margin-top:8px;">

                </div>
            </div>

            <div id="battleActions" class="card hidden">

                <div class="grid" style="margin-top:8px;">
                    <select id="ballSelect"><option value="poke">精靈球</option><option value="great">超級球</option><option value="ultra">高級球</option><option value="master">大師球</option></select>
                    <button onclick="throwBall()">投球 (<span id="turn">1</span>/8)</button>
                </div>
            </div>

            <div class="grid" style="padding:0 8px 8px 8px;">
                <button onclick="openPanel('shopModal')">🛒 商店</button>
                <button onclick="openPanel('taskModal')">🎯 成就</button>
                <button onclick="openPanel('buddyModal')">🐾 寶可夢箱</button>
                <button onclick="openPanel('adminModal')">⚙️ 後台管理</button>
            </div>
            
            <div class="card" style="text-align: center; border-color: var(--task);">
                <button onclick="showChartPage()" style="width: 100%; background: var(--task); color: white;">📈 查看年度/月度消費統計圖表</button>
            </div>
        </div>
    </div>
</div>

<div id="chartPage" class="page chart-page">
    <div class="chart-header">
        <h2>📊 消費數據統計</h2>
        <button class="back-btn" onclick="backToMain()">⬅️ 返回主頁</button>
    </div>
    
    <div class="card">
        <h3>年度趨勢 (2026)</h3>
        <canvas id="canvasYear" height="200"></canvas>
    </div>
    
    <div class="card">
        <h3>當月分類消費</h3>
        <div id="monthStatsText"></div>
        <canvas id="canvasMonth" height="200"></canvas>
    </div>
</div>

<div id="adminModal" class="page">
    <div style="padding: 20px;">
        <div class="chart-header">
            <h2>⚙️ 後台數據維護</h2>

        <div class="card">

</div>

let s = {
    bal: 0, pool: 0, megaT: 0,
    items: { poke:10, great:0, ultra:0, master:0, shards:0, stones:0 },
    owned: [{id:25, shiny:false}], buddy: {id:25, shiny:false},
    hist: [], daily: 0, weekly: 0, lastD: "",

};

// --- 介面跳轉系統 ---
function openPanel(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
    document.getElementById(id).classList.add('page-active');
    if(id === 'adminModal') renderAdminList();
    if(id === 'buddyModal') renderBuddyList();
    if(id === 'shopModal') renderShop();
}

function backToMain() {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
    document.getElementById('mainPage').classList.add('page-active');
    updateUI();
}

function showChartPage() {
    openPanel('chartPage');
    drawCharts();
}

// --- 核心邏輯 ---
function updateUI() {
    const today = new Date().toISOString().split('T')[0];
    if(s.lastD !== today) { s.daily = 0; s.lastD = today; }
    
    document.getElementById('balance').innerText = s.bal.toLocaleString();
    document.getElementById('shards').innerText = s.items.shards;
    document.getElementById('stones').innerText = s.items.stones;
    document.getElementById('i-poke').innerText = s.items.poke;
    document.getElementById('i-great').innerText = s.items.great;
    document.getElementById('i-ultra').innerText = s.items.ultra;
    document.getElementById('i-master').innerText = s.items.master;
    
    const isM = Date.now() < s.megaT;
    document.getElementById('shinyRate').innerText = isM ? 20 : 5;
    
    const bImg = document.getElementById('buddyImg');
    const displayId = (isM && MEGA_DATA[s.buddy.id]) ? MEGA_DATA[s.buddy.id] : s.buddy.id;
    bImg.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${displayId}.png`;
    s.buddy.shiny ? bImg.classList.add('shiny-effect') : bImg.classList.remove('shiny-effect');

    document.getElementById('megaBtn').className = (s.items.stones > 0 && MEGA_DATA[s.buddy.id] && !isM) ? "" : "hidden";
    localStorage.setItem('poke_inf_v44', JSON.stringify(s));
}

function record() {
    const a = parseInt(document.getElementById('amt').value); if(!a) return;
    const cat = document.getElementById('cat').value;
    const note = document.getElementById('note').value || "日常開銷";
    const date = new Date().toISOString().split('T')[0];

    s.bal += a; s.stats.spend += a; s.pool += (a/500)*100;
    s.hist.push({ id: Date.now(), date, cat, note, amt: a });
    
    if(s.daily < 3) { s.daily++; s.items.poke++; }
    document.getElementById('msgText').innerText = `記帳成功！獲得獎勵球，能量進度: ${Math.floor(s.pool)}%`;
    
    if(s.pool >= 100) { s.pool = 0; spawn(); }
    updateUI(); document.getElementById('amt').value = "";
}

function spawn() {
    const id = Math.floor(Math.random() * 493) + 1;
    const isS = Math.random() < (Date.now() < s.megaT ? 0.2 : 0.05);
    s.cur = { id, hp: 100, t: 1, isS };
    document.getElementById('pokeImg').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
    isS ? document.getElementById('pokeImg').classList.add('shiny-effect') : document.getElementById('pokeImg').classList.remove('shiny-effect');
    document.getElementById('inputArea').classList.add('hidden');
    document.getElementById('battleActions').classList.remove('hidden');
    document.getElementById('hpWrap').classList.remove('hidden');
    document.getElementById('msgText').innerText = `野生的 ${isS?'✨':''}${NAMES[id-1]} 出現了！`;
}

async function throwBall() {
    const type = document.getElementById('ballSelect').value;
    if(s.items[type] <= 0 && type !== 'master') return alert("球不夠了！");
    if(type !== 'master') s.items[type]--;

    const ball = document.getElementById('ballOverlay');
    ball.style.display = 'block'; ball.className = 'ball-throw';
    await new Promise(r => setTimeout(r, 800)); ball.className = 'ball-shake';
    await new Promise(r => setTimeout(r, 1200));

    const rate = {poke:0.25, great:0.45, ultra:0.65, master:1.0}[type] + (100-s.cur.hp)/200;
    if(Math.random() < rate || type === 'master') {
        s.owned.push({id: s.cur.id, shiny: s.cur.isS});
        if(MEGA_DATA[s.cur.id]) { s.items.shards++; if(s.items.shards >= 5) { s.items.shards=0; s.items.stones++; } }
        alert("捕捉成功！"); reset();
    } else {
        ball.style.display = 'none'; s.cur.t++;
        document.getElementById('turn').innerText = s.cur.t;
        if(s.cur.t > 8) { alert("逃跑了..."); reset(); }
    }
    updateUI();
}

function reset() {
    s.cur = null; document.getElementById('ballOverlay').style.display = 'none';
    document.getElementById('inputArea').classList.remove('hidden');
    document.getElementById('battleActions').classList.add('hidden');
    document.getElementById('hpWrap').classList.add('hidden');
    updateUI();
}
function atk() { s.cur.hp = Math.max(10, s.cur.hp-25); document.getElementById('hpFill').style.width = s.cur.hp+"%"; }
function megaEvolve() { s.items.stones--; s.megaT = Date.now() + 86400000; updateUI(); }

// --- 統計圖表繪製 ---
function drawCharts() {
    const yearCtx = document.getElementById('canvasYear').getContext('2d');
    const monthCtx = document.getElementById('canvasMonth').getContext('2d');
    const now = new Date();
    const curYear = now.getFullYear();
    const curMonth = now.toISOString().slice(0, 7);

    // 年度趨勢
    const yData = Array(12).fill(0);
    s.hist.forEach(h => { if(h.date.startsWith(curYear)) yData[new Date(h.date).getMonth()] += h.amt; });
    const yMax = Math.max(...yData, 100);
    yearCtx.clearRect(0,0,400,200);
    yearCtx.beginPath(); yearCtx.strokeStyle = '#3498db'; yearCtx.lineWidth = 3;
    yData.forEach((d, i) => {
        const x = 30 + i*30; const y = 180 - (d/yMax)*150;
        i===0 ? yearCtx.moveTo(x,y) : yearCtx.lineTo(x,y);
        yearCtx.fillText(i+1+'M', x-5, 195);
    });
    yearCtx.stroke();

    // 月度分類
    const cats = {};
    s.hist.filter(h => h.date.startsWith(curMonth)).forEach(h => cats[h.cat] = (cats[h.cat]||0) + h.amt);
    let mHtml = `<b>${curMonth} 總計: $${Object.values(cats).reduce((a,b)=>a+b, 0)}</b><br>`;
    monthCtx.clearRect(0,0,400,200);
    let startIdx = 0;
    for(let c in cats) {
        monthCtx.fillStyle = ['#ff7675','#fdcb6e','#55efc4','#81ecec','#a29bfe'][startIdx%5];
        const h = (cats[c] / Math.max(...Object.values(cats))) * 150;
        monthCtx.fillRect(30 + startIdx*60, 180-h, 40, h);
        monthCtx.fillText(c, 30 + startIdx*60, 195);
        mHtml += `${c}: $${cats[c]} | `;
        startIdx++;
    }
    document.getElementById('monthStatsText').innerHTML = mHtml;
}

// --- 後台管理邏輯 ---
function renderAdminList() {
    document.getElementById('historyList').innerHTML = s.hist.slice(-50).reverse().map(h => `
        <div class="hist-item">
            <span>[${h.date}] ${h.note} ($${h.amt})</span>
            <button class="del-btn" onclick="deleteRec(${h.id})">❌</button>
        </div>
    `).join('');
}
function deleteRec(id) {
    const i = s.hist.findIndex(x => x.id === id);
    if(i > -1 && confirm("刪除此筆將扣除金幣，確定？")) {
        s.bal -= s.hist[i].amt; s.hist.splice(i, 1);
        renderAdminList(); updateUI();
    }
}
function purgeData() {
    const days = prompt("保留最近幾天的數據？", "30");
    if(!days) return;
    saveJSON();
    const limit = new Date(); limit.setDate(limit.getDate() - parseInt(days));
    s.hist = s.hist.filter(h => new Date(h.date) >= limit);
    renderAdminList(); updateUI(); alert("清理完成，舊數據已匯出備份。");
}
function saveJSON() {
    const blob = new Blob([JSON.stringify(s)], {type: "application/json"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `PokeBackup_${Date.now()}.json`; a.click();
}
function loadJSON(e) {
    const r = new FileReader();
    r.onload = (ev) => { s = JSON.parse(ev.target.result); backToMain(); };
    r.readAsText(e.target.files[0]);
}
function importCSV(e) {
    const r = new FileReader();
    r.onload = (ev) => {
        ev.target.result.split('\n').forEach((row, i) => {
            if(i === 0 || !row.trim()) return;
            const cols = row.split(',');
            if(cols.length >= 3) {
                const a = parseInt(cols[2].replace(/[^\d]/g, ''));
                if(!isNaN(a)) { s.hist.push({id:Date.now()+i, date:cols[0].trim(), cat:"匯入", note:cols[1].trim(), amt:a}); s.bal += a; }
            }
        });
        backToMain();
    };
    r.readAsText(e.target.files[0]);
}

// --- 列表渲染 ---
function renderBuddyList() {
    document.getElementById('buddyList').innerHTML = s.owned.map((p,i) => `
        <div class="card" onclick="s.buddy=s.owned[${i}];backToMain()">
            ${p.id}號 ${NAMES[p.id-1]} ${p.shiny?'✨':''}
        </div>
    `).join('');
}
function renderShop() {
    const shopItems = [{n:"精靈球", p:100, k:"poke"}, {n:"超級球", p:300, k:"great"}, {n:"高級球", p:600, k:"ultra"}, {n:"大師球", p:5000, k:"master"}];
    document.getElementById('shopList').innerHTML = shopItems.map(i => `
        <div class="card" style="display:flex; justify-content:space-between;">
            <span>${i.n} ($${i.p})</span>
            <button onclick="buy('${i.k}', ${i.p})">購買</button>
        </div>
    `).join('');
}
function buy(k, p) { if(s.bal >= p) { s.bal -= p; s.items[k]++; renderShop(); } else alert("餘額不足"); }

// 初始化啟動
const saved = localStorage.getItem('poke_inf_v44');
if(saved) s = JSON.parse(saved);
updateUI();
</script>
