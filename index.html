<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster: Apex v39.0</title>
    <style>
        :root { --primary: #2d5a27; --gold: #d4af37; --bg: #e0eed0; --mega: #ff00ff; --hp-green: #4caf50; --task-blue: #3498db; }
        body { font-family: -apple-system, sans-serif; background: #222; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; color: #333; }
        
        /* 戰鬥舞台 */
        .game-screen { width: 100%; max-width: 400px; background: var(--bg); border: 6px solid #444; border-radius: 12px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .battle-stage { height: 240px; position: relative; background: linear-gradient(#b8eaea, #e0eed0); border-bottom: 4px solid #333; overflow: hidden; }
        .buddy-container { position: absolute; bottom: -10px; left: -10px; width: 180px; z-index: 5; }
        #buddyImg { width: 100%; filter: drop-shadow(4px 4px 6px rgba(0,0,0,0.3)); }
        .enemy-container { position: absolute; top: 20px; right: 20px; width: 110px; text-align: center; }
        #pokeImg { width: 100%; transition: 0.3s; }
        .shiny-effect { filter: drop-shadow(0 0 10px gold) sepia(0.5) brightness(1.2); }
        
        /* 動畫特效 */
        #ballOverlay { position: absolute; width: 35px; display: none; left: 50px; bottom: 50px; z-index: 50; }
        .ball-throw { animation: ballCurve 0.8s forwards ease-in-out; }
        .ball-shake { animation: ballShake 0.5s 3; }
        .ball-success { animation: ballCaptureSuccess 0.5s forwards; }
        @keyframes ballCurve { 0% { transform: translate(0,0) rotate(0); } 50% { transform: translate(100px,-100px) rotate(360deg); } 100% { transform: translate(245px,-115px) rotate(720deg); } }
        @keyframes ballShake { 0%,100% { transform: translate(245px,-115px) rotate(0); } 25% { transform: translate(245px,-115px) rotate(-20deg); } 75% { transform: translate(245px,-115px) rotate(20deg); } }
        @keyframes ballCaptureSuccess { 0% { transform: translate(245px,-115px) scale(1); } 100% { transform: translate(245px,-115px) scale(0); opacity: 0; } }

        /* UI 狀態欄 - 套用自定義圖片 */
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--primary); color: white; padding: 8px; border-radius: 8px; margin: 10px 0; font-size: 11px; gap: 4px; text-align: center; width: 100%; max-width: 400px; box-sizing: border-box; align-items: center; }
        .stats-bar span { display: flex; align-items: center; justify-content: center; gap: 3px; }
        .item-icon { width: 22px; height: 22px; object-fit: cover; border-radius: 4px; }
        
        /* 訊息框 */
        .message-box { height: 95px; background: #fff; padding: 10px; font-weight: bold; border-top: 4px solid #888; box-shadow: inset 0 0 0 2px #333; position: relative; overflow-y: auto; box-sizing: border-box; }
        .help-btn { position: absolute; right: 5px; top: 5px; background: #333; color: white; font-size: 10px; border-radius: 4px; padding: 2px 5px; border: none; cursor: pointer; z-index: 10; }
        
        /* 列表與卡片 */
        .card { background: #f8fff0; border: 2px solid var(--primary); padding: 12px; margin-bottom: 8px; border-radius: 10px; width: 100%; max-width: 400px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 10px; border: 2px solid #333; font-weight: bold; cursor: pointer; border-radius: 6px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .task-item { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 8px; background: #fff; position: relative; }
        .progress-bar { height: 12px; background: #eee; border-radius: 6px; border: 1px solid #ccc; margin: 5px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--task-blue); transition: 0.5s; }
        .badge { position: absolute; right: 10px; top: 10px; font-size: 10px; padding: 2px 6px; background: #f1c40f; border-radius: 10px; }
    </style>
</head>
<body>

<div class="game-screen">
    <div class="battle-stage">
        <div class="buddy-container"><img id="buddyImg" src=""></div>
        <div class="enemy-container">
            <div id="hpWrapper" class="hidden">
                <div style="width:100px; height:8px; background:#555; border:2px solid #000; border-radius:4px; margin:0 auto 5px; overflow:hidden;">
                    <div id="hpFill" style="height:100%; background:var(--hp-green); width:100%;"></div>
                </div>
            </div>
            <img id="pokeImg" src="">
        </div>
        <img id="ballOverlay" src="">
    </div>
    <div class="message-box" id="msgText">
        <button class="help-btn" onclick="openModal('helpModal')">❓說明</button>
        <div id="msgInner">歡迎回來，大師！</div>
    </div>
</div>

<div class="stats-bar">
    <span>💰 P$<span id="balance">0</span></span>
    <span><img src="https://r.jina.ai/i/e9c1f7b0e8c440f1a9a8340d8924b4c6" class="item-icon" title="碎片"> <span id="megaShard">0</span>/5</span>
    <span><img src="https://r.jina.ai/i/e9c1f7b0e8c440f1a9a8340d8924b4c6" class="item-icon" title="進化石"> x<span id="inv-stones">0</span></span>
    <span>✨ <span id="shinyRate">5</span>%</span>
    <span><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" class="item-icon"> x<span id="inv-poke">0</span></span>
    <span><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/great-ball.png" class="item-icon"> x<span id="inv-great">0</span></span>
    <span><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/ultra-ball.png" class="item-icon"> x<span id="inv-ultra">0</span></span>
    <span><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/master-ball.png" class="item-icon"> x<span id="inv-master">0</span></span>
</div>

<div class="card" id="inputArea">
    <div class="grid">
        <select id="cat"><option>飲食</option><option>交通</option><option>娛樂</option><option>其他</option></select>
        <input id="note" type="text" placeholder="品名">
    </div>
    <div class="grid" style="margin-top:8px;">
        <input id="amt" type="number" placeholder="金額">
        <button onclick="record()" style="background:var(--primary); color:white;">記帳觸發戰鬥</button>
    </div>
</div>

<div id="battleActions" class="card" style="display:none;">
    <div class="grid">
        <button onclick="atk()">⚔️ 攻擊</button>
        <button id="megaBtn" style="display:none; background:linear-gradient(to right, #f0f, #70f); color:white;" onclick="triggerMega()">MEGA 進化</button>
    </div>
    <div class="grid" style="margin-top:8px;">
        <select id="ballSelect">
            <option value="poke">精靈球</option><option value="great">超級球</option>
            <option value="ultra">高級球</option><option value="master">大師球</option>
        </select>
        <button onclick="throwBall()" style="background:#333; color:gold;">投球 (<span id="turnText">1</span>/8)</button>
    </div>
</div>

<div class="grid" style="width:100%; max-width:400px;">
    <button onclick="openModal('shopModal')">🛒 商店</button>
    <button onclick="openModal('taskModal')">🎯 任務 & 成就</button>
    <button onclick="openModal('buddyModal')">🐾 寶可夢箱</button>
    <button onclick="openModal('adminModal')">⚙️ 系統</button>
</div>

<div id="taskModal" class="modal">
    <h3>🎯 任務中心 <button onclick="closeModals()" style="float:right">❌</button></h3>
    <div style="border-bottom: 2px solid #eee; margin-bottom: 10px; padding-bottom: 10px;">
        <button onclick="showTaskTab('weekly')" style="padding:5px 15px;">每週任務</button>
        <button onclick="showTaskTab('achieve')" style="padding:5px 15px;">長期成就</button>
    </div>
    
    <div id="weeklyTab">
        <h4>📅 每日：記帳獎勵 (前3次)</h4><div id="dailyList"></div>
        <hr>
        <h4>🗓️ 每週：消費滿額獎勵</h4><div id="weeklyList"></div>
    </div>
    
    <div id="achieveTab" style="display:none;">
        <h4>🏆 榮耀成就</h4>
        <div id="achievementList"></div>
    </div>
</div>

<div id="helpModal" class="modal">
    <h3>📖 系統說明 <button onclick="closeModals()" style="float:right">❌</button></h3>
    <div style="font-size:14px; line-height:1.6;">
        <p><b>1. 戰鬥系統：</b>每記帳滿 500 元會遇到寶可夢。HP 越低捕捉率越高。</p>
        <p><b>2. Mega 系統：</b>捕捉稀有寶可夢可獲「碎片🧩」。集滿 5 個自動變為「進化石💎」。進化後 24 小時內閃光率暴增至 20%！</p>
        <p><b>3. 成就系統：</b>長期累積捕捉數與消費額，可領取大師球等稀有獎勵。</p>
    </div>
</div>

<div id="shopModal" class="modal"><h3>🛒 商店 <button onclick="closeModals()" style="float:right">❌</button></h3><div id="shopList"></div></div>
<div id="buddyModal" class="modal"><h3>🐾 夥伴 <button onclick="closeModals()" style="float:right">❌</button></h3><div id="buddyList" style="overflow-y:auto; height:80%;"></div></div>
<div id="adminModal" class="modal"><h3>⚙️ 系統 <button onclick="closeModals()" style="float:right">❌</button></h3><div id="adminContent"></div></div>

<script>
// --- 核心數據 ---
const POKE_NAMES = ["妙蛙種子", "小火龍", "傑尼龜", "皮卡丘", "路卡利歐", "烈咬陸鯊", "噴火龍"]; // 簡化展示，實際會擴展至493
const MEGA_LIST = { 3: 10033, 6: 10034, 448: 10054, 445: 10062 };

let state = {
    balance: 0, pool: 0, megaTime: 0,
    items: { poke: 10, great: 2, ultra: 0, master: 1, shards: 0, stones: 0 },
    owned: [{id: 25, shiny: false}], 
    history: [],
    buddy: {id: 25, shiny: false},
    dailyCount: 0, weeklySpend: 0,
    stats: { totalCaught: 0, totalSpend: 0, shinyFound: 0 },
    claimed: [] // 已領取成就 ID
};

// --- 成就定義 ---
const ACHIEVEMENTS = [
    { id: 'c10', title: '初級捕手', desc: '累計捕捉 10 隻', goal: 10, key: 'totalCaught', reward: 'ultra', qty: 5 },
    { id: 's5k', title: '大亨初現', desc: '消費累計達 5000', goal: 5000, key: 'totalSpend', reward: 'master', qty: 1 },
    { id: 'shiny1', title: '天選之人', desc: '遇到 1 隻閃光', goal: 1, key: 'shinyFound', reward: 'stones', qty: 1 }
];

// --- 介面更新 ---
function updateUI() {
    document.getElementById('balance').innerText = state.balance.toLocaleString();
    document.getElementById('megaShard').innerText = state.items.shards;
    document.getElementById('inv-stones').innerText = state.items.stones;
    document.getElementById('inv-poke').innerText = state.items.poke;
    document.getElementById('inv-great').innerText = state.items.great;
    document.getElementById('inv-ultra').innerText = state.items.ultra;
    document.getElementById('inv-master').innerText = state.items.master;
    document.getElementById('shinyRate').innerText = (Date.now() < state.megaTime ? 20 : 5);
    
    const bImg = document.getElementById('buddyImg');
    bImg.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${state.buddy.id}.png`;
    
    // Mega 按鈕顯示邏輯
    const mBtn = document.getElementById('megaBtn');
    if (state.items.stones > 0 && MEGA_LIST[state.buddy.id] && Date.now() > state.megaTime) {
        mBtn.style.display = 'block';
    } else {
        mBtn.style.display = 'none';
    }
    
    localStorage.setItem('poke_v39_save', JSON.stringify(state));
}

// --- 記帳與成就追蹤 ---
function record() {
    const amt = parseInt(document.getElementById('amt').value);
    if (!amt) return;
    
    state.balance += amt;
    state.weeklySpend += amt;
    state.stats.totalSpend += amt;
    state.pool += (amt / 500) * 100;
    
    // 每日任務
    if (state.dailyCount < 3) {
        state.dailyCount++;
        state.items.poke++;
        document.getElementById('msgInner').innerText = "記帳成功！每日獎勵 🔴+1";
    }
    
    if (state.pool >= 100) {
        state.pool = 0;
        spawnEnemy();
    }
    
    updateUI();
    document.getElementById('amt').value = "";
}

// --- 成就與任務渲染 ---
function showTaskTab(tab) {
    document.getElementById('weeklyTab').style.display = tab === 'weekly' ? 'block' : 'none';
    document.getElementById('achieveTab').style.display = tab === 'achieve' ? 'block' : 'none';
    renderTaskDetails();
}

function renderTaskDetails() {
    // 每週任務
    const wGoal = 3000;
    document.getElementById('weeklyList').innerHTML = `
        <div class="task-item">
            <b>本週消費達標</b>
            <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100, (state.weeklySpend/wGoal)*100)}%"></div></div>
            <small>${state.weeklySpend} / ${wGoal}</small>
            ${state.weeklySpend >= wGoal ? `<button onclick="claimWeekly()">領取 🟡x3</button>` : ''}
        </div>
    `;
    
    // 成就清單
    document.getElementById('achievementList').innerHTML = ACHIEVEMENTS.map(a => {
        const val = state.stats[a.key];
        const isDone = val >= a.goal;
        const isClaimed = state.claimed.includes(a.id);
        return `
            <div class="task-item">
                <b>${a.title}</b> <span class="badge">${a.desc}</span>
                <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100, (val/a.goal)*100)}%; background:#f1c40f;"></div></div>
                ${isDone && !isClaimed ? `<button onclick="claimAchieve('${a.id}')">領取獎勵</button>` : (isClaimed ? '✅ 已領取' : `<small>進度: ${val}/${a.goal}</small>`)}
            </div>
        `;
    }).join('');
}

function claimAchieve(id) {
    const a = ACHIEVEMENTS.find(x => x.id === id);
    state.items[a.reward] += a.qty;
    state.claimed.push(id);
    alert(`成就達成！獲得獎勵。`);
    updateUI();
    renderTaskDetails();
}

function claimWeekly() {
    state.items.ultra += 3;
    state.weeklySpend = 0;
    alert("每週獎勵領取成功！");
    updateUI();
    renderTaskDetails();
}

// --- 戰鬥與捕捉 ---
function spawnEnemy() {
    const id = Math.floor(Math.random() * 493) + 1;
    const isShiny = Math.random() < (Date.now() < state.megaTime ? 0.2 : 0.05);
    state.current = { id, hp: 100, isShiny, turn: 1 };
    
    document.getElementById('pokeImg').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
    if(isShiny) {
        document.getElementById('pokeImg').classList.add('shiny-effect');
        state.stats.shinyFound++;
    } else {
        document.getElementById('pokeImg').classList.remove('shiny-effect');
    }
    
    document.getElementById('inputArea').style.display = 'none';
    document.getElementById('battleActions').style.display = 'block';
    document.getElementById('msgInner').innerText = `野生的 ${isShiny?'✨':''}${id}號 出現了！`;
}

async function throwBall() {
    const type = document.getElementById('ballSelect').value;
    if(state.items[type] <= 0) return alert("球不夠了！");
    state.items[type]--;
    
    // 簡單捕捉邏輯
    const success = Math.random() < (0.3 + (100 - state.current.hp)/200) || type === 'master';
    
    if(success) {
        state.owned.push({id: state.current.id, shiny: state.current.isShiny});
        state.stats.totalCaught++;
        if(MEGA_LIST[state.current.id]) {
            state.items.shards++;
            if(state.items.shards >= 5) {
                state.items.shards = 0;
                state.items.stones++;
                alert("集齊碎片，獲得一顆進化石！");
            }
        }
        alert("捕捉成功！");
        endBattle();
    } else {
        state.current.turn++;
        document.getElementById('turnText').innerText = state.current.turn;
        if(state.current.turn > 8) { alert("逃走了..."); endBattle(); }
    }
    updateUI();
}

function endBattle() {
    state.current = null;
    document.getElementById('inputArea').style.display = 'block';
    document.getElementById('battleActions').style.display = 'none';
    updateUI();
}

function atk() {
    state.current.hp = Math.max(10, state.current.hp - 25);
    document.getElementById('msgInner').innerText = "造成了傷害！捕捉機率提升。";
}

function triggerMega() {
    state.items.stones--;
    state.megaTime = Date.now() + 86400000; // 24小時
    alert("進化！閃光機率提升 24 小時。");
    updateUI();
}

// --- 基礎彈窗控制 ---
function openModal(id) { 
    if(id === 'taskModal') renderTaskDetails();
    document.getElementById(id).style.display = 'block'; 
}
function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

// 初始化
const saved = localStorage.getItem('poke_v39_save');
if(saved) state = JSON.parse(saved);
updateUI();

</script>
</body>
</html>
