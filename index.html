<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster v55.2 - 全功能修復版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        :root { 
            --p: #2d5a27; --bg: #f4f7f6; --text: #2c3e50; --accent: #f1c40f;
            --mega: #9b59b6; --danger: #e74c3c; --white: #ffffff; --gray: #95a5a6;
        }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: #1a1a1a; margin: 0; color: var(--text); overflow: hidden; }
        
        .page { display: none; width: 100vw; height: 100vh; background: var(--bg); position: fixed; top: 0; left: 0; z-index: 100; overflow-y: auto; }
        .page-active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .battle-stage { height: 240px; position: relative; background: linear-gradient(#87ceeb 60%, #9cd39c 60%); border-bottom: 4px solid #333; overflow: hidden; }
        .buddy-box { position: absolute; bottom: 20px; left: 30px; width: 100px; transition: 0.3s; }
        .enemy-box { position: absolute; top: 30px; right: 30px; width: 100px; text-align: center; }
        #ballOverlay { position: absolute; width: 40px; display: none; z-index: 100; }
        .hp-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        #hpFill { height: 100%; background: #2ecc71; width: 100%; transition: 0.5s; }

        .dex-container { display: flex; height: calc(100vh - 140px); margin: 10px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .dex-sidebar { width: 40%; overflow-y: auto; background: #e0e0e0; }
        .dex-main { width: 60%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; padding: 15px; }
        .dex-item { padding: 15px 10px; border-bottom: 1px solid #ccc; font-size: 14px; text-align: center; cursor: pointer; }
        .dex-item.active { background: var(--p); color: white; }

        .card { background: var(--white); border-radius: 12px; padding: 15px; margin: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg-box { height: 40px; background: #fff; padding: 8px 15px; font-weight: bold; border-bottom: 1px solid #ddd; color: var(--p); overflow: hidden; }
        
        .control-panel { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; background: #222; 
            height: 120px; position: fixed; bottom: 0; width: 100%; padding: 5px; box-sizing: border-box; 
        }
        .btn-nav { background: #333; color: white; border: none; font-size: 12px; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-back { background: var(--danger); color: white; width: calc(100% - 20px); padding: 15px; margin: 10px; border: none; border-radius: 10px; font-weight: bold; }

        .ball-throw { display: block !important; animation: ballCurve 0.8s forwards; }
        .ball-shake { display: block !important; animation: ballShake 0.5s 3; }
        @keyframes ballCurve { 0% { left: 40px; bottom: 40px; } 100% { left: 210px; bottom: 140px; transform: scale(0.7) rotate(360deg); } }
        @keyframes ballShake { 0%, 100% { transform: translate(210px, -140px) rotate(0deg); } 25% { transform: translate(210px, -140px) rotate(15deg); } 75% { transform: translate(210px, -140px) rotate(-15deg); } }
        .mega-fx { filter: drop-shadow(0 0 10px var(--mega)); animation: pulse 1.5s infinite; }
        .gotcha-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: gold; font-size: 40px; font-weight: 900; text-shadow: 2px 2px #000; z-index: 200; display: none; }
        .res-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; text-align: center; }
        .res-icon { width: 35px; height: 35px; object-fit: contain; }
    </style>
</head>
<body>

<div id="mainPage">
    <div class="battle-stage">
        <div id="gotcha" class="gotcha-text">GOTCHA!</div>
        <div class="buddy-box"><img id="buddyImg" src="" style="width:100%; height:90px; object-fit:contain;"></div>
        <div class="enemy-box" id="enemyArea" style="display:none;">
            <div class="hp-bar"><div id="hpFill"></div></div>
            <img id="enemyImg" src="" style="width:100%; height:80px; object-fit:contain;">
        </div>
        <img id="ballOverlay" src="">
    </div>

    <div id="msg" class="msg-box">系統初始化...</div>

    <div id="inputArea" class="card">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:8px;">
            <input type="date" id="recDate">
            <select id="recCat"><option>飲食</option><option>交通</option><option>娛樂</option><option>購物</option><option>其他</option></select>
        </div>
        <div style="display:flex; gap:8px; margin-bottom:8px;">
            <input id="recNote" type="text" placeholder="備註" style="flex:1; padding:8px;">
            <input id="recAmt" type="number" placeholder="金額" style="width:80px; padding:8px;">
        </div>
        <button onclick="record()" style="background:var(--p); color:white; width:100%; padding:12px; border:none; border-radius:8px; font-weight:bold;">記帳並探索冒險</button>
    </div>

    <div id="battleActions" class="card" style="border:2px solid var(--p); display:none;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;">
            <button onclick="attack()" style="background:#e74c3c; color:white; padding:10px; border:none; border-radius:5px;">⚔️ 攻擊</button>
            <button onclick="tryMega()" style="background:var(--mega); color:white; padding:10px; border:none; border-radius:5px;">🧬 MEGA進化</button>
        </div>
        <div style="display:flex; gap:5px;">
            <select id="ballSelect" style="flex:1;"></select>
            <button onclick="throwBall()" style="background:var(--p); color:white; padding:0 20px; border:none; border-radius:5px;">投球</button>
        </div>
    </div>

    <div class="control-panel">
        <button class="btn-nav" onclick="openPage('chartPage')">📈<br>報表</button>
        <button class="btn-nav" onclick="openPage('dexPage')">📖<br>圖鑑</button>
        <button class="btn-nav" onclick="openPage('statusPage')">👤<br>玩家</button>
        <button class="btn-nav" onclick="openPage('shopPage')">💰<br>商店</button>
        <button class="btn-nav" onclick="openPage('historyPage')">📜<br>紀錄</button>
        <button class="btn-nav" onclick="openPage('taskPage')">🎯<br>任務</button>
        <button class="btn-nav" onclick="openPage('adminPage')">⚙️<br>管理</button>
        <button class="btn-nav" onclick="location.reload()">🔄<br>重新整理</button>
    </div>
</div>

<div id="dexPage" class="page">
    <div class="dex-container">
        <div class="dex-sidebar" id="dexNav"></div>
        <div class="dex-main" id="dexView">
            <h3 id="dexTitle">載入中</h3>
            <img id="dexImg" src="" style="width:130px; height:130px; object-fit:contain;">
            <div id="dexCtrl" style="margin-top:10px; text-align:center;">
                <button onclick="setDexShiny(false)">一般</button>
                <button onclick="setDexShiny(true)">✨ 閃光</button>
                <button onclick="assignBuddy()" style="background:var(--p); color:white; padding:10px; display:block; margin:10px auto;">就決定是你了</button>
            </div>
        </div>
    </div>
    <button class="btn-back" onclick="back()">✖ 關閉</button>
</div>

<div id="historyPage" class="page">
    <div class="card">
        <h3>📜 歷史紀錄</h3>
        <div id="historyList" style="max-height:65vh; overflow-y:auto;"></div>
    </div>
    <button class="btn-back" onclick="back()">✖ 關閉</button>
</div>

<div id="taskPage" class="page">
    <div class="card">
        <h3>🎯 任務板</h3>
        <div id="taskList"></div>
    </div>
    <button class="btn-back" onclick="back()">✖ 關閉</button>
</div>

<script>
// --- [ 1. 核心數據修復 ] ---
const NAMES = ["妙蛙種子","妙蛙草","妙蛙花","小火龍","火恐龍","噴火龍","傑尼龜","卡咪龜","水箭龜","綠毛蟲","鐵甲蛹","巴大蝶","獨角蟲","鐵殼蛹","大針蜂","波波","比比鳥","比雕","小拉達","拉達","烈雀","大嘴雀","阿柏蛇","阿柏怪","皮卡丘","雷丘","穿山鼠","穿山王","尼多蘭","尼多娜","尼多后","尼多朗","尼多力諾","尼多王","皮皮","皮可西","六尾","九尾","胖丁","胖丁丁","超音蝠","大嘴蝠","走路草","臭臭花","霸王花","派拉斯","派拉斯特","毛球","末入蛾","地鼠","三地鼠","喵喵","貓老大","可達鴨","哥達鴨","猴怪","火爆猴","卡蒂狗","風速狗","蚊香蝌蚪","蚊香蛙","快泳蛙","凱西","勇吉拉","胡地","腕力","豪力","怪力","喇叭芽","口呆花","大食花","瑪瑙水母","毒刺水母","小拳石","隆隆石","隆隆岩","小火馬","烈焰馬","呆呆獸","呆殼獸","小磁怪","三合一磁怪","大蔥鴨","嘟嘟","嘟嘟利","小海獅","白海獅","臭泥","臭臭泥","大舌貝","刺甲貝","鬼斯","鬼斯通","耿鬼","大岩蛇","催眠貘","引夢貘人","大鉗蟹","巨鉗蟹","霹靂電球","頑皮雷彈","蛋蛋","椰蛋樹","卡拉卡拉","嘎啦嘎啦","飛腿郎","快拳郎","大舌頭","瓦斯彈","雙彈瓦斯","獨角犀牛","鑽角犀獸","吉利蛋","蔓藤怪","袋獸","墨海馬","海刺龍","角金魚","金魚王","海星星","寶石海星","魔牆人偶","飛天螳螂","迷唇姐","電擊獸","鴨嘴火獸","凱羅斯","肯泰羅","鯉魚王","暴鯉龍","拉普拉斯","百變怪","伊布","水伊布","雷伊布","火伊布","多邊獸","菊石獸","多刺菊石獸","化石盔","鐮刀盔","化石翼龍","卡比獸","急凍鳥","閃電鳥","火焰鳥","迷你龍","哈克龍","快龍","超夢","夢幻"];
const EVO_MAP = {1:2, 2:3, 4:5, 5:6, 7:8, 8:9, 10:11, 11:12, 13:14, 14:15, 16:17, 17:18, 19:20, 25:26, 129:130, 147:148, 148:149};
const MEGA_LIST = {3:1, 6:1, 9:1, 94:1, 130:1, 150:1};
const API = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites";

let s = {
    bal: 1000, pool: 0, items: {poke:10, great:5, ultra:0, master:1, stone:0, mstone:0},
    prog: {evo:0, mega:0}, buddyId: 25, isShinyBuddy: false, 
    owned: [25], shinyOwned: [], 
    buddy: {megaUntil: 0},
    hist: [], yearSums: {}, achieveBal: 0,
    tasks: {lastDate: "", lastWeek: -1, lastMonth: -1, dRec: 0, dCatch: 0, wRec: 0, wCatch: 0, mRec: 0, mCatch: 0}
};

let curE = null;
let currentDexId = 1;
let currentDexShiny = false;

window.onload = () => {
    const saved = localStorage.getItem('pokemaster_v55.2');
    if(saved) s = JSON.parse(saved);
    checkTaskReset();
    document.getElementById('recDate').valueAsDate = new Date();
    updateUI();
};

// --- [ 2. 任務與統計修復 ] ---
function checkTaskReset() {
    const now = new Date();
    const today = now.toISOString().split('T')[0];
    const week = Math.floor(now.getTime() / (7*24*60*60*1000));
    const month = now.getMonth();

    if(s.tasks.lastDate !== today) { s.tasks.dRec = 0; s.tasks.dCatch = 0; s.tasks.lastDate = today; }
    if(s.tasks.lastWeek !== week) { s.tasks.wRec = 0; s.tasks.wCatch = 0; s.tasks.lastWeek = week; }
    if(s.tasks.lastMonth !== month) { s.tasks.mRec = 0; s.tasks.mCatch = 0; s.tasks.lastMonth = month; }
}

function deleteHistory(id) {
    const idx = s.hist.findIndex(h => h.id === id);
    if(idx !== -1) {
        const item = s.hist[idx];
        const month = item.date.substring(0, 7);
        if(s.yearSums[month]) s.yearSums[month] -= item.amt;
        s.hist.splice(idx, 1);
        renderHistory();
        updateUI();
    }
}

// --- [ 3. 戰鬥動畫與 Mega 修復 ] ---
async function throwBall() {
    const type = document.getElementById('ballSelect').value;
    if(s.items[type] <= 0 && type !== 'master') { alert("球不夠了！"); return; }
    if(type !== 'master') s.items[type]--;

    const ball = document.getElementById('ballOverlay');
    ball.src = `${API}/items/${type}-ball.png`;
    ball.className = 'ball-throw';
    document.getElementById('msg').innerText = `去吧！${type}球！`;

    setTimeout(() => {
        ball.className = 'ball-shake';
        setTimeout(() => {
            const chance = type === 'master' ? 1 : (type === 'ultra' ? 0.8 : (type === 'great' ? 0.6 : 0.4));
            if(Math.random() < chance) {
                catchSuccess();
            } else {
                ball.className = ''; ball.style.display = 'none';
                document.getElementById('msg').innerText = "哎呀！挣脫了！";
            }
            updateUI();
        }, 1500);
    }, 800);
}

function catchSuccess() {
    document.getElementById('gotcha').style.display = "block";
    document.getElementById('msg').innerText = `成功捕捉 ${curE.name}！`;
    
    s.owned.push(curE.id);
    if(curE.isShiny) s.shinyOwned.push(curE.id);
    
    // 任務計數 (包含 Mega 判定)
    checkTaskReset();
    s.tasks.dCatch++; s.tasks.wCatch++; s.tasks.mCatch++;
    
    // 進化/Mega石進度
    s.prog.evo++;
    if(MEGA_LIST[curE.id]) s.prog.mega++;
    
    if(s.prog.evo >= 5) { s.prog.evo = 0; s.items.stone++; }
    if(s.prog.mega >= 5) { s.prog.mega = 0; s.items.mstone++; }

    setTimeout(() => {
        document.getElementById('gotcha').style.display = "none";
        document.getElementById('enemyArea').style.display = "none";
        document.getElementById('battleActions').style.display = "none";
        document.getElementById('inputArea').style.display = "block";
        document.getElementById('ballOverlay').className = '';
        document.getElementById('ballOverlay').style.display = 'none';
        updateUI();
    }, 2000);
}

// --- [ 4. CSV 手機載具修復 ] ---
function handleCSV(event) {
    const file = event.target.files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
        const lines = e.target.result.split('\n');
        let count = 0;
        lines.forEach(line => {
            const parts = line.split(',');
            if(parts.length >= 3) {
                const date = parts[0].replace(/\//g, '-').trim();
                const note = parts[1].trim();
                const amt = parseInt(parts[2]);
                if(date.length >= 10 && !isNaN(amt)) {
                    const month = date.substring(0, 7);
                    s.yearSums[month] = (s.yearSums[month] || 0) + amt;
                    s.hist.push({id: Date.now() + count, date, cat: "其他", amt, note, reward: 0});
                    count++;
                }
            }
        });
        alert(`成功匯入 ${count} 筆載具明細！`);
        updateUI();
    };
    reader.readAsText(file);
}

// --- [ 5. 其他功能 (進化、圖鑑) ] ---
function performEvolve() {
    const nextId = EVO_MAP[s.buddyId];
    if(!nextId) { alert("此寶可夢無法進化！"); return; }
    if(s.items.stone < 1) { alert("進化石不足！"); return; }
    s.items.stone--;
    s.buddyId = nextId;
    if(!s.owned.includes(nextId)) s.owned.push(nextId);
    updateUI();
    alert(`進化成功！進化為 ${NAMES[nextId-1]}`);
}

function renderDex() {
    const nav = document.getElementById('dexNav');
    nav.innerHTML = "";
    NAMES.forEach((name, i) => {
        const id = i + 1;
        const div = document.createElement('div');
        div.className = `dex-item ${currentDexId === id ? 'active' : ''}`;
        div.innerText = s.owned.includes(id) ? `${id}. ${name}` : `${id}. ???`;
        div.onclick = () => { currentDexId = id; renderDex(); };
        nav.appendChild(div);
    });
    const owned = s.owned.includes(currentDexId);
    document.getElementById('dexTitle').innerText = owned ? NAMES[currentDexId-1] : "???";
    document.getElementById('dexImg').src = owned ? `${API}/pokemon/${currentDexShiny?'shiny/':''}${currentDexId}.png` : "";
}

function record() {
    const amt = parseInt(document.getElementById('recAmt').value);
    const date = document.getElementById('recDate').value;
    if(!amt || !date) return;
    checkTaskReset();
    s.tasks.dRec++; s.tasks.wRec++; s.tasks.mRec++;
    const month = date.substring(0, 7);
    s.yearSums[month] = (s.yearSums[month] || 0) + amt;
    s.bal += Math.floor(amt * 0.1);
    s.pool += amt;
    s.hist.push({id: Date.now(), date, cat: document.getElementById('recCat').value, amt, note: document.getElementById('recNote').value});
    if(s.pool >= 500) { s.pool -= 500; spawnEnemy(); }
    updateUI();
}

function updateUI() {
    localStorage.setItem('pokemaster_v55.2', JSON.stringify(s));
    document.getElementById('st-bal').innerText = s.bal;
    document.getElementById('st-achieve').innerText = s.achieveBal;
    document.getElementById('p-evo-bar').style.width = (s.prog.evo/5*100) + "%";
    document.getElementById('p-mega-bar').style.width = (s.prog.mega/5*100) + "%";
    document.getElementById('buddyImg').src = `${API}/pokemon/${s.isShinyBuddy?'shiny/':''}${s.buddyId}.png`;
    const bs = document.getElementById('ballSelect');
    bs.innerHTML = `<option value="poke">精靈球(${s.items.poke})</option><option value="great">超級球(${s.items.great})</option><option value="ultra">高級球(${s.items.ultra})</option><option value="master">大師球(${s.items.master})</option>`;
}

function spawnEnemy() {
    const id = Math.floor(Math.random()*151)+1;
    curE = {id, hp: 100, isShiny: Math.random()<0.05, name: NAMES[id-1]};
    document.getElementById('enemyImg').src = `${API}/pokemon/${curE.isShiny?'shiny/':''}${id}.png`;
    document.getElementById('enemyArea').style.display = "block";
    document.getElementById('battleActions').style.display = "block";
    document.getElementById('inputArea').style.display = "none";
}

function renderTasks() {
    const t = s.tasks;
    document.getElementById('taskList').innerHTML = `
        <div class="card"><b>每日任務:</b> 記帳 ${t.dRec}/1, 捕捉 ${t.dCatch}/1</div>
        <div class="card"><b>每週任務:</b> 記帳 ${t.wRec}/5, 捕捉 ${t.wCatch}/3</div>
        <div class="card"><b>成就任務:</b> 記帳 ${t.mRec}/20, 捕捉 ${t.mCatch}/10</div>
    `;
}

function renderHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = "";
    s.hist.slice().reverse().forEach(h => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<div>${h.date} - ${h.note} ($${h.amt})</div><button onclick="deleteHistory(${h.id})" style="color:red; background:none; border:none;">[刪除]</button>`;
        list.appendChild(div);
    });
}

function openPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
    document.getElementById(id).classList.add('page-active');
    if(id === 'dexPage') renderDex();
    if(id === 'taskPage') renderTasks();
    if(id === 'historyPage') renderHistory();
}
function back() { document.querySelectorAll('.page').forEach(p=>p.classList.remove('page-active')); }
function setDexShiny(v) { currentDexShiny = v; renderDex(); }
function assignBuddy() { s.buddyId = currentDexId; s.isShinyBuddy = currentDexShiny; updateUI(); }
</script>
</body>
</html>
