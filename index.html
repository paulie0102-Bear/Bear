<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster 最終修復版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        :root { --p: #2d5a27; --bg: #f4f7f6; --text: #2c3e50; --white: #ffffff; }
        body { font-family: sans-serif; background: #1a1a1a; margin: 0; color: var(--text); }
        
        /* 頁面切換核心樣式 */
        .page { display: none; width: 100vw; height: 100vh; background: var(--bg); position: fixed; top: 0; left: 0; z-index: 100; overflow-y: auto; }
        .page-active { display: block !important; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .battle-stage { height: 200px; position: relative; background: linear-gradient(#87ceeb 60%, #9cd39c 60%); border-bottom: 4px solid #333; }
        .buddy-box { position: absolute; bottom: 10px; left: 20px; width: 80px; }
        .enemy-box { position: absolute; top: 20px; right: 20px; width: 80px; text-align: center; }
        
        .card { background: var(--white); border-radius: 12px; padding: 15px; margin: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg-box { height: 30px; background: #fff; padding: 10px; font-weight: bold; border-bottom: 1px solid #ddd; text-align: center; }
        
        .control-panel { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; background: #222; position: fixed; bottom: 0; width: 100%; padding: 10px; box-sizing: border-box; z-index: 200; }
        .btn-nav { background: #444; color: white; border: none; padding: 10px 0; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .btn-back { background: #e74c3c; color: white; width: 90%; padding: 15px; margin: 10px auto; display: block; border: none; border-radius: 10px; cursor: pointer; }
        
        img { max-width: 100%; height: auto; }
        .hp-bar { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-bottom: 5px; }
        #hpFill { height: 100%; background: #2ecc71; width: 100%; transition: 0.3s; }
    </style>
</head>
<body>

<div id="mainPage" class="page page-active" style="display: block;">
    <div class="battle-stage">
        <div class="buddy-box"><img id="buddyImg" src=""></div>
        <div class="enemy-box" id="enemyArea" style="display:none;">
            <div class="hp-bar"><div id="hpFill"></div></div>
            <img id="enemyImg" src="">
        </div>
    </div>

    <div id="msg" class="msg-box">準備好開始冒險了嗎？</div>

    <div id="inputArea" class="card">
        <input type="number" id="recAmt" placeholder="輸入消費金額 (滿500遇怪)" style="width:70%; padding:10px;">
        <button onclick="record()" style="padding:10px; background:var(--p); color:white; border:none; border-radius:5px;">記帳</button>
        <div style="margin-top:10px; font-size:12px;">當前餘額: <span id="st-bal">0</span> | 圖鑑: <span id="st-dex">0</span>/493</div>
    </div>

    <div id="battleActions" class="card" style="display:none; border: 2px solid #e74c3c;">
        <button onclick="throwBall()" style="width:100%; padding:15px; background:#f1c40f; border:none; border-radius:8px; font-weight:bold;">投擲精靈球！</button>
    </div>

    <div class="control-panel">
        <button class="btn-nav" onclick="openPage('chartPage')">報表</button>
        <button class="btn-nav" onclick="openPage('dexPage')">圖鑑</button>
        <button class="btn-nav" onclick="openPage('statusPage')">狀態</button>
        <button class="btn-nav" onclick="location.reload()">重整</button>
    </div>
</div>

<div id="chartPage" class="page">
    <h2 style="text-align:center;">消費報表</h2>
    <canvas id="myChart" style="width:90%; margin:auto;"></canvas>
    <button class="btn-back" onclick="back()">返回冒險</button>
</div>

<div id="dexPage" class="page">
    <h2 style="text-align:center;">寶可夢圖鑑</h2>
    <div id="dexList" style="padding:10px; display:grid; grid-template-columns:repeat(3,1fr); gap:10px;"></div>
    <button class="btn-back" onclick="back()">返回冒險</button>
</div>

<div id="statusPage" class="page">
    <h2 style="text-align:center;">玩家狀態</h2>
    <div class="card">
        <p>稱號：<span id="st-title">新人訓練家</span></p>
        <p>等級：Lv.<span id="st-level">1</span></p>
    </div>
    <button class="btn-back" onclick="back()">返回冒險</button>
</div>

<script>
// --- 核心數據 ---
const API = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon";
let s = {
    bal: 1000, pool: 0, 
    owned: [25], // 預設皮卡丘
    level: 1, title: "新人訓練家"
};
let curE = null;

// --- 初始化 ---
window.onload = () => {
    const saved = localStorage.getItem('poke_save');
    if(saved) s = JSON.parse(saved);
    updateUI();
};

function updateUI() {
    localStorage.setItem('poke_save', JSON.stringify(s));
    document.getElementById('st-bal').innerText = s.bal;
    document.getElementById('st-dex').innerText = s.owned.length;
    document.getElementById('st-level').innerText = s.level;
    document.getElementById('st-title').innerText = s.title;
    
    // 更新夥伴圖片 (預設第一隻)
    document.getElementById('buddyImg').src = `${API}/${s.owned[0]}.png`;
}

// --- 分頁切換函式 ---
function openPage(id) {
    // 隱藏所有頁面
    const pages = document.querySelectorAll('.page');
    pages.forEach(p => p.classList.remove('page-active'));
    
    // 顯示目標頁面
    const target = document.getElementById(id);
    if(target) {
        target.classList.add('page-active');
        if(id === 'dexPage') renderDex();
    } else {
        console.error("找不到頁面：" + id);
    }
}

function back() {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
    document.getElementById('mainPage').classList.add('page-active');
}

// --- 遊戲邏輯 ---
function record() {
    const amt = parseInt(document.getElementById('recAmt').value);
    if(!amt || amt <= 0) return;
    
    s.pool += amt;
    s.bal += Math.floor(amt * 0.1);
    
    if(s.pool >= 500) {
        s.pool -= 500;
        spawnEnemy();
    } else {
        document.getElementById('msg').innerText = `已記帳 ${amt} 元，還差 ${500 - s.pool} 元遇怪`;
    }
    updateUI();
}

function spawnEnemy() {
    const id = Math.floor(Math.random() * 493) + 1;
    curE = { id: id };
    document.getElementById('enemyImg').src = `${API}/${id}.png`;
    document.getElementById('enemyArea').style.display = "block";
    document.getElementById('battleActions').style.display = "block";
    document.getElementById('inputArea').style.display = "none";
    document.getElementById('msg').innerText = `喔不！野生的寶可夢出現了！`;
}

function throwBall() {
    // 捕捉邏輯
    if(Math.random() > 0.3) {
        if(!s.owned.includes(curE.id)) s.owned.push(curE.id);
        document.getElementById('msg').innerText = "成功捕捉！";
        setTimeout(() => {
            document.getElementById('enemyArea').style.display = "none";
            document.getElementById('battleActions').style.display = "none";
            document.getElementById('inputArea').style.display = "block";
            updateUI();
        }, 1000);
    } else {
        document.getElementById('msg').innerText = "捕捉失敗，它跑掉了...";
        setTimeout(() => {
            document.getElementById('enemyArea').style.display = "none";
            document.getElementById('battleActions').style.display = "none";
            document.getElementById('inputArea').style.display = "block";
        }, 1000);
    }
}

function renderDex() {
    const list = document.getElementById('dexList');
    list.innerHTML = "";
    s.owned.forEach(id => {
        list.innerHTML += `<div style="text-align:center; background:#fff; padding:5px; border-radius:5px;">
            <img src="${API}/${id}.png" style="width:50px;"><br>#${id}
        </div>`;
    });
}
</script>

</body>
</html>
