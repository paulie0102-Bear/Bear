<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster v55.2 - 官方進化優化版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        :root { 
            --p: #2d5a27; --bg: #f4f7f6; --text: #2c3e50; --accent: #f1c40f;
            --mega: #9b59b6; --danger: #e74c3c; --white: #ffffff; --gray: #95a5a6;
        }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: #1a1a1a; margin: 0; color: var(--text); overflow: hidden; }
        .page { display: none; width: 100vw; height: 100vh; background: var(--bg); position: fixed; top: 0; left: 0; z-index: 100; overflow-y: auto; }
        .page-active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .battle-stage { height: 240px; position: relative; background: linear-gradient(#87ceeb 60%, #9cd39c 60%); border-bottom: 4px solid #333; overflow: hidden; }
        .buddy-box { position: absolute; bottom: 20px; left: 30px; width: 100px; transition: 0.3s; }
        .enemy-box { position: absolute; top: 30px; right: 30px; width: 100px; text-align: center; }
        #ballOverlay { position: absolute; width: 40px; display: none; z-index: 100; }
        .hp-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        #hpFill { height: 100%; background: #2ecc71; width: 100%; transition: 0.5s; }
        .dex-container { display: flex; height: calc(100vh - 140px); margin: 10px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .dex-sidebar { width: 40%; overflow-y: auto; background: #e0e0e0; }
        .dex-main { width: 60%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; padding: 15px; }
        .dex-item { padding: 15px 10px; border-bottom: 1px solid #ccc; font-size: 14px; text-align: center; }
        .dex-item.active { background: var(--p); color: white; }
        .card { background: var(--white); border-radius: 12px; padding: 15px; margin: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg-box { height: 40px; background: #fff; padding: 8px 15px; font-weight: bold; border-bottom: 1px solid #ddd; color: var(--p); overflow: hidden; }
        .control-panel { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); gap: 4px; background: #222; height: 120px; position: fixed; bottom: 0; width: 100%; padding: 5px; box-sizing: border-box; }
        .btn-nav { background: #333; color: white; border: none; font-size: 12px; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-back { background: var(--danger); color: white; width: calc(100% - 20px); padding: 15px; margin: 10px; border: none; border-radius: 10px; font-weight: bold; }
        .mega-fx { filter: drop-shadow(0 0 10px var(--mega)); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .gotcha-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: gold; font-size: 40px; font-weight: 900; text-shadow: 2px 2px #000; z-index: 200; display: none; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .shop-btn { background: var(--p); color: white; border: none; padding: 5px 15px; border-radius: 4px; }
        .res-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; text-align: center; }
        .res-icon { width: 35px; height: 35px; object-fit: contain; }
    </style>
</head>
<body>

<div id="mainPage">
    <div class="battle-stage">
        <div id="gotcha" class="gotcha-text">GOTCHA!</div>
        <div class="buddy-box"><img id="buddyImg" src="" style="width:100%; height:90px; object-fit:contain;"></div>
        <div class="enemy-box" id="enemyArea" style="display:none;">
            <div class="hp-bar"><div id="hpFill"></div></div>
            <img id="enemyImg" src="" style="width:100%; height:80px; object-fit:contain;">
        </div>
        <img id="ballOverlay" src="">
    </div>
    <div id="msg" class="msg-box">系統初始化...</div>
    <div id="inputArea" class="card">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:8px;">
            <input type="date" id="recDate">
            <select id="recCat"><option>飲食</option><option>交通</option><option>娛樂</option><option>購物</option><option>其他</option></select>
        </div>
        <div style="display:flex; gap:8px; margin-bottom:8px;">
            <input id="recNote" type="text" placeholder="備註" style="flex:1; padding:8px;">
            <input id="recAmt" type="number" placeholder="金額" style="width:80px; padding:8px;">
        </div>
        <button onclick="record()" style="background:var(--p); color:white; width:100%; padding:12px; border:none; border-radius:8px; font-weight:bold;">記帳並探索冒險</button>
    </div>
    <div id="battleActions" class="card" style="border:2px solid var(--p); display:none;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;">
            <button onclick="attack()" style="background:#e74c3c; color:white; padding:10px; border:none; border-radius:5px;">⚔️ 攻擊</button>
            <button onclick="tryMega()" style="background:var(--mega); color:white; padding:10px; border:none; border-radius:5px;">🧬 MEGA進化</button>
        </div>
        <div style="display:flex; gap:5px;">
            <select id="ballSelect" style="flex:1;"></select>
            <button onclick="throwBall()" style="background:var(--p); color:white; padding:0 20px; border:none; border-radius:5px;">投球</button>
        </div>
    </div>
    <div class="control-panel">
        <button class="btn-nav" onclick="openPage('chartPage')">📈<br>報表</button>
        <button class="btn-nav" onclick="openPage('dexPage')">📖<br>圖鑑</button>
        <button class="btn-nav" onclick="openPage('statusPage')">👤<br>玩家</button>
        <button class="btn-nav" onclick="openPage('shopPage')">💰<br>商店</button>
        <button class="btn-nav" onclick="openPage('historyPage')">📜<br>紀錄</button>
        <button class="btn-nav" onclick="openPage('taskPage')">🎯<br>任務</button>
        <button class="btn-nav" onclick="openPage('adminPage')">⚙️<br>管理</button>
        <button class="btn-nav" onclick="location.reload()">🔄<br>重新整理</button>
    </div>
</div>

<div id="chartPage" class="page">
    <div class="card"><h3>📊 年度支出趨勢</h3><canvas id="chartYear"></canvas></div>
    <div class="card"><h3>🍕 類別佔比</h3><canvas id="chartCat"></canvas></div>
    <button class="btn-back" onclick="back()">✖ 關閉</button>
</div>

<div id="dexPage" class="page">
    <div class="dex-container">
        <div class="dex-sidebar" id="dexNav"></div>
        <div class="dex-main" id="dexView">
            <h3 id="dexTitle">載入中</h3>
            <img id="dexImg" src="" style="width:130px; height:130px; object-fit:contain;">
            <div id="dexCtrl" style="margin-top:10px; text-align:center;">
                <button onclick="setDexShiny(false)">一般</button>
                <button onclick="setDexShiny(true)" id="shinyBtn">✨ 閃光</button>
                <button onclick="assignBuddy()" style="background:var(--p); color:white; padding:10px; border:none; border-radius:20px; width:150px; display:block; margin: 10px auto;">就決定是你了</button>
            </div>
        </div>
    </div>
    <button class="btn-back" onclick="back()">✖ 關閉</button>
</div>

<div id="statusPage" class="page">
    <div class="card">
        <h3>👤 訓練家中心</h3>
        <p>錢包：P$ <b id="st-bal">0</b></p>
        <p>成就進度：<span id="st-achieve">0</span> / 5000</p>
        <hr>
        <p>進化石進度 (<span id="p-evo-txt">0</span>/5)</p>
        <div class="hp-bar"><div id="p-evo-bar" style="height:100%; background:var(--accent); width:0%;"></div></div>
        <p>Mega石進度 (<span id="p-mega-txt">0</span>/5)</p>
        <div class="hp-bar"><div id="p-mega-bar" style="height:100%; background:var(--mega); width:0%;"></div></div>
        <div id="st-items" class="res-grid"></div>
        <button onclick="performEvolve()" style="background:#e67e22; color:white; width:100%; padding:15px; margin-top:15px; border:none; border-radius:10px;">🧬 消耗進化石進化夥伴</button>
    </div>
    <button class="btn-back" onclick="back()">✖ 關閉</button>
</div>

<div id="shopPage" class="page">
    <div class="card">
        <h3>💰 精靈商店</h3>
        <div class="shop-item"><span>精靈球 (P$ 100)</span><button class="shop-btn" onclick="buy('poke', 100)">購買</button></div>
        <div class="shop-item"><span>超級球 (P$ 300)</span><button class="shop-btn" onclick="buy('great', 300)">購買</button></div>
        <div class="shop-item"><span>高級球 (P$ 600)</span><button class="shop-btn" onclick="buy('ultra', 600)">購買</button></div>
    </div>
    <button class="btn-back" onclick="back()">✖ 關閉</button>
</div>

<div id="historyPage" class="page">
    <div class="card">
        <h3>📜 歷史紀錄 (限7天查詢)</h3>
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <input type="date" id="hStart" style="flex:1;"> 到 <input type="date" id="hEnd" style="flex:1;">
        </div>
        <button onclick="searchHistory()" style="background:#2980b9; color:white; width:100%; padding:10px; border:none; border-radius:5px;">搜尋</button>
        <div id="historyList" style="margin-top:10px;"></div>
    </div>
    <button class="btn-back" onclick="back()">✖ 關閉</button>
</div>

<div id="taskPage" class="page">
    <div class="card">
        <h3>🎯 任務板</h3>
        <div id="taskList"></div>
    </div>
    <button class="btn-back" onclick="back()">✖ 關閉</button>
</div>

<div id="adminPage" class="page">
    <div class="card">
        <h3>⚙️ 管理與備份</h3>
        <button onclick="exportData()" style="background:#2980b9; color:white; width:100%; padding:12px; margin-bottom:10px; border:none; border-radius:5px;">💾 匯出全存檔</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        <button onclick="document.getElementById('importFile').click()" style="background:#27ae60; color:white; width:100%; padding:12px; margin-bottom:10px; border:none; border-radius:5px;">📂 匯入存檔</button>
        <button onclick="if(confirm('確定清除？')){localStorage.clear();location.reload();}" style="background:var(--danger); color:white; width:100%; padding:12px; border:none; border-radius:5px;">🔥 重設系統</button>
    </div>
    <button class="btn-back" onclick="back()">✖ 關閉</button>
</div>

    181: ["-mega"], 208: ["-mega"], 212: ["-mega"], 214: ["-mega"], 229: ["-mega"], 248: ["-mega"], 254: ["-mega"],

    448: ["-mega"], 460: ["-mega"], 475: ["-mega"]
};

let s = {
    bal: 1000, pool: 0, items: {poke:10, great:5, ultra:0, master:1, stone:0, mstone:0},
    prog: {evo:0, mega:0}, buddyId: 25, isShinyBuddy: false, 
    owned: [25], shinyOwned: [], 
    buddy: {megaUntil: 0, dailyMegaDate: "", activeMegaSuffix: ""},
    hist: [], yearSums: {}, achieveBal: 0,
    tasks: {dailyDate: "", dRec: 0, dCatch: 0, wRec: 0, wCatch: 0, mRec: 0, mCatch: 0, claimed: []}
};

let curE = null;

window.onload = () => {
    const saved = localStorage.getItem('pokemaster_v55.2');
    if(saved) s = JSON.parse(saved);
    document.getElementById('recDate').valueAsDate = new Date();
    updateUI();
};

function updateUI() {
    localStorage.setItem('pokemaster_v55.2', JSON.stringify(s));
    document.getElementById('st-bal').innerText = s.bal;
    document.getElementById('st-achieve').innerText = s.achieveBal;
    document.getElementById('p-evo-txt').innerText = s.prog.evo;
    document.getElementById('p-evo-bar').style.width = (s.prog.evo/5*100) + "%";
    document.getElementById('p-mega-txt').innerText = s.prog.mega;
    document.getElementById('p-mega-bar').style.width = (s.prog.mega/5*100) + "%";

    const isMega = Date.now() < s.buddy.megaUntil;
    let bImg = (isMega && s.buddy.activeMegaSuffix) 
        ? `${API}/pokemon/${s.buddyId}${s.buddy.activeMegaSuffix}.png` 
        : `${API}/pokemon/${s.isShinyBuddy?'shiny/':''}${s.buddyId}.png`;

    const bEl = document.getElementById('buddyImg');
    bEl.src = bImg;
    isMega ? bEl.classList.add('mega-fx') : bEl.classList.remove('mega-fx');

    const inv = document.getElementById('st-items');
    inv.innerHTML = `
        <div><img class="res-icon" src="${API}/items/poke-ball.png"><br>${s.items.poke}</div>
        <div><img class="res-icon" src="${API}/items/great-ball.png"><br>${s.items.great}</div>
        <div><img class="res-icon" src="${API}/items/ultra-ball.png"><br>${s.items.ultra}</div>
        <div><img class="res-icon" src="${API}/items/master-ball.png"><br>${s.items.master}</div>
        <div><img class="res-icon" src="${API}/items/sun-stone.png"><br>${s.items.stone}</div>
        <div><img class="res-icon" src="${API}/items/key-stone.png"><br>${s.items.mstone}</div>
    `;
    
    document.getElementById('ballSelect').innerHTML = `
        <option value="poke">精靈球 (${s.items.poke})</option>
        <option value="great">超級球 (${s.items.great})</option>
        <option value="ultra">高級球 (${s.items.ultra})</option>
        <option value="master">大師球 (${s.items.master})</option>`;
}

function record() {
    const amt = parseInt(document.getElementById('recAmt').value);
    const date = document.getElementById('recDate').value;
    const cat = document.getElementById('recCat').value;
    if(!amt || !date) return;

    const reward = Math.floor(amt * 0.1);
    s.bal += reward; s.pool += amt; s.achieveBal += amt;
    s.tasks.dRec++; s.tasks.wRec++; s.tasks.mRec++;

    const month = date.substring(0, 7);
    s.yearSums[month] = (s.yearSums[month] || 0) + amt;
    s.hist.push({id: Date.now(), date, cat, amt, note: document.getElementById('recNote').value, reward});

    if(s.achieveBal >= 5000) { s.achieveBal -= 5000; s.items.master++; alert("🏆 獲得大師球！"); }
    if(s.pool >= 500) { s.pool -= 500; spawnEnemy(); }
    else { document.getElementById('msg').innerText = `獲得 P$ ${reward}！遭遇還差 P$ ${500-s.pool}`; }

    document.getElementById('recAmt').value = ""; updateUI();
}

function spawnEnemy() {
    const id = Math.floor(Math.random()*493)+1;
    const isShiny = Math.random() < ((Date.now() < s.buddy.megaUntil) ? 0.15 : 0.05);
    curE = {id, hp: 100, isShiny, name: NAMES[id-1]};
    document.getElementById('enemyImg').src = `${API}/pokemon/${isShiny?'shiny/':''}${id}.png`;
    document.getElementById('enemyArea').style.display = "block";
    document.getElementById('battleActions').style.display = "block";
    document.getElementById('inputArea').style.display = "none";
    document.getElementById('hpFill').style.width = "100%";
    document.getElementById('msg').innerText = `野生的 ${curE.name}${isShiny?' ✨':''} 出現了！`;
}

async function throwBall() {
    const type = document.getElementById('ballSelect').value;
    if(s.items[type] <= 0 && type !== 'master') { alert("沒球了！"); return; }
    if(type !== 'master') s.items[type]--;

    const ball = document.getElementById('ballOverlay');
    ball.src = `${API}/items/${type}-ball.png`; ball.style.display = "block";
    ball.className = 'ball-throw';
    await new Promise(r => setTimeout(r, 800));
    ball.className = 'ball-shake';
    await new Promise(r => setTimeout(r, 1500));

    const rate = {poke:0.3, great:0.5, ultra:0.7, master:1.0}[type] * (1.5 - curE.hp/100) * (Date.now() < s.buddy.megaUntil ? 2.0 : 1.0);
    if(Math.random() < rate || type === 'master') {
        document.getElementById('gotcha').style.display = "block";
        if(!s.owned.includes(curE.id)) s.owned.push(curE.id);
        if(curE.isShiny && !s.shinyOwned.includes(curE.id)) s.shinyOwned.push(curE.id);
        s.prog.evo++; if(MEGA_DATA[curE.id]) s.prog.mega++;
        if(s.prog.evo >= 5) { s.prog.evo=0; s.items.stone++; }
        if(s.prog.mega >= 5) { s.prog.mega=0; s.items.mstone++; }
        s.tasks.dCatch++; s.tasks.wCatch++; s.tasks.mCatch++;
        setTimeout(() => {
            document.getElementById('gotcha').style.display = "none";
            document.getElementById('enemyArea').style.display = "none";
            document.getElementById('battleActions').style.display = "none";
            document.getElementById('inputArea').style.display = "block";
            ball.style.display = "none"; ball.className = "";
            document.getElementById('msg').innerText = `捕捉成功！`; updateUI();
        }, 1500);
    } else {
        ball.style.display = "none"; ball.className = "";
        document.getElementById('msg').innerText = "哎呀！沒抓到！";
    }
}

function attack() {
    if(!curE) return; curE.hp -= 25;
    document.getElementById('hpFill').style.width = Math.max(0, curE.hp) + "%";
    if(curE.hp <= 0) { alert("寶可夢被打跑了！"); location.reload(); }
}

function performEvolve() {
    if (s.items.stone <= 0) { alert("進化石不足！"); return; }
    let target = EVO_DATA[s.buddyId];
    if (!target) {
        if (s.buddyId >= 493) { alert("已是最終型態！"); return; }
        target = s.buddyId + 1;
    }
    if (Array.isArray(target)) {
        let msg = "請選擇進化目標：\n";
        target.forEach((id, idx) => { msg += `${idx + 1}: ${NAMES[id-1]}\n`; });
        let choice = prompt(msg);
        let selectedIdx = parseInt(choice) - 1;
        if (target[selectedIdx]) executeEvolve(target[selectedIdx]);
    } else {
        if (confirm(`進化為 ${NAMES[target-1]}？`)) executeEvolve(target);
    }
}

function executeEvolve(nextId) {
    s.items.stone--; s.buddyId = nextId;
    if (!s.owned.includes(nextId)) s.owned.push(nextId);
    updateUI(); alert("✨ 進化成功！");
}

function tryMega() {
    const today = new Date().toDateString();
    const megaOptions = MEGA_DATA[s.buddyId];
    if (!megaOptions) { alert("無法 Mega 進化！"); return; }
    if (s.items.mstone <= 0) { alert("需要 Mega 石！"); return; }
    if (s.buddy.dailyMegaDate === today) { alert("今天已進化過！"); return; }
    let suffix = megaOptions[0];
    if (megaOptions.length > 1) {
        let choice = prompt(`選擇型態：\n1: Mega ${NAMES[s.buddyId-1]} X\n2: Mega ${NAMES[s.buddyId-1]} Y`);
        if (choice === "1") suffix = megaOptions[0];
        else if (choice === "2") suffix = megaOptions[1];
        else return;
    }
    s.items.mstone--; s.buddy.activeMegaSuffix = suffix; 
    s.buddy.megaUntil = Date.now() + 7200000; s.buddy.dailyMegaDate = today;
    updateUI(); alert(`🧬 Mega 進化成功！`);
}

function buy(type, price) {
    if(s.bal < price) { alert("錢不夠！"); return; }
    s.bal -= price; s.items[type]++; updateUI();
}

function renderTasks() {
    const today = new Date().toDateString();
    if(s.tasks.dailyDate !== today) {
        s.tasks.dailyDate = today; s.tasks.dRec = 0; s.tasks.dCatch = 0; s.tasks.claimed = [];
    }
    document.getElementById('taskList').innerHTML = `
        <div class="card"><b>每日</b>: ${s.tasks.dRec}/1 記帳, ${s.tasks.dCatch}/1 捕捉 
        <button onclick="claimTask('daily')" ${(s.tasks.dRec>=1 && s.tasks.dCatch>=1 && !s.tasks.claimed.includes('daily'))?'':'disabled'}>領取</button></div>
        <div class="card"><b>每週</b>: ${s.tasks.wRec}/5 記帳, ${s.tasks.wCatch}/10 捕捉 
        <button onclick="claimTask('weekly')" ${(s.tasks.wRec>=5 && s.tasks.wCatch>=10 && !s.tasks.claimed.includes('weekly'))?'':'disabled'}>領取</button></div>
    `;
}

function claimTask(type) {
    if(type==='daily') s.items.great++; else s.items.stone++;
    s.tasks.claimed.push(type); updateUI(); renderTasks();
}

let dexId = 25, dexShiny = false;
function renderDex() {
    const nav = document.getElementById('dexNav'); nav.innerHTML = "";
    for(let i=1; i<=493; i++) {
        const item = document.createElement('div');
        item.className = `dex-item ${i === dexId ? 'active' : ''}`;
        item.innerText = s.owned.includes(i) ? `No.${i} ${NAMES[i-1]}` : `No.${i} ???`;
        item.onclick = () => { dexId = i; renderDex(); };
        nav.appendChild(item);
    }
    const isCaught = s.owned.includes(dexId);
    document.getElementById('dexTitle').innerText = isCaught ? NAMES[dexId-1] : "???";
    document.getElementById('dexImg').src = isCaught ? `${API}/pokemon/${dexShiny?'shiny/':''}${dexId}.png` : `${API}/pokemon/0.png`;
    document.getElementById('shinyBtn').disabled = !s.shinyOwned.includes(dexId);
}
function setDexShiny(val) { dexShiny = val; renderDex(); }
function assignBuddy() {
    if(!s.owned.includes(dexId)) return;
    s.buddyId = dexId; s.isShinyBuddy = dexShiny; updateUI(); alert("夥伴更換！");
}

function searchHistory() {
    const start = document.getElementById('hStart').value;
    const end = document.getElementById('hEnd').value;
    const list = document.getElementById('historyList'); list.innerHTML = "";
    s.hist.filter(h => h.date >= start && h.date <= end).forEach(h => {
        list.innerHTML += `<div class="card">${h.date} ${h.cat} $${h.amt} <button onclick="delHist(${h.id})">刪</button></div>`;
    });
}
function delHist(id) {
    const idx = s.hist.findIndex(h => h.id === id);
    if(idx > -1) { s.bal = Math.max(0, s.bal - s.hist[idx].reward); s.hist.splice(idx, 1); updateUI(); searchHistory(); }
}
function exportData() {
    const blob = new Blob([JSON.stringify(s)], {type: "application/json"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `poke_save.json`; a.click();
}
function importData(e) {
    const reader = new FileReader(); reader.onload = (ev) => { s = JSON.parse(ev.target.result); updateUI(); alert("成功"); };
    reader.readAsText(e.target.files[0]);
}

let chart1, chart2;
function renderCharts() {
    const ctx1 = document.getElementById('chartYear').getContext('2d');
    if(chart1) chart1.destroy();
    chart1 = new Chart(ctx1, { type: 'line', data: { labels: Object.keys(s.yearSums).sort(), datasets: [{ label: '支出', data: Object.values(s.yearSums), borderColor: '#2d5a27' }] } });
    const cats = {}; s.hist.forEach(h => cats[h.cat] = (cats[h.cat] || 0) + h.amt);
    const ctx2 = document.getElementById('chartCat').getContext('2d');
    if(chart2) chart2.destroy();
    chart2 = new Chart(ctx2, { type: 'pie', data: { labels: Object.keys(cats), datasets: [{ data: Object.values(cats), backgroundColor: ['#ff6384','#36a2eb','#cc65fe','#ffce56','#4bc0c0'] }] } });
}

function openPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
    document.getElementById(id).classList.add('page-active');
    if(id === 'dexPage') renderDex(); if(id === 'chartPage') renderCharts(); if(id === 'taskPage') renderTasks();
}
function back() { document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active')); }
</script>
