<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster v52 - 終極神奧穩定版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        :root { 
            --p: #2d5a27; --bg: #f4f7f6; --text: #2c3e50; --accent: #f1c40f;
            --mega: #9b59b6; --danger: #e74c3c; --white: #ffffff;
        }
        body { font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif; background: #1a1a1a; margin: 0; color: var(--text); overflow: hidden; touch-action: manipulation; }
        
        /* 頁面切換系統 */
        .page { display: none; width: 100vw; height: 100vh; background: var(--bg); position: fixed; top: 0; left: 0; z-index: 100; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .page-active { display: block; animation: slideUp 0.25s ease-out; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 戰鬥舞台 */
        .battle-stage { height: 260px; position: relative; background: linear-gradient(#87ceeb 60%, #9cd39c 60%); border-bottom: 4px solid #333; overflow: hidden; }
        .buddy-box { position: absolute; bottom: 20px; left: 30px; width: 100px; z-index: 5; transition: 0.3s; }
        .enemy-box { position: absolute; top: 30px; right: 30px; width: 100px; text-align: center; }
        #ballOverlay { position: absolute; width: 40px; display: none; z-index: 100; pointer-events: none; }
        .hp-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; border: 1px solid #000; margin-bottom: 5px; overflow: hidden; }
        #hpFill { height: 100%; background: #2ecc71; width: 100%; transition: 0.5s ease; }

        /* 圖鑑佈局 */
        .dex-container { display: flex; height: calc(100vh - 120px); background: #eee; margin: 5px; border-radius: 12px; overflow: hidden; }
        .dex-sidebar { width: 40%; overflow-y: auto; background: #ddd; border-right: 2px solid #ccc; }
        .dex-main { width: 60%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; background: white; text-align: center; }
        .dex-item { padding: 12px 5px; border-bottom: 1px solid #bbb; font-size: 13px; cursor: pointer; }
        .dex-item.active { background: var(--p); color: white; font-weight: bold; }
        .mega-fx { filter: drop-shadow(0 0 12px var(--mega)); animation: glow 1.5s infinite; }
        @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 5px var(--mega)); } 50% { filter: drop-shadow(0 0 15px var(--mega)); } }

        /* UI 元件 */
        .card { background: var(--white); border-radius: 12px; padding: 15px; margin: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .msg-box { height: 45px; background: #fff; padding: 10px; font-weight: bold; font-size: 14px; border-bottom: 1px solid #ddd; color: var(--p); }
        .control-panel { padding: 5px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: #333; height: 85px; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .btn-nav { background: #444; color: white; border: none; font-size: 11px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .btn-back { background: var(--danger); color: white; width: calc(100% - 20px); padding: 15px; margin: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        /* 捕捉動畫修正 */
        .ball-throw { display: block !important; animation: ballCurve 0.8s forwards; }
        .ball-shake { display: block !important; animation: ballShake 0.5s 3; }
        @keyframes ballCurve { 0% { left: 40px; bottom: 40px; transform: scale(1) rotate(0deg); } 100% { left: 220px; bottom: 160px; transform: scale(0.7) rotate(360deg); } }
        @keyframes ballShake { 0%, 100% { transform: translate(220px, -160px) rotate(0deg); } 25% { transform: translate(220px, -160px) rotate(15deg); } 75% { transform: translate(220px, -160px) rotate(-15deg); } }
        .gotcha-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); color: #f1c40f; font-size: 40px; font-weight: 900; text-shadow: 2px 2px 0 #000; z-index: 200; display: none; pointer-events: none; }

        input, select { font-size: 16px; border: 1px solid #ccc; padding: 8px; border-radius: 6px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="mainPage">
    <div class="battle-stage">
        <div id="gotcha" class="gotcha-text">GOTCHA!</div>
        <div class="buddy-box"><img id="buddyImg" src="" style="width:100%; height:100px; object-fit:contain;"></div>
        <div class="enemy-box" id="enemyArea" style="display:none;">
            <div class="hp-bar"><div id="hpFill"></div></div>
            <img id="enemyImg" src="" style="width:100%; height:80px; object-fit:contain;">
        </div>
        <img id="ballOverlay" src="">
    </div>

    <div id="msg" class="msg-box">系統載入中...</div>

    <div id="inputArea" class="card">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:10px;">
            <input type="date" id="recDate">
            <select id="recCat"><option>飲食</option><option>交通</option><option>娛樂</option><option>購物</option><option>其他</option></select>
        </div>
        <div style="display:flex; gap:8px; margin-bottom:10px;">
            <input id="recNote" type="text" placeholder="備註" style="flex:1;">
            <input id="recAmt" type="number" placeholder="金額" style="width:90px;">
        </div>
        <button onclick="record()" style="background:var(--p); color:white; width:100%; padding:14px; border:none; border-radius:10px; font-weight:bold;">記帳並探索冒險</button>
    </div>

    <div id="battleActions" class="card hidden" style="border:2px solid var(--p); background: #fdfdfd;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;">
            <button onclick="attack()" style="background:#e74c3c; color:white; padding:12px; border:none; border-radius:8px; font-weight:bold;">⚔️ 攻擊</button>
            <button onclick="tryMega()" style="background:var(--mega); color:white; padding:12px; border:none; border-radius:8px; font-weight:bold;">🧬 MEGA 進化</button>
        </div>
        <div style="display:flex; gap:8px;">
            <select id="ballSelect" style="flex:1;"></select>
            <button onclick="throwBall()" style="background:var(--p); color:white; padding:0 25px; border:none; border-radius:8px; font-weight:bold;">投球</button>
        </div>
    </div>

    <div class="control-panel">
        <button class="btn-nav" onclick="openPage('chartPage')">📈<br>報表</button>
        <button class="btn-nav" onclick="openPage('dexPage')">📖<br>圖鑑</button>
        <button class="btn-nav" onclick="openPage('statusPage')">👤<br>狀態</button>
        <button class="btn-nav" onclick="openPage('historyPage')">📜<br>紀錄</button>
        <button class="btn-nav" onclick="openPage('adminPage')">⚙️<br>管理</button>
    </div>
</div>

<div id="dexPage" class="page">
    <div class="dex-container">
        <div class="dex-sidebar" id="dexNav"></div>
        <div class="dex-main" id="dexView">
            <h3 id="dexTitle" style="margin:5px;">載入中...</h3>
            <img id="dexImg" src="" style="width:140px; height:140px; object-fit:contain; margin-bottom:10px;">
            <div id="dexCtrl" class="hidden">
                <div style="margin-bottom:15px;">
                    <button onclick="setDexShiny(false)" style="padding:8px 15px; border-radius:5px 0 0 5px; border:1px solid #ccc;">一般</button><button onclick="setDexShiny(true)" style="padding:8px 15px; border-radius:0 5px 5px 0; border:1px solid #ccc;">✨ 閃光</button>
                </div>
                <button onclick="assignBuddy()" style="background:var(--p); color:white; padding:12px 25px; border:none; border-radius:25px; font-weight:bold; width:100%;">就決定是你了！</button>
            </div>
        </div>
    </div>
    <button class="btn-back" onclick="back()">✖ 關閉圖鑑</button>
</div>

<div id="chartPage" class="page">
    <div class="card"><h3>📊 年度支出趨勢</h3><canvas id="chartYear"></canvas></div>
    <div class="card"><h3>🍕 類別佔比</h3><canvas id="chartCat"></canvas></div>
    <button class="btn-back" onclick="back()">✖ 關閉報表</button>
</div>

<div id="statusPage" class="page">
    <div class="card">
        <h3>👤 訓練家中心</h3>
        <p>錢包：P$ <b id="st-bal">0</b></p>
        <p>進度：P$ <span id="st-achieve">0</span> / 5000</p>
        <hr>
        <p>進化石進度 (<span id="p-evo-txt">0</span>/5)</p>
        <div class="hp-bar"><div id="p-evo-bar" style="height:100%; background:var(--accent); width:0%;"></div></div>
        <p>Mega石進度 (<span id="p-mega-txt">0</span>/5)</p>
        <div class="hp-bar"><div id="p-mega-bar" style="height:100%; background:var(--mega); width:0%;"></div></div>
        <div id="st-items" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:15px; text-align:center; font-size:12px;"></div>
        <button onclick="performEvolve()" style="background:#e67e22; color:white; width:100%; padding:15px; margin-top:15px; border:none; border-radius:10px; font-weight:bold;">消耗進化石進化夥伴</button>
    </div>
    <button class="btn-back" onclick="back()">✖ 返回</button>
</div>

<div id="historyPage" class="page">
    <div class="card">
        <h3>📜 歷史紀錄 (7天)</h3>
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <input type="date" id="hStart" style="flex:1;"> 到 <input type="date" id="hEnd" style="flex:1;">
        </div>
        <button onclick="searchHistory()" style="background:#2980b9; color:white; width:100%; padding:12px; border:none; border-radius:8px;">搜尋</button>
        <div id="historyList" style="margin-top:15px; max-height:50vh; overflow-y:auto;"></div>
    </div>
    <button class="btn-back" onclick="back()">✖ 返回</button>
</div>

<div id="adminPage" class="page">
    <div class="card">
        <h3>⚙️ 管理</h3>
        <button onclick="exportData()" style="background:#2980b9; color:white; width:100%; padding:12px; margin-bottom:10px; border:none; border-radius:5px;">💾 匯出存檔 (JSON)</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        <button onclick="document.getElementById('importFile').click()" style="background:#27ae60; color:white; width:100%; padding:12px; margin-bottom:10px; border:none; border-radius:5px;">📂 匯入存檔 (JSON)</button>
        <hr>
        <button onclick="document.getElementById('csvFile').click()" style="background:var(--p); color:white; width:100%; padding:12px; border:none; border-radius:5px;">📑 匯入財政部 CSV</button>
        <input type="file" id="csvFile" style="display:none" onchange="handleCSV(event)">
        <hr>
        <button onclick="if(confirm('確定清除所有存檔？')){localStorage.clear();location.reload();}" style="background:var(--danger); color:white; width:100%; padding:12px; border:none; border-radius:5px;">🔥 重設系統</button>
    </div>
    <button class="btn-back" onclick="back()">✖ 返回</button>
</div>

    bal: 1000, pool: 0, items: {poke:10, great:5, ultra:0, master:1, stone:0, mstone:0},
    prog: {evo:0, mega:0}, buddyId: 25, isShinyBuddy: false, 
    owned: [25], shinyOwned: [], 
    buddy: {megaUntil: 0, dailyMegaDate: ""},
    hist: [], yearSums: {}, achieveBal: 0,
    lastUpdate: new Date().toDateString()
};

// --- [ 核心邏輯修正：確保 APK 環境穩定 ] ---
window.onload = function() {
    try {
        const saved = localStorage.getItem('pokemaster_v52');
        if (saved) {
            const parsed = JSON.parse(saved);
            s = {...s, ...parsed};
        }
        document.getElementById('recDate').valueAsDate = new Date();
        updateUI();
        document.getElementById('msg').innerText = "冒險準備就緒！";
    } catch(e) {
        console.error("Init fail", e);
    }
};

function updateUI() {
    localStorage.setItem('pokemaster_v52', JSON.stringify(s));
    
    // 基本數值
    document.getElementById('st-bal').innerText = s.bal.toLocaleString();
    document.getElementById('st-achieve').innerText = s.achieveBal.toLocaleString();
    document.getElementById('p-evo-txt').innerText = s.prog.evo;
    document.getElementById('p-evo-bar').style.width = (Math.min(s.prog.evo, 5)/5*100) + "%";
    document.getElementById('p-mega-txt').innerText = s.prog.mega;
    document.getElementById('p-mega-bar').style.width = (Math.min(s.prog.mega, 5)/5*100) + "%";

    // 夥伴圖片處理
    const isMega = Date.now() < s.buddy.megaUntil;
    let bImg = isMega ? `${API}/pokemon/${MEGA_DATA[s.buddyId] || s.buddyId+'-mega'}.png` 
                      : `${API}/pokemon/${s.isShinyBuddy?'shiny/':''}${s.buddyId}.png`;
    
    const bEl = document.getElementById('buddyImg');
    bEl.src = bImg;
    isMega ? bEl.classList.add('mega-fx') : bEl.classList.remove('mega-fx');

    renderBackpack();
}

function record() {
    const amt = parseInt(document.getElementById('recAmt').value);
    const date = document.getElementById('recDate').value;
    if (!amt || !date) { alert("請填入金額與日期"); return; }

    s.bal += Math.floor(amt * 0.1);
    s.pool += amt;
    s.achieveBal += amt;
    
    const month = date.substring(0, 7);
    s.hist.push({id: Date.now(), date, cat: document.getElementById('recCat').value, amt, note: document.getElementById('recNote').value});
    s.yearSums[month] = (s.yearSums[month] || 0) + amt;

    if (s.achieveBal >= 5000) {
        s.achieveBal -= 5000; s.items.master++; alert("🏆 成就達成：獲得大師球！");
    }

    if (s.pool >= 500) { s.pool -= 500; spawnEnemy(); }
    else { document.getElementById('msg').innerText = `獲得 P$ ${Math.floor(amt*0.1)}，距離遭遇還差 P$ ${500-s.pool}`; }

    document.getElementById('recAmt').value = "";
    updateUI();
}

let curE = null;
function spawnEnemy() {
    const id = Math.floor(Math.random()*493)+1;
    const isShiny = Math.random() < (Date.now() < s.buddy.megaUntil ? 0.12 : 0.05);
    curE = {id, hp: 100, isShiny, name: NAMES[id-1] || "神秘寶可夢"};
    
    document.getElementById('enemyImg').src = `${API}/pokemon/${isShiny?'shiny/':''}${id}.png`;
    document.getElementById('enemyArea').style.display = "block";
    document.getElementById('battleActions').classList.remove('hidden');
    document.getElementById('inputArea').classList.add('hidden');
    document.getElementById('hpFill').style.width = "100%";
    document.getElementById('msg').innerText = `野生的 ${curE.name} 出現了！`;
}

async function throwBall() {
    const type = document.getElementById('ballSelect').value;
    if (s.items[type] <= 0 && type !== 'master') { alert("球不足！"); return; }
    if (type !== 'master') s.items[type]--;

    const ball = document.getElementById('ballOverlay');
    ball.style.display = 'block';
    ball.src = `${API}/items/${type}-ball.png`;
    ball.className = 'ball-throw';
    
    await new Promise(r => setTimeout(r, 800));
    ball.className = 'ball-shake';
    await new Promise(r => setTimeout(r, 1500));

    const catchRate = {poke:0.3, great:0.5, ultra:0.7, master:1.0}[type] * (1.5 - curE.hp/100);
    if (Math.random() < catchRate || type === 'master') {
        document.getElementById('gotcha').style.display = "block";
        if (!s.owned.includes(curE.id)) s.owned.push(curE.id);
        if (curE.isShiny && !s.shinyOwned.includes(curE.id)) s.shinyOwned.push(curE.id);
        
        s.prog.evo++;
        if (MEGA_DATA[curE.id]) s.prog.mega++;
        if (s.prog.evo >= 5) { s.prog.evo=0; s.items.stone++; }
        if (s.prog.mega >= 5) { s.prog.mega=0; s.items.mstone++; }
        
        setTimeout(resetBattle, 1800);
    } else {
        ball.style.display = 'none';
        ball.className = '';
        document.getElementById('msg').innerText = "哎呀！被逃走了！";
    }
    updateUI();
}

// --- [ 輔助 UI 函數 ] ---
function openPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
    document.getElementById(id).classList.add('page-active');
    if (id === 'dexPage') renderDex();
    if (id === 'chartPage') renderCharts();
}

function back() {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
}

function resetBattle() {
    curE = null;
    document.getElementById('gotcha').style.display="none";
    document.getElementById('enemyArea').style.display="none";
    document.getElementById('battleActions').classList.add('hidden');
    document.getElementById('inputArea').classList.remove('hidden');
    document.getElementById('ballOverlay').style.display="none";
    document.getElementById('ballOverlay').className="";
    document.getElementById('msg').innerText = "冒險繼續！";
}

function attack() {
    if (!curE) return;
    curE.hp = Math.max(10, curE.hp - 25);
    document.getElementById('hpFill').style.width = curE.hp + "%";
    document.getElementById('msg').innerText = "攻擊成功！捕捉率提升！";
}

function renderBackpack() {
    const its = [
        {k:'poke', n:'普通球', i:'poke-ball'}, {k:'great', n:'超級球', i:'great-ball'},
        {k:'ultra', n:'高級球', i:'ultra-ball'}, {k:'master', n:'大師球', i:'master-ball'},
        {k:'stone', n:'進化石', i:'shiny-stone'}, {k:'mstone', n:'Mega石', i:'mega-stone'}
    ];
    document.getElementById('st-items').innerHTML = its.map(it => `
        <div><img src="${API}/items/${it.i}.png" style="width:30px;"><br>${it.n}<br>x${s.items[it.k] || 0}</div>
    `).join('');
    
    document.getElementById('ballSelect').innerHTML = ['poke','great','ultra','master'].map(k => `
        <option value="${k}">${k.toUpperCase()}球 (x${s.items[k]})</option>
    `).join('');
}

let tempId = 25, tempShiny = false;
function renderDex() {
    const nav = document.getElementById('dexNav');
    nav.innerHTML = NAMES.map((n, i) => {
        const id = i + 1;
        const isOwn = s.owned.includes(id);
        return `<div class="dex-item ${tempId===id?'active':''}" onclick="previewDex(${id})">
            ${String(id).padStart(3,'0')} ${isOwn ? n : '???' }
        </div>`;
    }).join('');
}

function previewDex(id) {
    tempId = id; tempShiny = false;
    const isOwn = s.owned.includes(id);
    document.getElementById('dexTitle').innerText = isOwn ? NAMES[id-1] : "尚未捕捉";
    document.getElementById('dexImg').src = isOwn ? `${API}/pokemon/${id}.png` : "";
    document.getElementById('dexCtrl').className = isOwn ? "" : "hidden";
    renderDex();
}

function setDexShiny(val) {
    if(!s.shinyOwned.includes(tempId) && val) { alert("尚未獲得閃光形態"); return; }
    tempShiny = val;
    document.getElementById('dexImg').src = `${API}/pokemon/${val?'shiny/':''}${tempId}.png`;
}

function assignBuddy() {
    s.buddyId = tempId; s.isShinyBuddy = tempShiny;
    alert("已更改夥伴！"); back(); updateUI();
}

// --- [ 圖表邏輯修正：防止打包後不顯示 ] ---
let chart1, chart2;
function renderCharts() {
    if (typeof Chart === 'undefined') return;
    if (chart1) chart1.destroy();
    if (chart2) chart2.destroy();

    const ctx1 = document.getElementById('chartYear').getContext('2d');
    const months = Object.keys(s.yearSums).sort().slice(-6);
    chart1 = new Chart(ctx1, {
        type: 'line',
        data: {
            labels: months,
            datasets: [{ label: '支出趨勢', data: months.map(m => s.yearSums[m]), borderColor: '#2ecc71', tension: 0.2 }]
        }
    });

    const ctx2 = document.getElementById('chartCat').getContext('2d');
    const cats = ["飲食","交通","娛樂","購物","其他"];
    const catData = cats.map(c => s.hist.filter(h => h.cat === c).reduce((sum, item) => sum + item.amt, 0));
    chart2 = new Chart(ctx2, {
        type: 'doughnut',
        data: { labels: cats, datasets: [{ data: catData, backgroundColor: ['#ff6384','#36a2eb','#ffce56','#4bc0c0','#9966ff'] }] }
    });
}

// --- [ 管理功能 ] ---
function exportData() {
    const data = JSON.stringify(s);
    const blob = new Blob([data], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `poke_save_${new Date().getTime()}.json`; a.click();
}

function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            s = JSON.parse(e.target.result); updateUI(); alert("存檔匯入成功！");
        } catch(err) { alert("匯入格式錯誤"); }
    };
    reader.readAsText(file);
}

function handleCSV(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function(evt) {
        const rows = evt.target.result.split('\n');
        rows.forEach((row, idx) => {
            if (idx === 0 || !row) return;
            const cols = row.split(',');
            if (cols.length >= 4) {
                const amt = parseInt(cols[3]);
                if (!isNaN(amt)) {
                    s.hist.push({id: Date.now()+idx, date: cols[0], cat: "購物", amt, note: cols[2]});
                    s.pool += amt; s.achieveBal += amt;
                    const m = cols[0].substring(0, 7); s.yearSums[m] = (s.yearSums[m] || 0) + amt;
                }
            }
        });
        while (s.pool >= 500) { s.pool -= 500; }
        updateUI(); alert("CSV 匯入完成！");
    };
    reader.readAsText(file);
}
</script>
</body>
</html>
