<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster: Final Infinity v43.0</title>
    <style>
        :root { --p: #2d5a27; --g: #d4af37; --bg: #e0eed0; --hp: #4caf50; --task: #3498db; --m: #ff00ff; }
        body { font-family: -apple-system, sans-serif; background: #1a1a1a; margin: 0; display: flex; flex-direction: column; align-items: center; color: #333; }
        
        /* 遊戲螢幕佈局 */
        .game-screen { width: 100%; max-width: 420px; background: var(--bg); border: 5px solid #333; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        /* 戰鬥舞台 */
        .battle-stage { height: 240px; position: relative; background: linear-gradient(#b8eaea, #e0eed0); border-bottom: 4px solid #333; overflow: hidden; }
        .buddy-container { position: absolute; bottom: -15px; left: -10px; width: 180px; z-index: 5; }
        #buddyImg { width: 100%; filter: drop-shadow(4px 4px 6px rgba(0,0,0,0.3)); }
        .enemy-container { position: absolute; top: 25px; right: 25px; width: 110px; text-align: center; }
        #pokeImg { width: 100%; transition: 0.3s; }
        .shiny-effect { filter: drop-shadow(0 0 15px gold) brightness(1.2); }
        
        /* 投球與特效 */
        #ballOverlay { position: absolute; width: 35px; display: none; left: 50px; bottom: 50px; z-index: 50; }
        .ball-throw { animation: ballCurve 0.8s forwards ease-in-out; }
        .ball-shake { animation: ballShake 0.5s 3; }
        @keyframes ballCurve { 0% { transform: translate(0,0) rotate(0); } 100% { transform: translate(250px,-115px) rotate(720deg); } }
        @keyframes ballShake { 0%,100% { transform: translate(250px,-115px) rotate(0); } 50% { transform: translate(250px,-115px) rotate(25deg); } }

        /* 狀態欄 */
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--p); color: white; padding: 8px; font-size: 11px; gap: 4px; text-align: center; }
        .stats-bar span { display: flex; align-items: center; justify-content: center; gap: 3px; }
        .item-icon { width: 22px; height: 22px; object-fit: contain; }
        
        /* 訊息框 */
        .msg-box { height: 90px; background: #fff; padding: 12px; font-weight: bold; border-top: 4px solid #888; position: relative; overflow-y: auto; line-height: 1.4; }
        
        /* 卡片與格狀佈局 */
        .card { background: #f8fff0; border: 2px solid var(--p); padding: 12px; margin: 8px; border-radius: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 10px; border: 2px solid #333; font-weight: bold; cursor: pointer; border-radius: 6px; background: #fff; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        
        /* 彈窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .hidden { display: none; }
        
        /* 管理功能樣式 */
        .hist-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #ddd; font-size: 13px; }
        .del-btn { color: #e74c3c; border: none; background: none; font-size: 18px; }
        canvas { background: #fff; border: 1px solid #ccc; width: 100%; margin-top: 10px; border-radius: 5px; }
        
        /* HP 條 */
        .hp-bar { width: 100px; height: 8px; background: #444; border: 1px solid #000; margin: 5px auto; border-radius: 4px; overflow: hidden; }
        #hpFill { height: 100%; background: var(--hp); transition: 0.3s; }
    </style>
</head>

// --- 2. 狀態管理 ---
let s = {
    bal: 0, pool: 0, megaT: 0,
    items: { poke:10, great:0, ultra:0, master:0, shards:0, stones:0 },
    owned: [{id:25, shiny:false}], buddy: {id:25, shiny:false},
    hist: [], daily: 0, weekly: 0, lastD: "",

// --- 3. 介面更新功能 ---
function updateUI() {
    const today = new Date().toISOString().split('T')[0];
    if(s.lastD !== today) { s.daily = 0; s.lastD = today; }
    
    document.getElementById('balance').innerText = s.bal.toLocaleString();
    document.getElementById('shards').innerText = s.items.shards;
    document.getElementById('stones').innerText = s.items.stones;
    document.getElementById('i-poke').innerText = s.items.poke;
    document.getElementById('i-great').innerText = s.items.great;
    document.getElementById('i-ultra').innerText = s.items.ultra;
    document.getElementById('i-master').innerText = s.items.master;
    
    const isM = Date.now() < s.megaT;
    document.getElementById('shinyRate').innerText = isM ? 20 : 5;
    
    const bImg = document.getElementById('buddyImg');
    const displayId = (isM && MEGA_DATA[s.buddy.id]) ? MEGA_DATA[s.buddy.id] : s.buddy.id;
    bImg.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${displayId}.png`;
    s.buddy.shiny ? bImg.classList.add('shiny-effect') : bImg.classList.remove('shiny-effect');

    document.getElementById('megaBtn').className = (s.items.stones > 0 && MEGA_DATA[s.buddy.id] && !isM) ? "" : "hidden";
    localStorage.setItem('poke_infinity_v43', JSON.stringify(s));
}

// --- 4. 記帳與遭遇 ---
function record() {
    const a = parseInt(document.getElementById('amt').value); if(!a) return;
    const cat = document.getElementById('cat').value;
    const note = document.getElementById('note').value || "日常開銷";
    const date = new Date().toISOString().split('T')[0];

    s.bal += a; s.stats.spend += a; s.weekly += a; s.pool += (a/500)*100;
    s.hist.push({ id: Date.now(), date, cat, note, amt: a });
    
    if(s.daily < 3) { s.daily++; s.items.poke++; }
    document.getElementById('msgText').innerText = `【記帳成功】${note} -$${a}。\n每日獎勵發送中...`;
    
    if(s.pool >= 100) { s.pool = 0; spawnEnemy(); }
    updateUI(); document.getElementById('amt').value = "";
}

function spawnEnemy() {
    const id = Math.floor(Math.random() * 493) + 1;
    const isS = Math.random() < (Date.now() < s.megaT ? 0.2 : 0.05);
    s.cur = { id, hp: 100, t: 1, isS };
    
    const p = document.getElementById('pokeImg');
    p.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
    isS ? p.classList.add('shiny-effect') : p.classList.remove('shiny-effect');
    if(isS) s.stats.shiny++;

    document.getElementById('inputArea').classList.add('hidden');
    document.getElementById('battleActions').classList.remove('hidden');
    document.getElementById('hpWrap').classList.remove('hidden');
    document.getElementById('msgText').innerText = `野生的 ${isS?'✨':''}${NAMES[id-1]} 出現了！`;
    updateUI();
}

// --- 5. 戰鬥系統 ---
async function throwBall() {
    const type = document.getElementById('ballSelect').value;
    if(s.items[type] <= 0 && type !== 'master') return alert("您的精靈球已用盡！");
    if(type !== 'master') s.items[type]--;

    const ball = document.getElementById('ballOverlay');
    ball.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/${type}-ball.png`;
    ball.style.display = 'block'; ball.className = 'ball-throw';
    
    await new Promise(r => setTimeout(r, 800)); ball.className = 'ball-shake';
    await new Promise(r => setTimeout(r, 1200));

    const rate = {poke:0.25, great:0.45, ultra:0.65, master:1.0}[type] + (100-s.cur.hp)/200;
    if(Math.random() < rate || type === 'master') {
        s.owned.push({id: s.cur.id, shiny: s.cur.isS}); s.stats.caught++;
        if(MEGA_DATA[s.cur.id]) { 
            s.items.shards++; 
            if(s.items.shards >= 5) { s.items.shards = 0; s.items.stones++; alert("集滿碎片，獲得進化石！"); }
        }
        document.getElementById('msgText').innerText = `捕捉成功！${NAMES[s.cur.id-1]} 已加入隊伍。`;
        setTimeout(resetStage, 1000);
    } else {
        ball.style.display = 'none'; s.cur.t++;
        document.getElementById('turn').innerText = s.cur.t;
        if(s.cur.t > 8) { document.getElementById('msgText').innerText = "寶可夢逃走了..."; setTimeout(resetStage, 1000); }
        else { document.getElementById('msgText').innerText = "掙脫了！再接再厲。"; }
    }
    updateUI();
}

function resetStage() {
    s.cur = null; document.getElementById('ballOverlay').style.display = 'none';
    document.getElementById('inputArea').classList.remove('hidden');
    document.getElementById('battleActions').classList.add('hidden');
    document.getElementById('hpWrap').classList.add('hidden');
    updateUI();
}

function atk() { s.cur.hp = Math.max(10, s.cur.hp-25); document.getElementById('hpFill').style.width = s.cur.hp+"%"; updateUI(); }
function megaEvolve() { s.items.stones--; s.megaT = Date.now() + 86400000; alert("Mega 進化成功！24小時內閃光率暴增！"); updateUI(); }

// --- 6. 管理後台與統計模組 ---
function renderAdmin() {
    const now = new Date();
    const curYear = now.getFullYear();
    const curMonth = now.toISOString().slice(0, 7);
    
    // 基礎統計
    const mTotal = s.hist.filter(h => h.date.startsWith(curMonth)).reduce((a,b)=>a+b.amt, 0);
    document.getElementById('statsNow').innerHTML = `
        <b>本月 (${curMonth}) 總支出: $${mTotal.toLocaleString()}</b><br>
        累計捕捉: ${s.stats.caught} | 閃光遇見: ${s.stats.shiny}
    `;

    // 筆數列表與刪除
    document.getElementById('historyList').innerHTML = s.hist.slice(-50).reverse().map(h => `
        <div class="hist-item">
            <span>[${h.date}] ${h.note} ($${h.amt})</span>
            <button class="del-btn" onclick="deleteRecord(${h.id})">❌</button>
        </div>
    `).join('');

    drawYearChart(curYear);
}

function deleteRecord(id) {
    const idx = s.hist.findIndex(x => x.id === id);
    if(idx > -1) { 
        if(confirm("確定要刪除這筆紀錄嗎？(金幣將扣回)")) {
            s.bal -= s.hist[idx].amt;
            s.hist.splice(idx, 1);
            updateUI(); renderAdmin();
        }
    }
}

// 繪製年度趨勢圖
function drawYearChart(year) {
    const ctx = document.getElementById('yearChart').getContext('2d');
    const months = Array(12).fill(0);
    s.hist.forEach(h => {
        const d = new Date(h.date);
        if(d.getFullYear() === year) months[d.getMonth()] += h.amt;
    });
    
    const max = Math.max(...months, 1000);
    ctx.clearRect(0,0,400,150);
    ctx.strokeStyle = "#3498db"; ctx.lineWidth = 2;
    ctx.beginPath();
    months.forEach((m, i) => {
        const x = (i * 32) + 25;
        const y = 140 - (m/max * 120);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        ctx.fillStyle = "#333"; ctx.fillText(i+1+"月", x-5, 150);
    });
    ctx.stroke();
}

// 數據輕量化邏輯
function purgeOldData() {
    const days = prompt("請輸入要保留的最近天數 (建議 30-90)：", "30");
    if(!days) return;
    const limit = new Date(); limit.setDate(limit.getDate() - parseInt(days));
    
    if(confirm("即將匯出全資料 JSON 並清理本地舊紀錄，確定嗎？")) {
        saveJSON(); // 強制備份
        s.hist = s.hist.filter(h => new Date(h.date) >= limit);
        updateUI(); renderAdmin();
        alert("輕量化完成！舊數據已從手機移除。");
    }
}

// --- 7. 匯入匯出 ---
function saveJSON() {
    const data = JSON.stringify(s);
    const blob = new Blob([data], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `PokeSave_${new Date().getTime()}.json`; a.click();
}

function loadJSON(e) {
    const r = new FileReader();
    r.onload = (ev) => { try { s = JSON.parse(ev.target.result); updateUI(); alert("存檔讀取成功！"); } catch(e){alert("存檔格式錯誤");} };
    r.readAsText(e.target.files[0]);
}

function importCSV(e) {
    const r = new FileReader();
    r.onload = (ev) => {
        const rows = ev.target.result.split('\n');
        let c = 0;
        rows.forEach((row, i) => {
            if(i === 0 || !row.trim()) return;
            const cols = row.split(','); // 預期: 日期,品名,金額
            if(cols.length >= 3) {
                const amt = parseInt(cols[2].replace(/[^\d]/g, ''));
                if(!isNaN(amt)) {
                    s.hist.push({ id: Date.now()+i, date: cols[0].trim(), cat: "匯入", note: cols[1].trim(), amt: amt });
                    s.bal += amt; c++;
                }
            }
        });
        updateUI(); alert(`載具匯入成功，共 ${c} 筆數據。`);
    };
    r.readAsText(e.target.files[0]);
}

// --- 8. 其他彈窗渲染 ---
function openModal(id) {
    if(id === 'adminModal') renderAdmin();
    if(id === 'buddyModal') {
        document.getElementById('buddyList').innerHTML = s.owned.map((p,i) => `
            <div class="card" onclick="s.buddy=s.owned[${i}];updateUI();closeModals()">
                ${p.id}號 ${NAMES[p.id-1] || '未知'} ${p.shiny?'✨':''}
                <small style="float:right">點擊設為夥伴</small>
            </div>
        `).join('');
    }
    if(id === 'shopModal') {
        const shopItems = [
            {n:"精靈球", p:100, k:"poke"}, {n:"超級球", p:300, k:"great"}, 
            {n:"高級球", p:600, k:"ultra"}, {n:"大師球", p:5000, k:"master"}
        ];
        document.getElementById('shopList').innerHTML = shopItems.map(i => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <span>${i.n} - P$${i.p}</span>
                <button onclick="buy('${i.k}', ${i.p})">購買</button>
            </div>
        `).join('');
    }
    document.getElementById(id).style.display = 'block';
}

function buy(k, p) { if(s.bal >= p) { s.bal -= p; s.items[k]++; updateUI(); openModal('shopModal'); } else { alert("餘額不足！"); } }
function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

// 啟動
const saved = localStorage.getItem('poke_infinity_v43');
if(saved) s = JSON.parse(saved);
updateUI();

</script>
