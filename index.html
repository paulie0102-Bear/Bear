<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster v47.1 - 精準修復版</title>
    <style>
        /* 完全保留 v47 原始配色與佈局 */
        :root { --p: #2d5a27; --g: #d4af37; --bg: #e0eed0; --hp: #4caf50; --task: #3498db; --m: #ff00ff; --crit: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: #1a1a1a; margin: 0; color: #333; overflow-x: hidden; }
        
        .page { display: none; width: 100vw; height: 100vh; background: var(--bg); position: fixed; top: 0; left: 0; z-index: 10; overflow-y: auto; }
        .page-active { display: block; }
        
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--p); color: white; padding: 6px; font-size: 11px; text-align: center; }
        .icon-img { width: 22px; height: 22px; vertical-align: middle; }

        .battle-stage { height: 260px; position: relative; background: linear-gradient(#b8eaea, #e0eed0); border-bottom: 4px solid #333; overflow: hidden; }
        
        /* [補回] 捕捉動畫關鍵影格 */
        #ballOverlay { position: absolute; width: 45px; display: none; left: 50px; bottom: 50px; z-index: 50; }
        .ball-throw { display: block !important; animation: ballCurve 0.9s forwards ease-in-out; }
        .ball-shake { display: block !important; animation: ballShake 0.5s infinite; }
        @keyframes ballCurve { 
            0% { transform: translate(0,0) scale(1.5) rotate(0deg); }
            100% { transform: translate(235px,-100px) scale(0.8) rotate(720deg); } 
        }
        @keyframes ballShake { 
            0%, 100% { transform: translate(235px,-100px) rotate(0deg); }
            50% { transform: translate(235px,-100px) rotate(15deg); }
        }

        .msg-box { height: 90px; background: #fff; padding: 12px; font-weight: bold; border-top: 4px solid #888; overflow-y: auto; font-size: 14px; }
        .result-text { font-size: 28px; color: gold; font-weight: 900; position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); display: none; z-index: 100; text-shadow: 2px 2px #000; }

        .card { background: #f8fff0; border: 2px solid var(--p); padding: 10px; margin: 8px; border-radius: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 10px; border: 2px solid #333; font-weight: bold; cursor: pointer; border-radius: 6px; background: #fff; }
        .back-btn { background: #333; color: white; width: calc(100% - 16px); margin: 8px; padding: 12px; }
        .hp-bar { width: 100px; height: 8px; background: #444; margin: 5px auto; border-radius: 4px; overflow: hidden; }
        #hpFill { height: 100%; background: var(--hp); transition: 0.3s; width: 100%; }
        .shiny-effect { filter: drop-shadow(0 0 10px gold) brightness(1.2); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="mainPage" class="page page-active">
    <div class="stats-bar">
        <span>💰P$<b id="balance">0</b></span>
        <span>✨<b id="shinyRate">5</b>%</span>
        <span>💎 <b id="shards">0</b>/5</span>
        <span>🧪 x<b id="stones">0</b></span>
    </div>
    <div class="stats-bar" style="background:#1e3d1a;">
        <span>🔴 <b id="i-poke">0</b></span>
        <span>🔵 <b id="i-great">0</b></span>
        <span>🟡 <b id="i-ultra">0</b></span>
        <span>🟣 <b id="i-master">0</b></span>
    </div>

    <div class="battle-stage">
        <div id="resText" class="result-text">成功捕捉！</div>
        <div style="position:absolute; bottom:-10px; left:10px; width:140px;"><img id="buddyImg" style="width:100%;"></div>
        <div style="position:absolute; top:30px; right:30px; width:110px; text-align:center;">
            <div id="hpWrap" class="hidden"><div class="hp-bar"><div id="hpFill"></div></div></div>
            <img id="pokeImg" style="width:100%;">
        </div>
        <img id="ballOverlay" src="">
    </div>

    <div class="msg-box" id="msgText">系統載入中...</div>

    <div id="inputArea" class="card">
        <div class="grid"><select id="cat"><option>飲食</option><option>交通</option><option>娛樂</option><option>購物</option><option>其他</option></select><input id="note" type="text" placeholder="項目說明"></div>
        <div class="grid" style="margin-top:8px;"><input id="amt" type="number" placeholder="金額"><button onclick="record()" style="background:var(--p); color:white;">記帳探索</button></div>
    </div>

    <div id="battleActions" class="card hidden">
        <div class="grid"><button onclick="atk()">⚔️ 攻擊</button><button id="megaBtn" class="hidden" onclick="megaEvolve()">MEGA</button></div>
        <div class="grid" style="margin-top:8px;">
            <select id="ballSelect"><option value="poke">精靈球</option><option value="great">超級球</option><option value="ultra">高級球</option><option value="master">大師球</option></select>
            <button onclick="handleThrow()">投球 (<span id="turn">1</span>/8)</button>
        </div>
    </div>

    <div class="grid" style="padding:0 8px;"><button onclick="openPanel('shopPage')">🛒 商店</button><button onclick="openPanel('taskPage')">🎯 任務</button><button onclick="openPanel('buddyPage')">🐾 背包</button><button onclick="openPanel('adminPage')">⚙️ 後台</button></div>
    <button onclick="openPanel('chartPage')" style="margin: 8px; background: var(--task); color:white; width:calc(100% - 16px); padding:10px; border-radius:8px;">📈 年度統計報表</button>
</div>

<div id="chartPage" class="page">
    <div style="padding:20px;">
        <h2>📊 年度統計</h2>
        <div class="card"><h3>年度消費趨勢</h3><canvas id="canvasYear" height="200"></canvas></div>
        <div class="card"><h3>本月分類</h3><canvas id="canvasMonth" height="200"></canvas></div>
        <button class="back-btn" onclick="backToMain()">返回主頁</button>
    </div>
</div>

<div id="shopPage" class="page"><div style="padding:20px;"><h2>🛒 商店</h2><div id="shopList"></div><button class="back-btn" onclick="backToMain()">離開</button></div></div>
<div id="taskPage" class="page"><div style="padding:20px;"><h2>🎯 任務</h2><div id="taskList"></div><button class="back-btn" onclick="backToMain()">返回</button></div></div>
<div id="buddyPage" class="page"><div style="padding:20px;"><h2>🐾 背包資源</h2><div id="buddyList"></div><button class="back-btn" onclick="backToMain()">返回</button></div></div>
<div id="adminPage" class="page"><div style="padding:20px;"><h2>⚙️ 管理員</h2><div id="histList"></div><button class="back-btn" onclick="backToMain()">返回</button></div></div>

<script>
// --- [1] 補回中文名稱陣列 ---
const POKE_NAME = ["妙蛙種子","妙蛙草","妙蛙花","小火龍","火恐龍","噴火龍","傑尼龜","卡咪龜","水箭龜","綠毛蟲","鐵甲蛹","巴大蝶","獨角蟲","鐵殼蛹","大針蜂","波波","比比鳥","比雕","小拉達","拉達","烈雀","大嘴雀","阿柏蛇","阿柏怪","皮卡丘","雷丘","穿山鼠","穿山王","尼多蘭","尼多娜","尼多后","尼多朗","尼多力諾","尼多王","皮皮","皮可西","六尾","九尾","胖丁","胖可丁","超音蝠","大嘴蝠","走路草","臭臭花","霸王花","派拉斯","派拉斯特","毛球","末入蛾","地鼠","三地鼠","喵喵","貓老大","可達鴨","哥達鴨","猴怪","火爆猴","卡蒂狗","風速狗","蚊香蝌蚪","蚊香蛙","快泳蛙","凱西","勇吉拉","胡地","腕力","豪力","怪力","喇叭芽","口呆花","大食花","瑪瑙水母","毒刺水母","小拳石","隆隆岩","隆隆岩","小火馬","烈焰馬","呆呆獸","呆河馬","小磁怪","三合一磁怪","大蔥鴨","嘟嘟","嘟嘟利","小海獅","白海獅","臭泥","臭臭泥","大舌貝","刺甲貝","鬼斯","鬼斯通","耿鬼","大岩蛇","催眠貘","引夢貘人","大鉗蟹","巨鉗蟹","霹靂電球","頑皮雷彈","蛋蛋","椰蛋樹","卡拉卡拉","嘎啦嘎啦","飛腿郎","快拳郎","大舌頭","瓦斯彈","雙彈瓦斯","獨角犀牛","鑽角犀獸","吉利蛋","蔓藤怪","袋獸","墨海馬","海刺龍","角金魚","金魚王","海星星","寶石海星","魔牆人偶","飛天螳螂","迷唇姐","電擊獸","鴨嘴火獸","凱羅斯","肯泰羅","鯉魚王","暴鯉龍","拉普拉斯","百變怪","伊布","水伊布","雷伊布","火伊布","多邊獸","菊石獸","多刺菊石獸","化石盔","鐮刀盔","化石翼龍","卡比獸","急凍鳥","閃電鳥","火焰鳥","迷你龍","哈克龍","快龍","超夢","夢幻"];

const ASSETS = {
    poke: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAMAAABEpIrGAAAAbFBMVEVHcEzvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSULvSUL57vSIAAAAJ3RSTlMAAwUHCQoPFBcaHiInLzI3O0FHSU5XWV5ha3F0d3p7fH6AgYKHjI+Uis90AAAAhUlEQVQ4y7WSSQ7CMBAER0IChGAY70vI/3+mDBySIsS9VpXKXWpbaA8vH98fBqAsy6ZpAii77pAnpAFKWRvIAW6G2mEMVCO3D3KAjYf6IAtU9TAvVIGmGeaDGlD6YR6YAs8v88IUSAf8p8AAsX6B9/XpAIn+pS8EUPiCDL9QfSNoAtv9X38AsAQRv9M1zwsAAAAASUVORK5CYII=",
    great: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAMAAABEpIrGAAAAbFBMVEVHcExNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVNNDVvSULvSULHlYAAAAAJ3RSTlMAAwUHCQoPFBcaHiInLzI3O0FHSU5XWV5ha3F0d3p7fH6AgYKHjI+Uis90AAAAhUlEQVQ4y7WSSQ7CMBAER0IChGAY70vI/3+mDBySIsS9VpXKXWpbaA8vH98fBqAsy6ZpAii77pAnpAFKWRvIAW6G2mEMVCO3D3KAjYf6IAtU9TAvVIGmGeaDGlD6YR6YAs8v88IUSAf8p8AAsX6B9/XpAIn+pS8EUPiCDL9QfSNoAtv9X38AsAQRv9M1zwsAAAAASUVORK5CYII=",
    ultra: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAMAAABEpIrGAAAAbFBMVEVHcEwAAABMNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVNDVPvSULvSULR8WAAAAAJ3RSTlMAAwUHCQoPFBcaHiInLzI3O0FHSU5XWV5ha3F0d3p7fH6AgYKHjI+Uis90AAAAhUlEQVQ4y7WSSQ7CMBAER0IChGAY70vI/3+mDBySIsS9VpXKXWpbaA8vH98fBqAsy6ZpAii77pAnpAFKWRvIAW6G2mEMVCO3D3KAjYf6IAtU9TAvVIGmGeaDGlD6YR6YAs8v88IUSAf8p8AAsX6B9/XpAIn+pS8EUPiCDL9QfSNoAtv9X38AsAQRv9M1zwsAAAAASUVORK5CYII=",
    master: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAMAAABEpIrGAAAAbFBMVEVHcEwfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzAfHzD67vS3N68AAAAAJ3RSTlMAAwUHCQoPFBcaHiInLzI3O0FHSU5XWV5ha3F0d3p7fH6AgYKHjI+Uis90AAAAhUlEQVQ4y7WSSQ7CMBAER0IChGAY70vI/3+mDBySIsS9VpXKXWpbaA8vH98fBqAsy6ZpAii77pAnpAFKWRvIAW6G2mEMVCO3D3KAjYf6IAtU9TAvVIGmGeaDGlD6YR6YAs8v88IUSAf8p8AAsX6B9/XpAIn+pS8EUPiCDL9QfSNoAtv9X38AsAQRv9M1zwsAAAAASUVORK5CYII="
};

let s = {
    bal: 0, pool: 0, megaT: 0,
    items: { poke:10, great:0, ultra:0, master:0, shards:0, stones:0 },
    owned: [{id:25, shiny:false}], buddy: {id:25, shiny:false},
    hist: [], daily: 0, weekly: 0, lastD: "",
    stats: { caught:0, spend:0, yearSums:{} }, 
    claimed: []
};

function updateUI() {
    const today = new Date().toISOString().split('T')[0];
    if(s.lastD !== today) { s.daily = 0; s.lastD = today; }
    
    document.getElementById('balance').innerText = s.bal.toLocaleString();
    document.getElementById('shards').innerText = s.items.shards;
    document.getElementById('stones').innerText = s.items.stones;
    document.getElementById('i-poke').innerText = s.items.poke;
    document.getElementById('i-great').innerText = s.items.great;
    document.getElementById('i-ultra').innerText = s.items.ultra;
    document.getElementById('i-master').innerText = s.items.master;

    const isM = Date.now() < s.megaT;
    document.getElementById('shinyRate').innerText = isM ? 20 : 5;
    
    document.getElementById('buddyImg').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${s.buddy.id}.png`;
    localStorage.setItem('poke_final_v47', JSON.stringify(s));
    if(document.getElementById('msgText').innerText === "系統載入中...") document.getElementById('msgText').innerText = "歡迎回來。";
}

// --- [2] 補回年度統計持久化邏輯 ---
function record() {
    const a = parseInt(document.getElementById('amt').value); if(!a) return;
    const cat = document.getElementById('cat').value;
    const date = new Date().toISOString().split('T')[0];
    const monthKey = date.slice(0, 7);

    s.bal += a; s.stats.spend += a; s.pool += (a/500)*100;
    s.hist.push({ id: Date.now(), date, cat, amt: a });
    
    // 確保年度統計不遺失
    if(!s.stats.yearSums[monthKey]) s.stats.yearSums[monthKey] = 0;
    s.stats.yearSums[monthKey] += a;

    if(s.daily < 3) s.daily++;
    if(s.pool >= 100) { s.pool = 0; spawn(); }
    updateUI(); document.getElementById('amt').value = "";
}

// --- [3] 修復捕捉動畫觸發 ---
function spawn() {
    const id = Math.floor(Math.random() * 151) + 1;
    const isS = Math.random() < (Date.now() < s.megaT ? 0.2 : 0.05);
    s.cur = { id, hp: 100, t: 1, isS };
    const p = document.getElementById('pokeImg');
    p.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
    isS ? p.classList.add('shiny-effect') : p.classList.remove('shiny-effect');
    document.getElementById('inputArea').classList.add('hidden');
    document.getElementById('battleActions').classList.remove('hidden');
    document.getElementById('hpWrap').classList.remove('hidden');
    // 使用中文名稱
    document.getElementById('msgText').innerText = `發現了 ${POKE_NAME[id-1] || '寶可夢'}！`;
}

async function handleThrow() {
    const type = document.getElementById('ballSelect').value;
    if(s.items[type] <= 0 && type !== 'master') return alert("球數不足");
    if(type !== 'master') s.items[type]--;

    const ball = document.getElementById('ballOverlay');
    const res = document.getElementById('resText');
    ball.src = ASSETS[type] || ""; 
    
    ball.className = 'ball-throw'; // 執行拋物線
    await new Promise(r => setTimeout(r, 900));
    
    ball.className = 'ball-shake'; // 執行搖晃
    await new Promise(r => setTimeout(r, 1500)); 

    const rate = {poke:0.3, great:0.5, ultra:0.7, master:1.0}[type];
    if(Math.random() < rate || type === 'master') {
        res.style.display = "block";
        s.owned.push({id: s.cur.id, shiny: s.cur.isS}); s.stats.caught++;
        setTimeout(() => { res.style.display = "none"; resetBattle(); }, 1500);
    } else {
        ball.style.display = 'none'; ball.className = '';
        s.cur.t++; 
        if(s.cur.t > 8) resetBattle();
    }
    updateUI();
}

// 圖表繪製與其餘 v47 函數...
function drawCharts() {
    const yCtx = document.getElementById('canvasYear').getContext('2d');
    const curYear = new Date().getFullYear().toString();
    const months = ["01","02","03","04","05","06","07","08","09","10","11","12"];
    const yData = months.map(m => s.stats.yearSums[`${curYear}-${m}`] || 0);
    yCtx.clearRect(0,0,400,200); yCtx.beginPath(); yCtx.strokeStyle="#3498db";
    yData.forEach((v, i) => {
        const x = 30 + i*30; const y = 180 - (v/Math.max(...yData,1000))*150;
        i===0 ? yCtx.moveTo(x,y) : yCtx.lineTo(x,y);
    });
    yCtx.stroke();
}

function openPanel(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
    document.getElementById(id).classList.add('page-active');
    if(id === 'chartPage') drawCharts();
}
function backToMain() { openPanel('mainPage'); updateUI(); }
function atk() { s.cur.hp = Math.max(10, s.cur.hp-25); document.getElementById('hpFill').style.width = s.cur.hp+"%"; }
function resetBattle() {
    s.cur = null; document.getElementById('ballOverlay').style.display = 'none';
    document.getElementById('inputArea').classList.remove('hidden');
    document.getElementById('battleActions').classList.add('hidden');
    document.getElementById('hpWrap').classList.add('hidden');
    updateUI();
}

// 初始化
const saved = localStorage.getItem('poke_final_v47');
if(saved) s = JSON.parse(saved);
updateUI();
</script>
</body>
</html>
