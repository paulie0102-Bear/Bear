<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster v58 - 終極規格版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        :root { 
            --p: #2d5a27; --bg: #f4f7f6; --text: #2c3e50; --accent: #f1c40f;
            --mega: #9b59b6; --danger: #e74c3c; --white: #ffffff; --gray: #95a5a6;
        }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background: #1a1a1a; margin: 0; color: var(--text); overflow: hidden; }
        
        .page { display: none; width: 100vw; height: 100vh; background: var(--bg); position: fixed; top: 0; left: 0; z-index: 100; overflow-y: auto; }
        .page-active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .battle-stage { height: 240px; position: relative; background: linear-gradient(#87ceeb 60%, #9cd39c 60%); border-bottom: 4px solid #333; overflow: hidden; }
        .buddy-box { position: absolute; bottom: 20px; left: 30px; width: 100px; transition: 0.3s; }
        .enemy-box { position: absolute; top: 30px; right: 30px; width: 100px; text-align: center; }
        #ballOverlay { position: absolute; width: 40px; display: none; z-index: 100; }
        .hp-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        #hpFill { height: 100%; background: #2ecc71; width: 100%; transition: 0.5s; }

        .dex-container { display: flex; height: calc(100vh - 140px); margin: 10px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .dex-sidebar { width: 40%; overflow-y: auto; background: #e0e0e0; }
        .dex-main { width: 60%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; padding: 15px; }
        .dex-item { padding: 15px 10px; border-bottom: 1px solid #ccc; font-size: 14px; text-align: center; }
        .dex-item.active { background: var(--p); color: white; }

        .card { background: var(--white); border-radius: 12px; padding: 15px; margin: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg-box { height: 40px; background: #fff; padding: 8px 15px; font-weight: bold; border-bottom: 1px solid #ddd; color: var(--p); overflow: hidden; line-height: 24px; }
        
        .control-panel { 
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr);
            gap: 4px; background: #222; height: 120px; position: fixed; bottom: 0; width: 100%; padding: 5px; box-sizing: border-box; 
        }
        .btn-nav { background: #333; color: white; border: none; font-size: 12px; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-back { background: var(--danger); color: white; width: calc(100% - 20px); padding: 15px; margin: 10px; border: none; border-radius: 10px; font-weight: bold; }

        /* 分支進化彈窗 */
        #evoModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .evo-content { background: white; padding: 20px; border-radius: 15px; width: 80%; text-align: center; }
        .evo-btn { background: var(--p); color: white; border: none; padding: 10px; margin: 5px; width: 100%; border-radius: 5px; }

        /* 動畫 */
        .ball-throw { display: block !important; animation: ballCurve 0.8s forwards; }
        .ball-shake { display: block !important; animation: ballShake 0.5s 3; }
        @keyframes ballCurve { 0% { left: 40px; bottom: 40px; } 100% { left: 210px; bottom: 140px; transform: scale(0.7) rotate(360deg); } }
        @keyframes ballShake { 0%, 100% { transform: translate(210px, -140px) rotate(0deg); } 25% { transform: translate(210px, -140px) rotate(15deg); } 75% { transform: translate(210px, -140px) rotate(-15deg); } }
        .mega-fx { filter: drop-shadow(0 0 10px var(--mega)); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .gotcha-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: gold; font-size: 40px; font-weight: 900; text-shadow: 2px 2px #000; z-index: 200; display: none; }
        .res-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; text-align: center; }
        .res-icon { width: 30px; height: 30px; object-fit: contain; }
    </style>
</head>
<body>

<div id="mainPage">
    <div class="battle-stage">
        <div id="gotcha" class="gotcha-text">GOTCHA!</div>
        <div id="megaTimer" style="position:absolute; right:10px; top:10px; color:white; font-size:10px; background:rgba(0,0,0,0.5); padding:2px 5px; border-radius:5px; display:none;">Mega: <span id="mTime"></span></div>
        <div class="buddy-box"><img id="buddyImg" src="" style="width:100%; height:90px; object-fit:contain;"></div>
        <div class="enemy-box" id="enemyArea" style="display:none;">
            <div id="turnTxt" style="font-size:10px; color:white;">回合: 1/8</div>
            <div class="hp-bar"><div id="hpFill"></div></div>
            <img id="enemyImg" src="" style="width:100%; height:80px; object-fit:contain;">
        </div>
        <img id="ballOverlay" src="">
    </div>

    <div id="msg" class="msg-box">系統載入中...</div>

    <div id="inputArea" class="card">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:8px;">
            <input type="date" id="recDate">
            <select id="recCat"><option>飲食</option><option>交通</option><option>娛樂</option><option>購物</option><option>其他</option></select>
        </div>
        <div style="display:flex; gap:8px; margin-bottom:8px;">
            <input id="recNote" type="text" placeholder="備註" style="flex:1; padding:8px;">
            <input id="recAmt" type="number" placeholder="金額" style="width:80px; padding:8px;">
        </div>
        <button onclick="record()" style="background:var(--p); color:white; width:100%; padding:12px; border:none; border-radius:8px; font-weight:bold;">同步記帳</button>
    </div>

    <div id="battleActions" class="card" style="border:2px solid var(--p); display:none;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;">
            <button onclick="attack()" style="background:#e74c3c; color:white; padding:10px; border:none; border-radius:5px;">⚔️ 攻擊 (33%)</button>
            <button onclick="tryMega()" style="background:var(--mega); color:white; padding:10px; border:none; border-radius:5px;">🧬 MEGA進化</button>
        </div>
        <div style="display:flex; gap:5px;">
            <select id="ballSelect" style="flex:1;"></select>
            <button onclick="throwBall()" style="background:var(--p); color:white; padding:0 20px; border:none; border-radius:5px;">投球</button>
        </div>
    </div>

    <div class="control-panel">
        <button class="btn-nav" onclick="openPage('chartPage')">📈<br>報表</button>
        <button class="btn-nav" onclick="openPage('dexPage')">📖<br>圖鑑</button>
        <button class="btn-nav" onclick="openPage('statusPage')">👤<br>訓練家</button>
        <button class="btn-nav" onclick="openPage('shopPage')">💰<br>商店</button>
        <button class="btn-nav" onclick="openPage('historyPage')">📜<br>紀錄</button>
        <button class="btn-nav" onclick="openPage('taskPage')">🎯<br>任務</button>
        <button class="btn-nav" onclick="openPage('adminPage')">⚙️<br>管理</button>
        <button class="btn-nav" onclick="location.reload()">🔄<br>刷新</button>
    </div>
</div>

<div id="evoModal"><div class="evo-content"><h3>請選擇進化分支</h3><div id="evoOptions"></div></div></div>

<div id="statusPage" class="page">
    <div class="card">
        <h3>👤 訓練家資料</h3>
        <p>等級：Lv.<b id="st-lv">1</b> (EXP: <span id="st-exp">0</span>/<span id="st-next">100</span>)</p>
        <p>基礎捕捉加成：+<span id="st-catch-mod">0</span>%</p>
        <p>錢包：P$ <b id="st-bal">0</b></p>
        <hr>
        <p>進化石進度 (<span id="p-evo-txt">0</span>/5)</p>
        <div class="hp-bar"><div id="p-evo-bar" style="height:100%; background:var(--accent); width:0%;"></div></div>
        <p>Mega石進度 (<span id="p-mega-txt">0</span>/5)</p>
        <div class="hp-bar"><div id="p-mega-bar" style="height:100%; background:var(--mega); width:0%;"></div></div>
        <div id="st-items" class="res-grid"></div>
        <button onclick="checkEvolution()" style="background:#e67e22; color:white; width:100%; padding:15px; margin-top:15px; border:none; border-radius:10px;">🧬 執行夥伴進化 (消耗1石)</button>
    </div>
    <button class="btn-back" onclick="back()">✖ 返回主畫面</button>
</div>

<div id="dexPage" class="page"><div class="dex-container"><div class="dex-sidebar" id="dexNav"></div><div class="dex-main" id="dexView"><h3 id="dexTitle">???</h3><img id="dexImg" src="" style="width:130px;"><div id="dexCtrl"><button onclick="setDexShiny(false)">一般</button><button onclick="setDexShiny(true)" id="shinyBtn">✨ 閃光</button><br><button onclick="assignBuddy()" style="background:var(--p); color:white; padding:10px; border-radius:20px; margin-top:10px;">設為夥伴</button></div></div></div><button class="btn-back" onclick="back()">✖ 返回主畫面</button></div>
<div id="shopPage" class="page"><div class="card"><h3>💰 精靈商店</h3><div id="shopArea"></div></div><button class="btn-back" onclick="back()">✖ 返回主畫面</button></div>
<div id="chartPage" class="page"><div class="card"><canvas id="chartYear"></canvas></div><div class="card"><canvas id="chartCat"></canvas></div><button class="btn-back" onclick="back()">✖ 返回主畫面</button></div>
<div id="historyPage" class="page"><div class="card"><h3>📜 歷史紀錄</h3><div id="historyList"></div></div><button class="btn-back" onclick="back()">✖ 返回主畫面</button></div>
<div id="taskPage" class="page"><div class="card"><h3>🎯 任務板</h3><div id="taskList"></div></div><button class="btn-back" onclick="back()">✖ 返回主畫面</button></div>
<div id="adminPage" class="page"><div class="card"><h3>⚙️ 存檔管理</h3><button onclick="exportData()">💾 匯出 JSON</button><button onclick="document.getElementById('importFile').click()">📂 匯入 JSON</button><input type="file" id="importFile" hidden onchange="importData(event)"><hr><button onclick="document.getElementById('csvFile').click()">📑 匯入財政部 CSV</button><input type="file" id="csvFile" hidden onchange="handleCSV(event)"><hr><h4>輕量化工具</h4><input type="date" id="lightStart"> 到 <input type="date" id="lightEnd"><button onclick="lighten()">🧹 備份並清理明細</button></div><button class="btn-back" onclick="back()">✖ 返回主畫面</button></div>

<script>
// --- [ 數據與官方進化鏈 ] ---
const NAMES = ["妙蛙種子","妙蛙草","妙蛙花","小火龍","火恐龍","噴火龍","傑尼龜","卡咪龜","水箭龜","綠毛蟲","鐵甲蛹","巴大蝶","獨角蟲","鐵殼蛹","大針蜂","波波","比比鳥","比雕","小拉達","拉達","烈雀","大嘴雀","阿柏蛇","阿柏怪","皮卡丘","雷丘","穿山鼠","穿山王","尼多蘭","尼多娜","尼多后","尼多朗","尼多力諾","尼多王","皮皮","皮可西","六尾","九尾","胖丁","胖可丁","超音蝠","大嘴蝠","走路草","臭臭花","霸王花","派拉斯","派拉斯特","毛球","末入蛾","地鼠","三地鼠","喵喵","貓老大","可達鴨","哥達鴨","猴怪","火爆猴","卡蒂狗","風速狗","蚊香蝌蚪","蚊香蛙","快泳蛙","凱西","勇吉拉","胡地","腕力","豪力","怪力","喇叭芽","口呆花","大食花","瑪瑙水母","毒刺水母","小拳石","隆隆石","隆隆岩","小火馬","烈焰馬","呆呆獸","呆殼獸","小磁怪","三合一磁怪","大蔥鴨","嘟嘟","嘟嘟利","小海獅","白海獅","臭泥","臭臭泥","大舌貝","刺甲貝","鬼斯","鬼斯通","耿鬼","大岩蛇","催眠貘","引夢貘人","大鉗蟹","巨鉗蟹","霹靂電球","頑皮雷彈","蛋蛋","椰蛋樹","卡拉卡拉","嘎啦嘎啦","飛腿郎","快拳郎","大舌頭","瓦斯彈","雙彈瓦斯","獨角犀牛","鑽角犀獸","吉利蛋","蔓藤怪","袋獸","墨海馬","海刺龍","角金魚","金魚王","海星星","寶石海星","魔牆人偶","飛天螳螂","迷唇姐","電擊獸","鴨嘴火獸","凱羅斯","肯泰羅","鯉魚王","暴鯉龍","拉普拉斯","百變怪","伊布","水伊布","雷伊布","火伊布","多邊獸","菊石獸","多刺菊石獸","化石盔","鐮刀盔","化石翼龍","卡比獸","急凍鳥","閃電鳥","火焰鳥","迷你龍","哈克龍","快龍","超夢","夢幻","草苗龜","森林龜","土台龜","小火焰猴","猛火猴","烈焰猴","波加曼","波皇子","帝王拿波","姆克兒","姆克鳥","姆克鷹","大牙狸","大尾狸","圓法師","音箱蟀","小貓怪","勒克貓","倫琴貓","含羞苞","羅絲雷朵","頭蓋龍","戰槌龍","盾甲龍","護城龍","結草兒","結草貴婦","紳士蛾","三蜜蜂","蜂后","帕奇利茲","泳圈鼬","浮潛鼬","櫻花寶","櫻花兒","無殼海兔","海兔獸","長尾怪手","雙尾怪手","飄飄球","隨風球","捲捲耳","長耳兔","夢妖","夢妖魔","黑暗鴉","烏鴉頭頭","魅力喵","東施喵","鈴鐺響","青銅鏡","青銅鐘","盆才怪","愛哭樹","魔尼尼","小福蛋","聒噪鳥","花岩怪","圓陸鯊","尖牙陸鯊","烈咬陸鯊","小卡比獸","利歐路","路卡利歐","怪河馬","河馬獸","鉗尾蠍","龍王蠍","不良蛙","毒骷蛙","尖牙籠","螢火魚","霓虹魚","小球飛魚","雪笠怪","暴雪王","瑪狃拉","自爆磁怪","大舌舔","超甲狂犀","巨蔓藤","電擊魔獸","鴨嘴炎獸","波克基斯","梅卡陽瑪","葉伊布","冰伊布","天蠍王","象牙豬","多邊獸Ｚ","艾路雷朵","大朝北鼻","黑夜魔靈","雪妖女","洛托姆","由克希","艾姆利多","亞克諾姆","帝牙盧卡","帕路奇亞","席多藍恩","雷吉奇卡斯","騎拉帝納","美雷希亞","瑪納霏","達克萊伊","潔咪","阿爾宙斯"];
const API = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites";
const MEGA_LIST = {3: "3-mega", 6: "6-mega", 9: "9-mega", 94: "94-mega", 445: "445-mega", 448: "448-mega"};
const EVO_CHAIN = {
    1:2, 2:3, 4:5, 5:6, 7:8, 8:9,
    133: [134, 135, 136, 470, 471], // 伊布
    281: [282, 475], // 奇魯莉安
    361: [362, 478], // 雪童子
    390:391, 391:392, 443:444, 444:445, 447:448
};

let s = {
    bal: 1000, pool: 0, items: {poke:10, great:5, ultra:0, master:1, stone:0, mstone:0},
    prog: {evo:0, mega:0}, buddyId: 390, isShinyBuddy: false, 
    owned: [390], shinyOwned: [], 
    lv: 1, exp: 0,
    buddy: {megaUntil: 0, dailyMegaDate: ""},
    hist: [], yearSums: {}, achieveBal: 0,
    tasks: {dailyDate: "", dRec: 0, dCatch: 0, wRec: 0, wCatch: 0, claimed: []}
};

let curE = null, battleQ = 0, turn = 1;

window.onload = () => {
    const saved = localStorage.getItem('pokemaster_v58');
    if(saved) s = JSON.parse(saved);
    updateUI();
    setInterval(updateMegaTimer, 1000);
};

function updateUI() {
    localStorage.setItem('pokemaster_v58', JSON.stringify(s));
    document.getElementById('st-bal').innerText = s.bal;
    document.getElementById('st-achieve').innerText = s.achieveBal;
    document.getElementById('p-evo-txt').innerText = s.prog.evo;
    document.getElementById('p-evo-bar').style.width = (s.prog.evo/5*100) + "%";
    document.getElementById('p-mega-txt').innerText = s.prog.mega;
    document.getElementById('p-mega-bar').style.width = (s.prog.mega/5*100) + "%";
    
    // 玩家等級與加成
    document.getElementById('st-lv').innerText = s.lv;
    document.getElementById('st-exp').innerText = s.exp;
    document.getElementById('st-next').innerText = s.lv * 100;
    document.getElementById('st-catch-mod').innerText = s.lv - 1;

    // 夥伴圖片 (含 Mega 資源切換)
    const isMega = Date.now() < s.buddy.megaUntil;
    let bImg = isMega ? `${API}/pokemon/other/official-artwork/${MEGA_LIST[s.buddyId] || s.buddyId}.png` 
                      : `${API}/pokemon/${s.isShinyBuddy?'shiny/':''}${s.buddyId}.png`;
    const bEl = document.getElementById('buddyImg');
    bEl.src = bImg;
    isMega ? bEl.classList.add('mega-fx') : bEl.classList.remove('mega-fx');

    // 商店區域
    const shop = document.getElementById('shopArea');
    shop.innerHTML = `
        <div class="shop-item"><span>精靈球 ($100)</span><button class="shop-btn" onclick="buy('poke', 100)">購買</button></div>
        <div class="shop-item"><span>超級球 ($300)</span><button class="shop-btn" onclick="buy('great', 300)">購買</button></div>
        <div class="shop-item"><span>高級球 ($600)</span><button class="shop-btn" onclick="buy('ultra', 600)">購買</button></div>
    `;

    // 資源顯示
    const inv = document.getElementById('st-items');
    inv.innerHTML = `<div><img class="res-icon" src="${API}/items/poke-ball.png"><br>${s.items.poke}</div>
                     <div><img class="res-icon" src="${API}/items/great-ball.png"><br>${s.items.great}</div>
                     <div><img class="res-icon" src="${API}/items/ultra-ball.png"><br>${s.items.ultra}</div>
                     <div><img class="res-icon" src="${API}/items/master-ball.png"><br>${s.items.master}</div>
                     <div><img class="res-icon" src="${API}/items/sun-stone.png"><br>${s.items.stone}</div>
                     <div><img class="res-icon" src="${API}/items/key-stone.png"><br>${s.items.mstone}</div>`;
    
    document.getElementById('ballSelect').innerHTML = `<option value="poke">精靈球 (${s.items.poke})</option>
        <option value="great">超級球 (${s.items.great})</option>
        <option value="ultra">高級球 (${s.items.ultra})</option>
        <option value="master">大師球 (${s.items.master})</option>`;
}

function record() {
    const amt = parseInt(document.getElementById('recAmt').value);
    const date = document.getElementById('recDate').value;
    if(!amt || !date) return;
    
    s.bal += Math.floor(amt * 0.1);
    s.pool += amt;
    s.achieveBal += amt;
    s.tasks.dRec++; s.tasks.wRec++;

    const month = date.substring(0, 7);
    s.yearSums[month] = (s.yearSums[month] || 0) + amt;
    s.hist.push({id: Date.now(), date, cat: document.getElementById('recCat').value, amt, note: document.getElementById('recNote').value});

    if(s.achieveBal >= 5000) { s.achieveBal -= 5000; s.items.master++; alert("🏆 成就：獲得大師球！"); }
    
    if(s.pool >= 500) {
        battleQ += Math.floor(s.pool / 500);
        s.pool %= 500;
        if(!curE) spawnEnemy();
    }
    document.getElementById('recAmt').value = "";
    updateUI();
}

function spawnEnemy() {
    const id = Math.floor(Math.random()*493)+1;
    const isMegaMod = Date.now() < s.buddy.megaUntil;
    const isShiny = Math.random() < (isMegaMod ? 0.15 : 0.05);
    curE = {id, hp: 100, isShiny, name: NAMES[id-1]};
    turn = 1;

    document.getElementById('enemyImg').src = `${API}/pokemon/${isShiny?'shiny/':''}${id}.png`;
    document.getElementById('enemyArea').style.display = "block";
    document.getElementById('battleActions').style.display = "block";
    document.getElementById('inputArea').style.display = "none";
    document.getElementById('hpFill').style.width = "100%";
    document.getElementById('turnTxt').innerText = `回合: ${turn}/8`;
    document.getElementById('msg').innerText = `發現野生的 ${curE.name}！`;
}

function attack() {
    if(!curE) return;
    curE.hp -= 33;
    document.getElementById('hpFill').style.width = Math.max(0, curE.hp) + "%";
    
    if(curE.hp <= 0) {
        document.getElementById('msg').innerText = "寶可夢倒下了！";
        addExp(20); // 擊倒 2 倍經驗
        setTimeout(endBattle, 1000);
    } else {
        document.getElementById('msg').innerText = "夥伴發動猛攻！";
        nextTurn();
    }
}

function nextTurn() {
    turn++;
    if(turn > 8) {
        alert("寶可夢逃走了！");
        endBattle();
    } else {
        document.getElementById('turnTxt').innerText = `回合: ${turn}/8`;
    }
}

async function throwBall() {
    const type = document.getElementById('ballSelect').value;
    if(s.items[type] <= 0) { alert("球數不足！"); return; }
    s.items[type]--;

    const ball = document.getElementById('ballOverlay');
    ball.src = `${API}/items/${type}-ball.png`;
    ball.className = 'ball-throw';
    
    await new Promise(r => setTimeout(r, 800));
    ball.className = 'ball-shake';
    await new Promise(r => setTimeout(r, 1500));

    // 計算捕捉率
    let base = {poke:0.3, great:0.5, ultra:0.7, master:1.0}[type];
    let hpMod = curE.hp <= 20 ? 3 : (curE.hp <= 50 ? 1.5 : 1);
    let lvMod = 1 + (s.lv - 1) / 100;
    let megaMod = (Date.now() < s.buddy.megaUntil) ? 2.0 : 1.0;

    if(Math.random() < (base * hpMod * lvMod * megaMod) || type === 'master') {
        document.getElementById('gotcha').style.display = "block";
        if(!s.owned.includes(curE.id)) s.owned.push(curE.id);
        if(curE.isShiny && !s.shinyOwned.includes(curE.id)) s.shinyOwned.push(curE.id);
        
        s.prog.evo++;
        if(MEGA_LIST[curE.id]) s.prog.mega++;
        if(s.prog.evo >= 5) { s.prog.evo=0; s.items.stone++; }
        if(s.prog.mega >= 5) { s.prog.mega=0; s.items.mstone++; }
        
        addExp(10); // 捕捉經驗
        s.tasks.dCatch++; s.tasks.wCatch++;
        
        setTimeout(() => {
            document.getElementById('gotcha').style.display = "none";
            endBattle();
        }, 1200);
    } else {
        ball.style.display = "none"; ball.className = "";
        document.getElementById('msg').innerText = "可惜！掙脫了！";
        nextTurn();
    }
    updateUI();
}

function addExp(v) {
    s.exp += v;
    let next = s.lv * 100;
    if(s.exp >= next) {
        s.exp -= next;
        s.lv++;
        alert(`🎉 等級提升至 Lv.${s.lv}！捕捉率上升！`);
    }
}

function endBattle() {
    curE = null;
    document.getElementById('ballOverlay').style.display = "none";
    document.getElementById('ballOverlay').className = "";
    document.getElementById('enemyArea').style.display = "none";
    document.getElementById('battleActions').style.display = "none";
    document.getElementById('inputArea').style.display = "block";
    
    if(battleQ > 1) {
        battleQ--;
        spawnEnemy();
    } else {
        battleQ = 0;
    }
}

// --- [ 進化分支選擇系統 ] ---
function checkEvolution() {
    if(s.items.stone <= 0) { alert("需要 1 顆進化石！"); return; }
    const target = EVO_CHAIN[s.buddyId];
    if(!target) { alert("此夥伴已達進化頂點！"); return; }

    if(Array.isArray(target)) {
        // 彈出分支選擇
        document.getElementById('evoModal').style.display = "flex";
        const container = document.getElementById('evoOptions');
        container.innerHTML = "";
        target.forEach(id => {
            let btn = document.createElement('button');
            btn.className = "evo-btn";
            btn.innerText = `進化為 ${NAMES[id-1]}`;
            btn.onclick = () => execEvolve(id);
            container.appendChild(btn);
        });
        let cancel = document.createElement('button');
        cancel.innerText = "取消";
        cancel.onclick = () => document.getElementById('evoModal').style.display="none";
        container.appendChild(cancel);
    } else {
        execEvolve(target);
    }
}

function execEvolve(id) {
    s.items.stone--;
    s.buddyId = id;
    if(!s.owned.includes(id)) s.owned.push(id);
    document.getElementById('evoModal').style.display = "none";
    updateUI();
    alert(`恭喜！夥伴進化為 ${NAMES[id-1]}！`);
}

function tryMega() {
    if(s.items.mstone <= 0) { alert("需要 1 顆 Mega 石！"); return; }
    if(!MEGA_LIST[s.buddyId]) { alert("此夥伴目前無法 Mega 進化！"); return; }
    s.items.mstone--;
    s.buddy.megaUntil = Date.now() + 7200000; // 2小時
    updateUI();
    alert("🧬 Mega 進化成功！持續 2 小時。");
}

function updateMegaTimer() {
    const now = Date.now();
    if(now < s.buddy.megaUntil) {
        let diff = Math.floor((s.buddy.megaUntil - now) / 1000);
        let m = Math.floor(diff/60), sec = diff%60;
        document.getElementById('megaTimer').style.display = "block";
        document.getElementById('mTime').innerText = `${m}:${sec < 10 ? '0'+sec : sec}`;
    } else {
        document.getElementById('megaTimer').style.display = "none";
    }
}

// 管理與 CSV (依照需求清單實作)
function handleCSV(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const lines = ev.target.result.split('\n');
        lines.forEach(line => {
            const cols = line.split(',');
            if(cols.length >= 3 && !isNaN(parseInt(cols[cols.length-1]))) {
                document.getElementById('recAmt').value = cols[cols.length-1];
                document.getElementById('recNote').value = cols[1];
                record();
            }
        });
        alert("CSV 匯入完成！");
    };
    reader.readAsText(e.target.files[0]);
}

function lighten() {
    const start = document.getElementById('lightStart').value;
    const end = document.getElementById('lightEnd').value;
    if(!start || !end) return alert("請選擇日期");
    const backup = s.hist.filter(h => h.date >= start && h.date <= end);
    const blob = new Blob([JSON.stringify(backup)], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `backup_${start}.json`;
    a.click();
    s.hist = s.hist.filter(h => h.date < start || h.date > end);
    updateUI();
    alert("清理完成，總額已保留於統計。");
}
